<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>OncoTrack RT Pro | Patient Follow-up & RT Status</title>
  <!-- Tailwind CSS + Font Awesome + Google Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #f4f7fc; }
    .transition-smooth { transition: all 0.2s ease; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 12px 20px -12px rgba(0,0,0,0.15); }
    .modal-overlay { background-color: rgba(0, 0, 0, 0.6); backdrop-filter: blur(3px); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #e2e8f0; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
    .status-badge { @apply px-2.5 py-1 rounded-full text-xs font-medium; }
  </style>
</head>
<body class="antialiased">

  <div class="max-w-7xl mx-auto px-4 py-6 md:py-8">
    <!-- Header + stats -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-3 mb-6">
      <div>
        <h1 class="text-3xl font-bold text-slate-800 flex items-center gap-2">
          <i class="fas fa-radiation text-indigo-600"></i> 
          OncoTrack RT Pro
        </h1>
        <p class="text-slate-500 text-sm mt-1">First visit · RT milestones · Consultant & diagnosis tracking</p>
      </div>
      <div class="flex gap-3 text-sm bg-white rounded-xl shadow-sm px-4 py-2">
        <div class="flex items-center gap-1"><i class="fas fa-user-friends text-indigo-500"></i> <span id="totalPatientsCount">0</span></div>
        <div class="w-px h-5 bg-slate-200"></div>
        <div class="flex items-center gap-1"><i class="fas fa-check-circle text-emerald-500"></i> <span id="rtAppliedCount">0</span> applied</div>
        <div class="w-px h-5 bg-slate-200"></div>
        <div class="flex items-center gap-1"><i class="fas fa-play-circle text-blue-500"></i> <span id="rtStartedCount">0</span> started</div>
      </div>
    </div>

    <!-- Add Patient Form -->
    <div class="bg-white rounded-2xl shadow-md p-5 mb-6 border border-slate-100">
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-3 items-end">
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">Full name</label>
          <input type="text" id="patientName" placeholder="e.g. John Carter" class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:ring-2 focus:ring-indigo-300">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">MRN (unique)</label>
          <input type="text" id="patientMrn" placeholder="MRN-XXXX" class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">First visit date</label>
          <input type="date" id="patientFirstVisit" class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">Consultant</label>
          <select id="patientConsultant" class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm bg-white">
            <option value="Dr.Purna">Dr. Purna</option>
            <option value="Dr.Praveen">Dr. Praveen</option>
            <option value="Dr.Geetha">Dr. Geetha</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">Diagnosis</label>
          <input type="text" id="patientDiagnosis" placeholder="e.g. Left breast CA" class="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm">
        </div>
        <div class="lg:col-span-5 flex justify-end">
          <button id="addPatientBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-6 py-2.5 rounded-xl transition-smooth flex items-center gap-2 shadow-sm"><i class="fas fa-plus"></i> Add patient</button>
        </div>
      </div>
    </div>

    <!-- Filters: search + Month/Year + Consultant -->
    <div class="bg-white rounded-xl shadow-sm p-4 mb-6 flex flex-wrap gap-4 items-end border">
      <div class="flex-1 min-w-[180px]">
        <label class="text-xs font-semibold text-slate-500"><i class="fas fa-search"></i> Search (name / MRN)</label>
        <input type="text" id="searchInput" placeholder="Search patient..." class="w-full border rounded-lg px-3 py-2 text-sm">
      </div>
      <div class="w-32">
        <label class="text-xs font-semibold text-slate-500">Month (First visit)</label>
        <select id="filterMonth" class="w-full border rounded-lg px-2 py-2 text-sm bg-white">
          <option value="">All months</option>
          <option value="0">January</option><option value="1">February</option><option value="2">March</option>
          <option value="3">April</option><option value="4">May</option><option value="5">June</option>
          <option value="6">July</option><option value="7">August</option><option value="8">September</option>
          <option value="9">October</option><option value="10">November</option><option value="11">December</option>
        </select>
      </div>
      <div class="w-32">
        <label class="text-xs font-semibold text-slate-500">Year (First visit)</label>
        <select id="filterYear" class="w-full border rounded-lg px-2 py-2 text-sm bg-white">
          <option value="">All years</option>
        </select>
      </div>
      <div class="w-48">
        <label class="text-xs font-semibold text-slate-500">Consultant</label>
        <select id="filterConsultant" class="w-full border rounded-lg px-2 py-2 text-sm bg-white">
          <option value="">All consultants</option>
          <option value="Dr.Purna">Dr. Purna</option>
          <option value="Dr.Praveen">Dr. Praveen</option>
          <option value="Dr.Geetha">Dr. Geetha</option>
        </select>
      </div>
      <button id="resetFiltersBtn" class="text-sm text-slate-500 hover:text-indigo-600 border px-3 py-2 rounded-lg"><i class="fas fa-undo-alt"></i> Reset</button>
    </div>

    <!-- Patients Grid -->
    <div id="patientsContainer" class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <!-- dynamic -->
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 modal-overlay" style="display: none;">
      <div class="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden">
        <div class="bg-indigo-50 px-6 py-4 border-b border-indigo-100 flex justify-between items-center">
          <h3 class="text-xl font-bold text-indigo-800"><i class="fas fa-user-edit mr-2"></i>Edit patient</h3>
          <button id="closeModalBtn" class="text-slate-500 hover:text-slate-700 text-xl">&times;</button>
        </div>
        <div class="p-6 space-y-4">
          <input type="hidden" id="editPatientId">
          <div><label class="block text-sm font-medium text-slate-700">Full name</label><input id="editName" class="w-full border rounded-lg px-3 py-2"></div>
          <div><label class="block text-sm font-medium text-slate-700">MRN</label><input id="editMrn" class="w-full border rounded-lg px-3 py-2"></div>
          <div><label class="block text-sm font-medium text-slate-700">First visit date</label><input id="editFirstVisit" type="date" class="w-full border rounded-lg px-3 py-2"></div>
          <div><label class="block text-sm font-medium text-slate-700">Consultant</label>
            <select id="editConsultant" class="w-full border rounded-lg px-3 py-2">
              <option value="Dr.Purna">Dr. Purna</option><option value="Dr.Praveen">Dr. Praveen</option><option value="Dr.Geetha">Dr. Geetha</option>
            </select>
          </div>
          <div><label class="block text-sm font-medium text-slate-700">Diagnosis</label><input id="editDiagnosis" class="w-full border rounded-lg px-3 py-2"></div>
          <div class="grid grid-cols-2 gap-3">
            <div><label class="block text-sm font-medium text-slate-700">RT applied date</label><input id="editRtApplied" type="date" class="w-full border rounded-lg px-3 py-2"></div>
            <div><label class="block text-sm font-medium text-slate-700">RT started date</label><input id="editRtStarted" type="date" class="w-full border rounded-lg px-3 py-2"></div>
          </div>
          <div class="text-xs text-amber-600 bg-amber-50 p-2 rounded-lg"><i class="fas fa-exclamation-triangle"></i> Once RT applied / started dates are set, they cannot be cleared (only overwritten with new dates).</div>
          <div class="flex justify-end gap-3 pt-2">
            <button id="modalCancelBtn" class="px-4 py-2 border rounded-lg text-slate-600">Cancel</button>
            <button id="modalSaveBtn" class="px-5 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">Save changes</button>
          </div>
        </div>
      </div>
    </div>

    <div id="toastMsg" class="fixed bottom-6 right-6 bg-slate-800 text-white text-sm px-5 py-3 rounded-xl shadow-xl z-50 transition-all duration-300 translate-y-20 opacity-0"></div>
  </div>

  <script>
    // --- DATA MODEL ---
    let patients = [];
    const STORAGE_KEY = "ontrack_rt_pro_v2";

    // Consultants list
    const CONSULTANTS = ["Dr.Purna", "Dr.Praveen", "Dr.Geetha"];

    // Migrate old data from previous version (dob -> firstVisit, add consultant & diagnosis if missing)
    function migrateLegacyPatients(loadedPatients) {
      return loadedPatients.map(p => {
        // if old field "dob" exists and no "firstVisit", migrate
        let firstVisit = p.firstVisit || p.dob || "";
        // remove legacy dob if needed
        if (p.dob && !p.firstVisit) delete p.dob;
        return {
          id: p.id,
          name: p.name || "",
          mrn: p.mrn || "",
          firstVisit: firstVisit,
          consultant: p.consultant && CONSULTANTS.includes(p.consultant) ? p.consultant : "Dr.Purna",
          diagnosis: p.diagnosis || "",
          rtAppliedDate: p.rtAppliedDate || null,
          rtStartedDate: p.rtStartedDate || null,
          followUpNotes: Array.isArray(p.followUpNotes) ? p.followUpNotes : []
        };
      });
    }

    function loadFromStorage() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        let raw = JSON.parse(stored);
        patients = migrateLegacyPatients(raw);
      } else {
        // Demo patients with new fields (firstVisit, consultant, diagnosis)
        patients = [
          { id: "p1", name: "Eleanor Chen", mrn: "MRN-1001", firstVisit: "2025-02-05", consultant: "Dr.Purna", diagnosis: "Cervical Cancer", rtAppliedDate: "2025-02-10", rtStartedDate: "2025-02-18", followUpNotes: [{ id: "n1", dateTime: "2025-02-20T09:30:00", note: "First RT session, fatigue" }] },
          { id: "p2", name: "James O'Connell", mrn: "MRN-1002", firstVisit: "2025-03-01", consultant: "Dr.Praveen", diagnosis: "Prostate Adenocarcinoma", rtAppliedDate: "2025-03-01", rtStartedDate: null, followUpNotes: [{ id: "n3", dateTime: "2025-03-05T11:00:00", note: "Simulation done" }] },
          { id: "p3", name: "Maria Santos", mrn: "MRN-1003", firstVisit: "2024-11-12", consultant: "Dr.Geetha", diagnosis: "Breast Cancer, left", rtAppliedDate: null, rtStartedDate: null, followUpNotes: [] },
          { id: "p4", name: "Robert Kim", mrn: "MRN-1004", firstVisit: "2025-04-10", consultant: "Dr.Purna", diagnosis: "Lung Nodules", rtAppliedDate: "2025-04-12", rtStartedDate: "2025-04-18", followUpNotes: [] }
        ];
      }
      renderDashboard();
      populateYearFilter();
    }

    function saveToLocalStorage() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(patients));
    }

    function showToast(message, isError = false) {
      const toast = document.getElementById("toastMsg");
      toast.innerText = message;
      toast.classList.remove("translate-y-20", "opacity-0");
      toast.classList.add("translate-y-0", "opacity-100");
      if (isError) toast.classList.add("bg-red-700");
      else toast.classList.remove("bg-red-700");
      setTimeout(() => {
        toast.classList.add("translate-y-20", "opacity-0");
        toast.classList.remove("translate-y-0", "opacity-100");
        if (isError) toast.classList.remove("bg-red-700");
      }, 2700);
    }

    function isMrnUnique(mrn, excludeId = null) {
      return !patients.some(p => p.mrn === mrn && p.id !== excludeId);
    }

    // Add patient with new fields
    function addPatient(name, mrn, firstVisit, consultant, diagnosis) {
      if (!name.trim()) { showToast("Patient name required", true); return false; }
      if (!mrn.trim()) { showToast("MRN required", true); return false; }
      if (!isMrnUnique(mrn)) { showToast("MRN already exists", true); return false; }
      if (!consultant || !CONSULTANTS.includes(consultant)) consultant = "Dr.Purna";
      const newPatient = {
        id: Date.now().toString() + Math.random().toString(36).substr(2, 6),
        name: name.trim(),
        mrn: mrn.trim(),
        firstVisit: firstVisit || "",
        consultant: consultant,
        diagnosis: diagnosis || "",
        rtAppliedDate: null,
        rtStartedDate: null,
        followUpNotes: []
      };
      patients.push(newPatient);
      saveToLocalStorage();
      renderDashboard();
      populateYearFilter();
      showToast(`✅ ${name} added`);
      return true;
    }

    // update with immutable rules: cannot clear RT applied/started if they were set
    function updatePatient(patientId, updatedFields) {
      const index = patients.findIndex(p => p.id === patientId);
      if (index === -1) return false;
      const current = patients[index];
      
      // MRN uniqueness check
      if (updatedFields.mrn !== undefined && updatedFields.mrn !== current.mrn) {
        if (!isMrnUnique(updatedFields.mrn, patientId)) {
          showToast("MRN conflict", true);
          return false;
        }
      }
      // Prevent clearing existing rtAppliedDate
      let newRtApplied = updatedFields.rtAppliedDate;
      if (newRtApplied === "" || newRtApplied === null) {
        if (current.rtAppliedDate) {
          showToast("❌ RT applied date cannot be cleared once set. You can only update to another date.", true);
          return false;
        }
        newRtApplied = null;
      }
      // Prevent clearing existing rtStartedDate
      let newRtStarted = updatedFields.rtStartedDate;
      if (newRtStarted === "" || newRtStarted === null) {
        if (current.rtStartedDate) {
          showToast("❌ RT started date cannot be cleared once set. You can only update to another date.", true);
          return false;
        }
        newRtStarted = null;
      }
      
      patients[index] = { 
        ...current, 
        ...updatedFields, 
        rtAppliedDate: newRtApplied,
        rtStartedDate: newRtStarted
      };
      saveToLocalStorage();
      renderDashboard();
      populateYearFilter();
      showToast("Patient updated");
      return true;
    }

    function deletePatient(patientId) {
      if (confirm("⚠️ Permanently delete patient & all data?")) {
        patients = patients.filter(p => p.id !== patientId);
        saveToLocalStorage();
        renderDashboard();
        populateYearFilter();
        showToast("Patient removed");
      }
    }

    // RT marking: cannot undo, only overwrite with new date (but never set null)
    function markRtApplied(patientId) {
      const patient = patients.find(p => p.id === patientId);
      if (!patient) return;
      const today = new Date().toISOString().slice(0,10);
      if (patient.rtAppliedDate && patient.rtAppliedDate === today) {
        showToast("RT already applied today", false);
        return;
      }
      if (patient.rtAppliedDate) {
        if (confirm(`RT already applied on ${patient.rtAppliedDate}. Overwrite with today's date?`)) {
          patient.rtAppliedDate = today;
          saveToLocalStorage();
          renderDashboard();
          showToast(`RT applied date updated to ${today}`);
        }
      } else {
        patient.rtAppliedDate = today;
        saveToLocalStorage();
        renderDashboard();
        showToast(`✅ RT applied marked on ${today} (cannot be undone)`);
      }
    }

    function markRtStarted(patientId) {
      const patient = patients.find(p => p.id === patientId);
      if (!patient) return;
      if (!patient.rtAppliedDate) {
        showToast("❌ Cannot start RT: mark 'RT applied' first", true);
        return;
      }
      const today = new Date().toISOString().slice(0,10);
      if (patient.rtStartedDate && patient.rtStartedDate === today) {
        showToast("RT already started today", false);
        return;
      }
      if (patient.rtStartedDate) {
        if (confirm(`RT was started on ${patient.rtStartedDate}. Overwrite to today?`)) {
          patient.rtStartedDate = today;
          saveToLocalStorage();
          renderDashboard();
          showToast(`RT start date updated to ${today}`);
        }
      } else {
        patient.rtStartedDate = today;
        saveToLocalStorage();
        renderDashboard();
        showToast(`🎯 RT started marked on ${today} (cannot be undone)`);
      }
    }

    // Follow-up notes
    function addFollowUp(patientId, noteText) {
      if (!noteText.trim()) { showToast("Enter note", true); return false; }
      const patient = patients.find(p => p.id === patientId);
      if (!patient) return false;
      const newNote = {
        id: Date.now().toString() + Math.random().toString(36).substr(2, 4),
        dateTime: new Date().toISOString(),
        note: noteText.trim()
      };
      patient.followUpNotes.push(newNote);
      saveToLocalStorage();
      renderDashboard();
      showToast("Follow-up added");
      return true;
    }

    function deleteFollowUp(patientId, noteId) {
      const patient = patients.find(p => p.id === patientId);
      if (patient) {
        patient.followUpNotes = patient.followUpNotes.filter(n => n.id !== noteId);
        saveToLocalStorage();
        renderDashboard();
        showToast("Note deleted");
      }
    }

    // Format helpers
    function formatDate(dateStr) { if (!dateStr) return "—"; const d = new Date(dateStr); return isNaN(d.getTime()) ? dateStr : d.toLocaleDateString(); }
    function formatDateTime(isoString) { if (!isoString) return ""; const d = new Date(isoString); return d.toLocaleDateString() + " " + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // Filters state
    let currentSearch = "", currentMonth = "", currentYear = "", currentConsultantFilter = "";
    
    function filterPatientsList() {
      let filtered = [...patients];
      if (currentSearch) {
        const lower = currentSearch.toLowerCase();
        filtered = filtered.filter(p => p.name.toLowerCase().includes(lower) || p.mrn.toLowerCase().includes(lower));
      }
      // first visit month/year filter
      if (currentMonth !== "" && currentYear !== "") {
        filtered = filtered.filter(p => {
          if (!p.firstVisit) return false;
          const date = new Date(p.firstVisit);
          if (isNaN(date.getTime())) return false;
          return date.getMonth() === parseInt(currentMonth) && date.getFullYear() === parseInt(currentYear);
        });
      } else if (currentMonth !== "" && currentYear === "") {
        // if month selected but year not, show none to avoid mismatch (requirement: month+year together)
        filtered = [];
      } else if (currentYear !== "" && currentMonth === "") {
        filtered = [];
      }
      // consultant filter
      if (currentConsultantFilter) {
        filtered = filtered.filter(p => p.consultant === currentConsultantFilter);
      }
      return filtered;
    }

    function populateYearFilter() {
      const yearSelect = document.getElementById("filterYear");
      const yearsSet = new Set();
      patients.forEach(p => {
        if (p.firstVisit) {
          const y = new Date(p.firstVisit).getFullYear();
          if (!isNaN(y)) yearsSet.add(y);
        }
      });
      let years = Array.from(yearsSet).sort((a,b)=>b-a);
      yearSelect.innerHTML = '<option value="">All years</option>';
      years.forEach(y => { yearSelect.innerHTML += `<option value="${y}">${y}</option>`; });
      if (currentYear && years.includes(parseInt(currentYear))) yearSelect.value = currentYear;
      else currentYear = "";
    }

    function renderDashboard() {
      const filtered = filterPatientsList();
      const container = document.getElementById("patientsContainer");
      const totalCount = patients.length;
      const appliedCount = patients.filter(p => p.rtAppliedDate).length;
      const startedCount = patients.filter(p => p.rtStartedDate).length;
      document.getElementById("totalPatientsCount").innerText = totalCount;
      document.getElementById("rtAppliedCount").innerText = appliedCount;
      document.getElementById("rtStartedCount").innerText = startedCount;

      if (filtered.length === 0) {
        container.innerHTML = `<div class="col-span-full flex flex-col items-center justify-center py-16 bg-white rounded-2xl shadow-sm"><i class="fas fa-filter text-4xl text-slate-300 mb-2"></i><p class="text-slate-500">No patients match filters. Adjust criteria or add patient.</p></div>`;
        return;
      }

      container.innerHTML = filtered.map(patient => {
        const rtAppliedDate = patient.rtAppliedDate;
        const rtStartedDate = patient.rtStartedDate;
        const appliedStatus = rtAppliedDate ? `<span class="inline-flex items-center gap-1 text-emerald-700 bg-emerald-50 px-2.5 py-1 rounded-full text-xs font-medium"><i class="fas fa-calendar-check"></i> ${formatDate(rtAppliedDate)}</span>` : `<span class="inline-flex items-center gap-1 text-slate-500 bg-slate-100 px-2.5 py-1 rounded-full text-xs"><i class="far fa-clock"></i> Not applied</span>`;
        const startedStatus = rtStartedDate ? `<span class="inline-flex items-center gap-1 text-blue-700 bg-blue-50 px-2.5 py-1 rounded-full text-xs font-medium"><i class="fas fa-play-circle"></i> ${formatDate(rtStartedDate)}</span>` : `<span class="inline-flex items-center gap-1 text-slate-500 bg-slate-100 px-2.5 py-1 rounded-full text-xs"><i class="far fa-hourglass"></i> Not started</span>`;
        
        const followUpsHtml = patient.followUpNotes.length === 0 ? `<div class="text-center text-xs text-slate-400 py-2"><i class="far fa-comment-dots"></i> No notes</div>` :
          `<div class="space-y-2 max-h-40 overflow-y-auto pr-1">` + patient.followUpNotes.slice().reverse().map(note => `
            <div class="bg-slate-50 p-2 rounded-lg flex justify-between items-start gap-2 text-sm">
              <div class="flex-1"><div class="text-[11px] text-slate-500 font-mono">${formatDateTime(note.dateTime)}</div><div class="text-slate-700 break-words">${escapeHtml(note.note)}</div></div>
              <button class="delete-note-btn text-slate-400 hover:text-red-500" data-patient-id="${patient.id}" data-note-id="${note.id}"><i class="fas fa-trash-alt text-xs"></i></button>
            </div>
          `).join('') + `</div>`;

        return `
          <div class="bg-white rounded-2xl shadow-md border border-slate-100 overflow-hidden card-hover">
            <div class="p-5 pb-2 border-b border-slate-100 flex justify-between items-start flex-wrap gap-2">
              <div><h2 class="text-xl font-bold text-slate-800">${escapeHtml(patient.name)}</h2>
                <div class="flex flex-wrap gap-x-3 gap-y-1 text-xs mt-1"><span class="font-mono text-slate-500">${escapeHtml(patient.mrn)}</span>
                <span class="bg-indigo-50 text-indigo-700 px-2 py-0.5 rounded-full"><i class="fas fa-user-md"></i> ${escapeHtml(patient.consultant)}</span></div>
                <div class="text-xs text-slate-400 mt-0.5"><i class="far fa-calendar-alt"></i> First visit: ${formatDate(patient.firstVisit)}</div>
                ${patient.diagnosis ? `<div class="text-xs text-slate-500 bg-slate-50 inline-block px-2 py-0.5 rounded mt-1"><i class="fas fa-stethoscope"></i> ${escapeHtml(patient.diagnosis)}</div>` : ''}
              </div>
              <div class="flex gap-1"><button class="edit-patient-btn text-indigo-600 hover:bg-indigo-50 p-2 rounded-full" data-id="${patient.id}"><i class="fas fa-pen-alt"></i></button><button class="delete-patient-btn text-red-500 hover:bg-red-50 p-2 rounded-full" data-id="${patient.id}"><i class="fas fa-trash"></i></button></div>
            </div>
            <div class="p-5 space-y-4">
              <div class="grid grid-cols-2 gap-3 bg-slate-50 p-3 rounded-xl"><div><div class="text-xs uppercase font-semibold text-slate-500"><i class="fas fa-radiation"></i> RT applied</div><div>${appliedStatus}</div></div><div><div class="text-xs uppercase font-semibold text-slate-500"><i class="fas fa-play"></i> RT started</div><div>${startedStatus}</div></div></div>
              <div class="flex flex-wrap gap-2"><button class="rt-applied-btn bg-emerald-50 text-emerald-700 hover:bg-emerald-100 px-3 py-1.5 rounded-lg text-xs font-medium flex items-center gap-1" data-id="${patient.id}"><i class="fas fa-check-circle"></i> Mark RT applied</button><button class="rt-started-btn bg-blue-50 text-blue-700 hover:bg-blue-100 px-3 py-1.5 rounded-lg text-xs font-medium flex items-center gap-1" data-id="${patient.id}"><i class="fas fa-arrow-right"></i> Mark RT started</button></div>
              <div><div class="flex items-center justify-between mb-2"><h4 class="text-sm font-semibold text-slate-700"><i class="fas fa-notes-medical mr-1 text-indigo-500"></i> Follow-up</h4><div class="flex gap-1"><input type="text" id="followup-input-${patient.id}" placeholder="Add note..." class="text-xs border rounded-lg px-2 py-1 w-36"><button class="add-followup-btn bg-indigo-100 text-indigo-700 px-2 py-1 rounded-lg text-xs" data-id="${patient.id}"><i class="fas fa-plus"></i> Add</button></div></div><div class="mt-2">${followUpsHtml}</div></div>
            </div>
          </div>
        `;
      }).join('');
      attachCardEvents();
    }

    function attachCardEvents() {
      document.querySelectorAll('.rt-applied-btn').forEach(btn => btn.addEventListener('click', (e) => markRtApplied(btn.dataset.id)));
      document.querySelectorAll('.rt-started-btn').forEach(btn => btn.addEventListener('click', (e) => markRtStarted(btn.dataset.id)));
      document.querySelectorAll('.delete-patient-btn').forEach(btn => btn.addEventListener('click', (e) => deletePatient(btn.dataset.id)));
      document.querySelectorAll('.edit-patient-btn').forEach(btn => btn.addEventListener('click', (e) => openEditModal(btn.dataset.id)));
      document.querySelectorAll('.add-followup-btn').forEach(btn => btn.addEventListener('click', (e) => { const pid = btn.dataset.id; const inp = document.getElementById(`followup-input-${pid}`); if(inp && inp.value.trim()) addFollowUp(pid, inp.value); else showToast("Write note", true); inp.value = ""; }));
      document.querySelectorAll('.delete-note-btn').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); deleteFollowUp(btn.dataset.patientId, btn.dataset.noteId); }));
    }

    function openEditModal(patientId) {
      const p = patients.find(p => p.id === patientId);
      if (!p) return;
      document.getElementById("editPatientId").value = p.id;
      document.getElementById("editName").value = p.name;
      document.getElementById("editMrn").value = p.mrn;
      document.getElementById("editFirstVisit").value = p.firstVisit || "";
      document.getElementById("editConsultant").value = p.consultant;
      document.getElementById("editDiagnosis").value = p.diagnosis || "";
      document.getElementById("editRtApplied").value = p.rtAppliedDate || "";
      document.getElementById("editRtStarted").value = p.rtStartedDate || "";
      document.getElementById("editModal").style.display = "flex";
    }

    function closeModal() { document.getElementById("editModal").style.display = "none"; }
    document.getElementById("closeModalBtn").addEventListener("click", closeModal);
    document.getElementById("modalCancelBtn").addEventListener("click", closeModal);
    document.getElementById("modalSaveBtn").addEventListener("click", () => {
      const id = document.getElementById("editPatientId").value;
      const newName = document.getElementById("editName").value.trim();
      const newMrn = document.getElementById("editMrn").value.trim();
      const newFirstVisit = document.getElementById("editFirstVisit").value;
      const newConsultant = document.getElementById("editConsultant").value;
      const newDiagnosis = document.getElementById("editDiagnosis").value.trim();
      let newRtApplied = document.getElementById("editRtApplied").value || null;
      let newRtStarted = document.getElementById("editRtStarted").value || null;
      if (!newName) { showToast("Name required", true); return; }
      if (!newMrn) { showToast("MRN required", true); return; }
      updatePatient(id, { name: newName, mrn: newMrn, firstVisit: newFirstVisit, consultant: newConsultant, diagnosis: newDiagnosis, rtAppliedDate: newRtApplied, rtStartedDate: newRtStarted });
      closeModal();
    });

    // Filter listeners
    document.getElementById("searchInput").addEventListener("input", (e) => { currentSearch = e.target.value; renderDashboard(); });
    document.getElementById("filterMonth").addEventListener("change", (e) => { currentMonth = e.target.value; renderDashboard(); });
    document.getElementById("filterYear").addEventListener("change", (e) => { currentYear = e.target.value; renderDashboard(); });
    document.getElementById("filterConsultant").addEventListener("change", (e) => { currentConsultantFilter = e.target.value; renderDashboard(); });
    document.getElementById("resetFiltersBtn").addEventListener("click", () => {
      document.getElementById("searchInput").value = ""; currentSearch = "";
      document.getElementById("filterMonth").value = ""; currentMonth = "";
      document.getElementById("filterYear").value = ""; currentYear = "";
      document.getElementById("filterConsultant").value = ""; currentConsultantFilter = "";
      renderDashboard();
    });

    document.getElementById("addPatientBtn").addEventListener("click", () => {
      const name = document.getElementById("patientName").value;
      const mrn = document.getElementById("patientMrn").value;
      const firstVisit = document.getElementById("patientFirstVisit").value;
      const consultant = document.getElementById("patientConsultant").value;
      const diagnosis = document.getElementById("patientDiagnosis").value;
      if (addPatient(name, mrn, firstVisit, consultant, diagnosis)) {
        document.getElementById("patientName").value = "";
        document.getElementById("patientMrn").value = "";
        document.getElementById("patientFirstVisit").value = "";
        document.getElementById("patientDiagnosis").value = "";
        document.getElementById("patientConsultant").value = "Dr.Purna";
      }
    });

    window.addEventListener("click", (e) => { if(e.target === document.getElementById("editModal")) closeModal(); });
    loadFromStorage();
  </script>
</body>
</html>
