<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>SAGA IPTV — Offline</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
body{width:100vw;height:100vh;background:#080808;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-family:system-ui}
.logo{font-size:80px;font-weight:900;letter-spacing:-3px;margin-bottom:24px}
.msg{font-size:20px;color:rgba(255,255,255,.5);margin-bottom:40px}
.hint{font-size:14px;color:rgba(255,255,255,.3);letter-spacing:1px}
</style></head><body>
<div class="logo">SAGA</div>
<div class="msg">No internet connection</div>
<div class="hint">PRESS BACK TO RETRY</div>
<script>
document.addEventListener('keydown',function(e){
  if(e.keyCode===10009||e.keyCode===27)window.location.href='index.html';
});
</script>
</body></html>
