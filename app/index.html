<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; media-src * blob: data:; img-src * data: blob:; connect-src *; style-src 'self' 'unsafe-inline';">
<title>JioTV+ · IPTV Player</title>
<!-- Shaka Player CDN -->
<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.11.0/dist/shaka-player.compiled.js"></script>
<style>
/* ==================== JioTV+ UI - Premium Dark Theme ==================== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --bg-primary: #0a0c10;
  --bg-secondary: #111317;
  --accent: #8b5cf6;      /* Jio purple */
  --accent-glow: #a78bfa;
  --accent-gradient: linear-gradient(135deg, #8b5cf6, #c084fc);
  --text-primary: #ffffff;
  --text-secondary: #b0b3b8;
  --text-muted: #6c6f78;
  --border-light: rgba(255,255,255,0.08);
  --card-bg: rgba(18, 20, 25, 0.9);
  --focus-glow: 0 0 0 3px rgba(139, 92, 246, 0.6);
  --tw: 200px;
  --th: 120px;
  --tgap: 16px;
}

body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

/* main app container */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  width: 100vw;
  background: radial-gradient(circle at 20% 30%, #11151f, #030507);
  position: relative;
}

/* ==================== TOP BAR (JioTV+ style) ==================== */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 32px;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border-light);
  z-index: 20;
}
.logo-area {
  display: flex;
  align-items: center;
  gap: 12px;
}
.logo-icon {
  width: 40px;
  height: 40px;
  background: var(--accent-gradient);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 900;
  box-shadow: 0 4px 12px rgba(139,92,246,0.3);
}
.logo-text {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, #fff, #c084fc);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.status-area {
  display: flex;
  gap: 24px;
  align-items: center;
}
.network-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.1);
  border-radius: 40px;
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 500;
  backdrop-filter: blur(4px);
}
.network-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #22c55e;
  animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:0.5; } }
#clock {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 0.5px;
}

/* ==================== MAIN LAYOUT ==================== */
.main-content {
  display: flex;
  flex: 1;
  overflow: hidden;
  padding: 20px 32px 20px 32px;
  gap: 24px;
}

/* LEFT SIDEBAR (categories) - JioTV+ style vertical menu */
.sidebar {
  width: 220px;
  flex-shrink: 0;
  background: rgba(10, 12, 16, 0.6);
  backdrop-filter: blur(16px);
  border-radius: 28px;
  border: 1px solid var(--border-light);
  padding: 20px 0;
  overflow-y: auto;
  scrollbar-width: thin;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar-category {
  padding: 12px 20px;
  margin: 4px 12px;
  border-radius: 40px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
  transition: all 0.15s;
  cursor: pointer;
  white-space: nowrap;
}
.sidebar-category svg {
  width: 18px;
  height: 18px;
  margin-right: 12px;
  vertical-align: middle;
  fill: currentColor;
}
.sidebar-category.active {
  background: var(--accent);
  color: white;
  box-shadow: 0 4px 12px rgba(139,92,246,0.3);
}
.sidebar-category:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

/* RIGHT CONTENT (video + channel strip) */
.content-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 20px;
  min-width: 0;
}

/* VIDEO PLAYER HERO (JioTV+ featured style) */
.video-hero {
  background: #000000;
  border-radius: 24px;
  overflow: hidden;
  aspect-ratio: 16 / 9;
  position: relative;
  box-shadow: 0 20px 35px -15px rgba(0,0,0,0.6);
  border: 1px solid var(--border-light);
}
#videoPlayer {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: #000;
}
.video-overlay {
  position: absolute;
  bottom: 20px;
  left: 20px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(12px);
  border-radius: 40px;
  padding: 8px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  pointer-events: none;
  z-index: 5;
}
.live-badge {
  background: #e50914;
  border-radius: 20px;
  padding: 2px 10px;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 1px;
}
#nowPlayingTitle {
  font-size: 18px;
  font-weight: 700;
}
#nowPlayingGroup {
  font-size: 12px;
  color: var(--text-secondary);
}

/* CHANNEL STRIP (horizontal scrolling) */
.channel-strip {
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(20px);
  border-radius: 28px;
  padding: 16px 0 16px 16px;
  border: 1px solid var(--border-light);
}
.strip-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 0 16px 12px 8px;
}
.strip-header h3 {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-primary);
}
.strip-header span {
  font-size: 12px;
  color: var(--accent);
}
.strip-scroll {
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: thin;
  white-space: nowrap;
  scroll-behavior: smooth;
}
.strip-scroll::-webkit-scrollbar { height: 4px; }
.strip-inner {
  display: inline-flex;
  gap: 14px;
  padding-right: 30px;
}

/* Channel Tile (JioTV+ style) */
.channel-tile {
  width: 180px;
  height: 110px;
  background: var(--card-bg);
  border-radius: 16px;
  border: 2px solid transparent;
  position: relative;
  cursor: pointer;
  transition: all 0.18s ease;
  overflow: hidden;
  flex-shrink: 0;
  backdrop-filter: blur(4px);
}
.channel-tile img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  padding: 12px;
  background: rgba(0,0,0,0.4);
}
.channel-tile .tile-name {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.9));
  padding: 20px 6px 6px;
  font-size: 11px;
  font-weight: 600;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.channel-tile .fav-star {
  position: absolute;
  top: 6px;
  right: 8px;
  font-size: 12px;
  color: #fbbf24;
  display: none;
  z-index: 2;
}
.channel-tile.active {
  border-color: var(--accent);
  transform: scale(1.02);
  box-shadow: var(--focus-glow);
}
.channel-tile.playing::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: var(--accent-gradient);
}

/* SEARCH BAR (floating) */
.search-container {
  position: fixed;
  top: 90px;
  right: 40px;
  z-index: 100;
  display: none;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(20px);
  border-radius: 60px;
  padding: 8px 20px;
  border: 1px solid var(--accent);
}
.search-container.open { display: flex; gap: 10px; align-items: center; }
#searchInput {
  background: transparent;
  border: none;
  outline: none;
  color: white;
  font-size: 16px;
  width: 220px;
}

/* OVERLAY (Settings & Sources) */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  backdrop-filter: blur(28px);
  z-index: 200;
  display: none;
  flex-direction: column;
  padding: 40px;
}
.overlay.open { display: flex; }
.overlay-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 32px;
  border-bottom: 1px solid var(--border-light);
  padding-bottom: 20px;
}
.overlay-body {
  display: flex;
  gap: 32px;
  flex: 1;
}
.overlay-side {
  width: 260px;
}
.overlay-main {
  flex: 1;
}
.setting-row {
  display: flex;
  justify-content: space-between;
  padding: 16px;
  border-bottom: 1px solid var(--border-light);
}
.toggle-switch {
  width: 52px;
  height: 28px;
  background: rgba(255,255,255,0.2);
  border-radius: 28px;
  position: relative;
  cursor: pointer;
}
.toggle-switch.active { background: var(--accent); }
.toggle-switch::before {
  content: '';
  position: absolute;
  width: 22px;
  height: 22px;
  background: white;
  border-radius: 50%;
  top: 3px;
  left: 3px;
  transition: 0.2s;
}
.toggle-switch.active::before { transform: translateX(24px); }

/* Volume HUD */
#volumeHUD {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.9);
  backdrop-filter: blur(16px);
  border-radius: 40px;
  padding: 12px 24px;
  display: flex;
  gap: 20px;
  z-index: 300;
  opacity: 0;
  transition: 0.1s;
  pointer-events: none;
}
#volumeHUD.visible { opacity: 1; }
.volume-bar { width: 180px; height: 5px; background: #333; border-radius: 3px; }
.volume-fill { height: 100%; background: var(--accent); width: 50%; border-radius: 3px; }

/* Dialer Modal */
.dialer-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  backdrop-filter: blur(20px);
  z-index: 250;
  display: none;
  align-items: center;
  justify-content: center;
}
.dialer-modal.open { display: flex; }
.dialer-card {
  background: #111;
  border-radius: 36px;
  padding: 32px;
  width: 340px;
}
.dialer-number {
  font-size: 48px;
  text-align: center;
  letter-spacing: 10px;
  margin-bottom: 24px;
}
.dialer-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
.dialer-btn {
  background: #222;
  border: none;
  border-radius: 60px;
  padding: 16px;
  font-size: 24px;
  font-weight: 700;
  color: white;
  cursor: pointer;
}
.dialer-btn:focus { background: var(--accent); }

/* Toast */
#toastContainer {
  position: fixed;
  bottom: 100px;
  right: 30px;
  z-index: 400;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  background: rgba(0,0,0,0.85);
  border-left: 3px solid var(--accent);
  padding: 10px 20px;
  border-radius: 12px;
  backdrop-filter: blur(8px);
  animation: fadeIn 0.2s;
}

/* Splash */
#splash {
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  transition: 0.5s;
}
#splash.hide { opacity: 0; pointer-events: none; }

/* responsive */
@media (max-width: 1000px) {
  .sidebar { width: 180px; }
  .channel-tile { width: 150px; height: 95px; }
}
</style>
</head>
<body>

<div id="splash">
  <div class="logo-icon" style="width:80px;height:80px;font-size:44px;margin-bottom:20px;">J</div>
  <div style="font-size:32px;font-weight:800;">JioTV+ IPTV</div>
  <div style="margin-top:20px;">Loading experience...</div>
</div>

<div id="app">
  <!-- Top Bar -->
  <div class="top-bar">
    <div class="logo-area">
      <div class="logo-icon">J+</div>
      <div class="logo-text">JioTV+</div>
    </div>
    <div class="status-area">
      <div class="network-badge">
        <div class="network-dot" id="netDot"></div>
        <span id="netStatus">Ready</span>
      </div>
      <div id="clock">--:--</div>

  </div>

  <div class="main-content">
    <!-- Sidebar categories -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-category active" data-cat="all">
        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg> All Channels
      </div>

        <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg> Favourites

      <!-- dynamic categories will be injected -->

          <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg> Sources
        </div>
        <div class="sidebar-category" data-cat="settings">
          <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54A.484.484 0 0 0 16 3h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L4.74 9.15c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg> Settings
        </div>
      </div>
    </div>

    <!-- Right content -->
    <div class="content-area">
      <div class="video-hero">

  <!-- Floating Search -->

  <!-- Overlays -->
  <div class="overlay" id="overlay">

<script>
// ==================== JioTV+ IPTV APP ====================
// Default playlists
const DEFAULT_PL = 'https://jioplaylist.joinus-apiworker.workers.dev/playlist.m3u';
const TELUGU_PL = { name: 'Telugu', url: 'https://iptv-org.github.io/iptv/languages/tel.m3u', builtIn: true };
const JIO_PL = { name: 'Jio', url: DEFAULT_PL, builtIn: true };

// App state
let allChannels = [];          // raw channels
let filteredChannels = [];     // current filtered list
let currentIndex = 0;
let currentPlayingUrl = '';
let isPlaying = false;
let favs = new Set();
let customPlaylists = [];
let activeCategory = 'all';
let searchQuery = '';
let player = null;
let aspectMode = 0;
let currentVolume = 50;
let zone = 'strip'; // strip, sidebar, search, overlay
let dialString = '';

// DOM elements
const video = document.getElementById('videoPlayer');
const stripInner = document.getElementById('stripInner');
const nowPlayingTitle = document.getElementById('nowPlayingTitle');
const nowPlayingGroup = document.getElementById('nowPlayingGroup');
const netStatus = document.getElementById('netStatus');
const netDot = document.getElementById('netDot');
const clockDiv = document.getElementById('clock');
const searchContainer = document.getElementById('searchContainer');
const searchInput = document.getElementById('searchInput');
const overlayDiv = document.getElementById('overlay');
const volumeHUD = document.getElementById('volumeHUD');
const volFill = document.getElementById('volFill');
const volPercent = document.getElementById('volPercent');
const dialerModal = document.getElementById('dialerModal');
const dialNumber = document.getElementById('dialNumber');
const toastContainer = document.getElementById('toastContainer');

// helpers
function toast(msg, type='') {
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerText = msg;
  toastContainer.appendChild(t);
  setTimeout(()=>t.remove(), 2500);
}
function setStatus(txt, ok=true) {
  netStatus.innerText = txt;
  netDot.style.background = ok ? '#22c55e' : '#ef4444';
}
function saveFavs() { localStorage.setItem('jioplayer_favs', JSON.stringify([...favs])); }
function loadFavs() { try{ const f = localStorage.getItem('jioplayer_favs'); if(f) favs = new Set(JSON.parse(f)); }catch(e){} }

// Volume
function setVolume(v) {
  v = Math.min(100, Math.max(0, v));
  currentVolume = v;
  if(window.tizen?.tvaudiocontrol) tizen.tvaudiocontrol.setVolume(v);
  else video.volume = v/100;
  volFill.style.width = v+'%';
  volPercent.innerText = v;
  volumeHUD.classList.add('visible');
  clearTimeout(window.volTimeout);
  window.volTimeout = setTimeout(()=>volumeHUD.classList.remove('visible'), 1500);
}
function volUp() { setVolume(currentVolume + 5); }
function volDown() { setVolume(currentVolume - 5); }

// M3U parser
function parseM3U(text) {
  const lines = text.split(/\r?\n/);
  const channels = [];
  let cur = null;
  for(let l of lines) {
    l = l.trim();
    if(l.startsWith('#EXTINF')) {
      const nameMatch = l.match(/,([^,]+)$/);
      let name = nameMatch ? nameMatch[1] : 'Channel';
      name = name.replace(/\s*\([^)]*\)|\s*\[[^\]]*\]/g,'').trim() || 'Channel';
      const logo = (l.match(/tvg-logo="([^"]*)"/i)||[])[1] || '';
      const group = (l.match(/group-title="([^"]*)"/i)||[])[1] || 'General';
      cur = { name, logo, group, url: '' };
    } else if(l && !l.startsWith('#') && cur && l.startsWith('http')) {
      cur.url = l;
      channels.push(cur);
      cur = null;
    }
  }
  return channels;
}

// Cache (simple localStorage)
const CACHE_KEY = 'jioplayer_m3u_';
async function getCachedM3U(url) {
  const cached = localStorage.getItem(CACHE_KEY+url);
  if(cached && (Date.now() - JSON.parse(cached).ts < 3600000)) return JSON.parse(cached).data;
  return null;
}
async function setCachedM3U(url, data) {
  localStorage.setItem(CACHE_KEY+url, JSON.stringify({ts: Date.now(), data}));
}

async function loadPlaylist(playlist) {
  setStatus('Loading '+playlist.name+'...');
  try {
    let txt = await getCachedM3U(playlist.url);
    if(!txt) {
      const resp = await fetch(playlist.url, { signal: AbortSignal.timeout(20000) });
      if(!resp.ok) throw new Error('HTTP '+resp.status);
      txt = await resp.text();
      await setCachedM3U(playlist.url, txt);
    }
    const channels = parseM3U(txt);
    const existing = new Set(allChannels.map(c=>c.url));
    const fresh = channels.filter(c=>!existing.has(c.url));
    allChannels.push(...fresh);
    toast(`➕ ${fresh.length} channels from ${playlist.name}`);
    applyFiltersAndRender();
    setStatus(`Ready · ${allChannels.length} channels`);
  } catch(e) { setStatus('Error loading', false); toast(e.message, 'err'); }
}

async function loadAllSources() {
  allChannels = [];
  await loadPlaylist(TELUGU_PL);
  const saved = JSON.parse(localStorage.getItem('jioplayer_pls') || '[]');
  customPlaylists = saved.filter(p=>!p.builtIn);
  const sources = customPlaylists.length ? customPlaylists : [JIO_PL];
  for(let src of sources) await loadPlaylist(src);
  applyFiltersAndRender();
  document.getElementById('splash').classList.add('hide');
}

// Filter & Render
function applyFiltersAndRender() {
  let filtered = [...allChannels];
  if(activeCategory === 'favs') filtered = filtered.filter(c=>favs.has(c.url));
  else if(activeCategory !== 'all') filtered = filtered.filter(c=>c.group === activeCategory);
  if(searchQuery.trim()) {
    const q = searchQuery.toLowerCase();
    filtered = filtered.filter(c=>c.name.toLowerCase().includes(q));
  }
  filteredChannels = filtered;
  if(currentIndex >= filteredChannels.length) currentIndex = Math.max(0, filteredChannels.length-1);
  renderStrip();
  updateSidebarActive();
  document.getElementById('channelCount').innerText = filteredChannels.length+' channels';
  if(filteredChannels.length && !isPlaying) updateNowPlaying(filteredChannels[currentIndex]);
}
function renderStrip() {
  stripInner.innerHTML = '';
  filteredChannels.forEach((ch, idx) => {
    const tile = document.createElement('div');
    tile.className = 'channel-tile';
    if(idx === currentIndex) tile.classList.add('active');
    if(ch.url === currentPlayingUrl && isPlaying) tile.classList.add('playing');
    const img = document.createElement('img');
    img.src = ch.logo || 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white"%3E%3Cpath d="M4 6h16v12H4z"/%3E%3C/svg%3E';
    img.onerror = () => { img.style.display='none'; tile.style.background='#222'; tile.innerHTML += '<div style="font-size:32px;line-height:110px;text-align:center;">📺</div>'; };
    tile.appendChild(img);
    const nameDiv = document.createElement('div');
    nameDiv.className = 'tile-name';
    nameDiv.innerText = ch.name;
    tile.appendChild(nameDiv);
    const favStar = document.createElement('div');
    favStar.className = 'fav-star';
    favStar.innerText = '★';
    if(favs.has(ch.url)) favStar.style.display = 'block';
    tile.appendChild(favStar);
    tile.onclick = () => { currentIndex = idx; updateStripFocus(); playChannel(filteredChannels[currentIndex]); };
    stripInner.appendChild(tile);
  });
  scrollToTile();
}
function updateStripFocus() {
  const tiles = document.querySelectorAll('.channel-tile');
  tiles.forEach((t,i)=>{
    t.classList.toggle('active', i===currentIndex);
    if(filteredChannels[i]) {
      const star = t.querySelector('.fav-star');
      if(star) star.style.display = favs.has(filteredChannels[i].url) ? 'block' : 'none';
      t.classList.toggle('playing', filteredChannels[i].url === currentPlayingUrl && isPlaying);
    }
  });
  if(filteredChannels[currentIndex]) updateNowPlaying(filteredChannels[currentIndex]);
}
function scrollToTile() {
  const tile = document.querySelector('.channel-tile.active');
  if(tile) tile.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}
function updateNowPlaying(ch) {
  nowPlayingTitle.innerText = ch.name;
  nowPlayingGroup.innerText = ch.group || '';
}
function updateSidebarActive() {
  document.querySelectorAll('.sidebar-category').forEach(el=>el.classList.remove('active'));
  const selector = `[data-cat="${activeCategory}"]`;
  const activeEl = document.querySelector(selector);
  if(activeEl) activeEl.classList.add('active');
  else document.querySelector('[data-cat="all"]').classList.add('active');
}

// Shaka Player
async function initShaka() {
  await shaka.polyfill.installAll();
  if(shaka.Player.isBrowserSupported()) {
    player = new shaka.Player(video);
    player.configure({ abr: { enabled: true }, streaming: { bufferingGoal: 12 } });
    player.addEventListener('error', (e) => { setStatus('Stream error', false); isPlaying=false; });
    video.addEventListener('playing', ()=>{ isPlaying=true; updateStripFocus(); setStatus('Playing'); });
  } else toast('Shaka not supported','err');
}
async function playChannel(ch) {
  if(!player || !ch?.url) return;
  if(ch.url === currentPlayingUrl && isPlaying) return;
  currentPlayingUrl = ch.url;
  localStorage.setItem('jioplayer_last', ch.url);
  setStatus('Connecting...');
  try {
    await player.load(ch.url);
    await video.play();
    isPlaying = true;
    setStatus('Streaming');
    updateStripFocus();
  } catch(e) { setStatus('Failed', false); toast(e.message.slice(0,60),'err'); isPlaying=false; }
}
function toggleFav() {
  const ch = filteredChannels[currentIndex];
  if(!ch) return;
  if(favs.has(ch.url)) { favs.delete(ch.url); toast('Removed from favs'); }
  else { favs.add(ch.url); toast('Added to favourites','ok'); }
  saveFavs();
  if(activeCategory === 'favs') applyFiltersAndRender();
  else updateStripFocus();
}
function cycleAspect() {
  aspectMode = (aspectMode+1)%3;
  video.style.objectFit = aspectMode===0 ? 'contain' : aspectMode===1 ? 'cover' : 'fill';
  toast(['Contain','Cover','Fill'][aspectMode]);
}

// UI Events & Navigation
function openSearch() { searchContainer.classList.add('open'); searchInput.focus(); zone='search'; }
function closeSearch() { searchContainer.classList.remove('open'); searchQuery=''; searchInput.value=''; applyFiltersAndRender(); zone='strip'; }
searchInput.addEventListener('input', ()=>{ searchQuery = searchInput.value; applyFiltersAndRender(); });

function openOverlay() { overlayDiv.classList.add('open'); zone='overlay'; }
function closeOverlay() { overlayDiv.classList.remove('open'); zone='strip'; }
document.getElementById('closeOverlayBtn').onclick = closeOverlay;

// Dialer
function openDialer() { dialerModal.classList.add('open'); zone='modal'; dialString=''; dialNumber.innerText='—'; }
function closeDialer() { dialerModal.classList.remove('open'); zone='strip'; }
function dialKey(d) {
  if(d==='clr') dialString = dialString.slice(0,-1);
  else if(d==='go') {
    const n = parseInt(dialString,10);
    closeDialer();
    if(!isNaN(n) && n>=1 && n<=filteredChannels.length) {
      currentIndex = n-1;
      scrollToTile(); updateStripFocus();
      playChannel(filteredChannels[currentIndex]);
    } else toast('Invalid number','err');
    return;
  } else if(dialString.length<4) dialString+=d;
  dialNumber.innerText = dialString||'—';
}
// build dialer grid
const dialGrid = document.getElementById('dialGrid');
dialGrid.innerHTML = '123456789'.split('').map(d=>`<button class="dialer-btn" data-d="${d}">${d}</button>`).join('') +
  `<button class="dialer-btn" data-d="clr">⌫</button><button class="dialer-btn" data-d="0">0</button><button class="dialer-btn" data-d="go">▶ Go</button>`;
document.querySelectorAll('.dialer-btn').forEach(btn=>btn.addEventListener('click',()=>dialKey(btn.dataset.d)));

// Sidebar category click
document.querySelectorAll('.sidebar-category').forEach(el=>{
  el.addEventListener('click', ()=>{
    const cat = el.dataset.cat;
    if(cat === 'settings') openOverlay();
    else if(cat === 'sources') openOverlay();
    else { activeCategory = cat; searchQuery=''; searchInput.value=''; closeSearch(); applyFiltersAndRender(); zone='strip'; }
  });
});

// Keyboard navigation (TV remote)
window.addEventListener('keydown', (e)=>{
  const key = e.key;
  if(key === 'ArrowLeft' && zone==='strip') {
    if(filteredChannels.length) currentIndex = (currentIndex-1+filteredChannels.length)%filteredChannels.length;
    scrollToTile(); updateStripFocus(); e.preventDefault();
  } else if(key === 'ArrowRight' && zone==='strip') {
    if(filteredChannels.length) currentIndex = (currentIndex+1)%filteredChannels.length;
    scrollToTile(); updateStripFocus(); e.preventDefault();
  } else if(key === 'ArrowUp' && zone==='strip') { zone='sidebar'; document.querySelector('.sidebar-category.active')?.focus(); e.preventDefault(); }
  else if(key === 'ArrowDown' && zone==='sidebar') { zone='strip'; updateStripFocus(); e.preventDefault(); }
  else if(key === 'Enter' && zone==='strip') { if(filteredChannels[currentIndex]) playChannel(filteredChannels[currentIndex]); e.preventDefault(); }
  else if(key === 'Escape') {
    if(document.fullscreenElement) document.exitFullscreen();
    else if(zone==='search') closeSearch();
    else if(zone==='overlay') closeOverlay();
    else if(zone==='modal') closeDialer();
  }
  else if(key === 'f' || key === 'F') { toggleFav(); e.preventDefault(); }
  else if(key === 'd') { openDialer(); e.preventDefault(); }
  else if(key === 's') { openSearch(); e.preventDefault(); }
  // color keys simulation (red, green, yellow, blue)
  if(e.keyCode === 403) { activeCategory = (activeCategory==='all'?'favs':'all'); applyFiltersAndRender(); e.preventDefault(); }
  if(e.keyCode === 404) { openSearch(); e.preventDefault(); }
  if(e.keyCode === 405) { cycleAspect(); e.preventDefault(); }
  if(e.keyCode === 406) { video.requestFullscreen(); e.preventDefault(); }
});
// volume keys
window.addEventListener('keydown', (e)=>{
  if(e.key === 'VolumeUp' || e.keyCode === 447) { volUp(); e.preventDefault(); }
  if(e.key === 'VolumeDown' || e.keyCode === 448) { volDown(); e.preventDefault(); }
  if(e.key === 'VolumeMute' || e.keyCode === 449) { video.muted = !video.muted; setVolume(currentVolume); e.preventDefault(); }
});

// Clock
function updateClock() {
  const d = new Date();
  clockDiv.innerText = d.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit', hour12:true});
}
setInterval(updateClock, 1000); updateClock();

// Boot
(async function boot() {
  loadFavs();
  customPlaylists = JSON.parse(localStorage.getItem('jioplayer_pls') || '[]');
  await initShaka();
  await loadAllSources();
  // restore last channel
  const last = localStorage.getItem('jioplayer_last');
  if(last) {
    const idx = filteredChannels.findIndex(c=>c.url===last);
    if(idx>=0) { currentIndex = idx; updateStripFocus(); playChannel(filteredChannels[currentIndex]); }
  }
  setVolume(50);
})();
</script>
