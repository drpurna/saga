<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; media-src * blob:; img-src * data: blob:;">
  <title>MONOCHROME IPTV</title>
  <!-- Shaka Player & Cache modules (provided externally) -->
  <script src="./shaka.js"></script>
  <script src="./cache.js"></script>
  <style>
    /* ============================================================
       MONOCHROME THEME | HARDWARE ACCELERATION | THREE-COLUMN LAYOUT
       Left: Categories (vertical)
       Middle: Channel Grid
       Right: Mini Player + EPG (bottom)
       ============================================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-dark: #0a0a0a;
      --bg-panel: #111111;
      --bg-elevated: #1a1a1a;
      --border-subtle: rgba(255,255,255,0.08);
      --border-focus: rgba(255,255,255,0.5);
      --text-primary: #ffffff;
      --text-secondary: #aaaaaa;
      --text-muted: #5a5a5a;
      --accent: #cccccc;
      --focus-glow: rgba(255,255,255,0.2);
      --tile-bg: #181818;
      --transition-fast: 0.12s ease;
    }

    body {
      background: var(--bg-dark);
      color: var(--text-primary);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      font-weight: 500;
      -webkit-font-smoothing: antialiased;
    }

    /* hardware acceleration base */
    #app, .category-list, .channel-grid, .player-panel, .epg-panel {
      transform: translateZ(0);
      will-change: transform;
      backface-visibility: hidden;
    }

    /* === MAIN LAYOUT: 3 columns === */
    .app-layout {
      display: flex;
      height: 100vh;
      width: 100%;
      background: var(--bg-dark);
    }

    /* LEFT COLUMN: Categories + Playlist Selector Top */
    .left-col {
      width: 260px;
      background: var(--bg-panel);
      border-right: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      z-index: 2;
    }

    /* playlist selector (left top) */
    .playlist-selector {
      padding: 20px 16px 12px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .playlist-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    #playlistDropdown {
      width: 100%;
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      color: var(--text-primary);
      padding: 12px 12px;
      font-size: 13px;
      font-weight: 500;
      border-radius: 6px;
      outline: none;
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    #playlistDropdown:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 2px var(--focus-glow);
    }

    /* categories vertical list */
    .categories-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px 8px;
      scrollbar-width: thin;
    }
    .category-item {
      padding: 12px 16px;
      margin: 4px 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      border-radius: 8px;
      cursor: pointer;
      transition: all var(--transition-fast);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      background: transparent;
      border: none;
      width: calc(100% - 16px);
      text-align: left;
    }
    .category-item:focus {
      outline: 2px solid var(--border-focus);
      outline-offset: -2px;
      background: rgba(255,255,255,0.05);
    }
    .category-item.active {
      background: var(--bg-elevated);
      color: var(--text-primary);
      border-left: 3px solid var(--accent);
    }
    .category-count {
      float: right;
      font-size: 11px;
      color: var(--text-muted);
    }

    /* MIDDLE COLUMN: Channel Grid */
    .middle-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-dark);
      min-width: 0;
      position: relative;
    }
    .grid-header {
      padding: 16px 20px 8px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .grid-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .fav-badge {
      background: var(--bg-elevated);
      padding: 6px 12px;
      border-radius: 40px;
      font-size: 12px;
      color: var(--text-secondary);
    }
    .channel-grid-wrapper {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
      scroll-behavior: smooth;
    }
    .channel-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 14px;
    }
    /* channel tile (monochrome, hardware accelerated) */
    .channel-tile {
      background: var(--tile-bg);
      border: 2px solid transparent;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.1s ease, border-color 0.1s;
      position: relative;
      aspect-ratio: 16 / 9;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: translateZ(0);
      will-change: transform;
    }
    .channel-tile:focus {
      outline: none;
      border-color: var(--accent);
      transform: scale(1.02);
      box-shadow: 0 0 0 2px var(--focus-glow);
    }
    .channel-tile.selected {
      border-color: #ffffff;
      transform: scale(1.02);
      box-shadow: 0 4px 14px rgba(0,0,0,0.5);
    }
    .tile-logo {
      width: 80%;
      height: auto;
      max-height: 70%;
      object-fit: contain;
      filter: grayscale(0.2);
      transition: filter 0.2s;
    }
    .tile-name {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.9));
      padding: 28px 6px 8px;
      font-size: 11px;
      font-weight: 600;
      text-align: center;
      color: white;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .fav-star {
      position: absolute;
      top: 6px;
      right: 8px;
      font-size: 14px;
      color: #ddd;
      text-shadow: 0 0 2px black;
      z-index: 2;
    }
    /* RIGHT COLUMN: Mini Player + EPG */
    .right-col {
      width: 380px;
      background: var(--bg-panel);
      border-left: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      z-index: 2;
    }
    .mini-player {
      background: #000000;
      aspect-ratio: 16 / 9;
      position: relative;
      background: #000;
      border-bottom: 1px solid var(--border-subtle);
    }
    #miniVideo {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: black;
    }
    .player-controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      padding: 10px 12px;
      background: var(--bg-elevated);
      border-bottom: 1px solid var(--border-subtle);
    }
    .ctrl-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-size: 18px;
      cursor: pointer;
      padding: 6px;
      border-radius: 30px;
      transition: all 0.1s;
      width: 36px;
    }
    .ctrl-btn:focus, .ctrl-btn:hover {
      color: white;
      outline: 1px solid var(--border-focus);
    }
    .epg-panel {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      background: var(--bg-panel);
    }
    .epg-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 12px;
      border-left: 3px solid var(--accent);
      padding-left: 10px;
    }
    .epg-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .epg-item {
      background: var(--bg-elevated);
      border-radius: 10px;
      padding: 10px 12px;
      border-left: 2px solid var(--accent);
    }
    .epg-time {
      font-size: 10px;
      color: var(--text-muted);
      font-weight: 500;
    }
    .epg-name {
      font-size: 13px;
      font-weight: 600;
      margin-top: 4px;
      color: white;
    }
    .epg-desc {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 4px;
    }
    .status-bar {
      padding: 6px 12px;
      font-size: 10px;
      color: var(--text-muted);
      background: #0e0e0e;
      text-align: center;
      border-top: 1px solid var(--border-subtle);
    }
    /* misc */
    .toast-msg {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e1e1e;
      border: 1px solid #333;
      padding: 8px 20px;
      border-radius: 40px;
      font-size: 13px;
      z-index: 9999;
      pointer-events: none;
      backdrop-filter: blur(8px);
    }
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #3a3a3a;
      border-radius: 6px;
    }
  </style>
</head>
<body>
<div id="app" class="app-layout">
  <!-- LEFT COLUMN: categories + playlist selector top -->
  <div class="left-col">
    <div class="playlist-selector">
      <div class="playlist-label">📡 PLAYLIST SOURCE</div>
      <select id="playlistDropdown" tabindex="0"></select>
    </div>
    <div class="categories-container" id="categoriesList">
      <!-- dynamic categories (vertical) -->
    </div>
    <div class="status-bar" style="margin-top:auto; border-top:1px solid var(--border-subtle);">
      <span id="channelCountStatus">0 channels</span>
    </div>
  </div>

  <!-- MIDDLE COLUMN: Channel Grid -->
  <div class="middle-col">
    <div class="grid-header">
      <div class="grid-title" id="currentCategoryName">All Channels</div>
      <div class="fav-badge" id="favCounter">⭐ 0</div>
    </div>
    <div class="channel-grid-wrapper" id="channelGridWrapper">
      <div class="channel-grid" id="channelGrid"></div>
    </div>
  </div>

  <!-- RIGHT COLUMN: Mini Player + EPG -->
  <div class="right-col">
    <div class="mini-player">
      <video id="miniVideo" playsinline autoplay muted></video>
    </div>
    <div class="player-controls">
      <button class="ctrl-btn" id="ctrlPlayPause" tabindex="0">⏯</button>
      <button class="ctrl-btn" id="ctrlMute" tabindex="0">🔊</button>
      <button class="ctrl-btn" id="ctrlAspect" tabindex="0">⏺</button>
      <button class="ctrl-btn" id="ctrlFav" tabindex="0">⭐</button>
      <button class="ctrl-btn" id="ctrlFull" tabindex="0">⛶</button>
    </div>
    <div class="epg-panel">
      <div class="epg-title">📺 ELECTRONIC PROGRAM GUIDE</div>
      <div id="epgContainer" class="epg-list">
        <div class="epg-item">Select a channel to view EPG</div>
      </div>
    </div>
  </div>
</div>
<div id="toastMsg" class="toast-msg" style="display:none"></div>

<script>
  (function(){
    'use strict';

    // ---------- GLOBALS ----------
    let allChannels = [];           // full list {name, url, logo, group, srcId}
    let filteredChannels = [];
    let categories = ['All'];
    let activeCategory = 'All';
    let selectedChannelIndex = 0;
    let favourites = new Set();
    let playlists = [];             // { name, url, builtIn }
    let activePlaylistUrl = null;
    let shakaPlayer = null;
    let videoEl = document.getElementById('miniVideo');
    let isPlaying = false;
    let currentChannelUrl = '';
    let aspectMode = 0; // 0 contain,1 fill,2 stretch
    let isMuted = false;
    let currentVolume = 70;

    // DOM elements
    const playlistDropdown = document.getElementById('playlistDropdown');
    const categoriesDiv = document.getElementById('categoriesList');
    const channelGrid = document.getElementById('channelGrid');
    const gridWrapper = document.getElementById('channelGridWrapper');
    const currentCategoryNameSpan = document.getElementById('currentCategoryName');
    const favCounterSpan = document.getElementById('favCounter');
    const channelCountStatus = document.getElementById('channelCountStatus');
    const epgContainer = document.getElementById('epgContainer');
    const toastDiv = document.getElementById('toastMsg');

    // Built-in sources (monochrome ready)
    const BUILTIN_PLAYLISTS = [
      { name: 'Telugu (IPTV-org)', url: 'https://iptv-org.github.io/iptv/languages/tel.m3u', builtIn: true, srcId: 'telugu' },
      { name: 'Jio Playlist', url: 'https://jioplaylist.joinus-apiworker.workers.dev/playlist.m3u', builtIn: true, srcId: 'jio' }
    ];

    // Helper: toast
    function toast(msg, duration = 2000) {
      toastDiv.textContent = msg;
      toastDiv.style.display = 'block';
      setTimeout(() => { toastDiv.style.display = 'none'; }, duration);
    }

    // Load favourites from localStorage
    function loadFavs() {
      try {
        const f = localStorage.getItem('mono:favs');
        if(f) favourites = new Set(JSON.parse(f));
      } catch(e) {}
      updateFavUI();
    }
    function saveFavs() {
      localStorage.setItem('mono:favs', JSON.stringify([...favourites]));
      updateFavUI();
    }
    function toggleFav(channel) {
      if(favourites.has(channel.url)) favourites.delete(channel.url);
      else favourites.add(channel.url);
      saveFavs();
      renderChannelGrid();
      toast(favourites.has(channel.url) ? '⭐ Added to favourites' : '☆ Removed from favourites');
    }
    function updateFavUI() {
      const totalFavs = [...favourites].filter(url => allChannels.some(c => c.url === url)).length;
      favCounterSpan.innerHTML = `⭐ ${totalFavs}`;
    }

    // EPG mock (real EPG can be extended, but we show demo data based on channel name)
    function generateEPGForChannel(channel) {
      if(!channel) {
        epgContainer.innerHTML = '<div class="epg-item">Select a channel to view EPG</div>';
        return;
      }
      const now = new Date();
      const timeStr = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      const epgMock = [
        { start: timeStr, end: addMinutes(now, 30), title: `${channel.name} - Live Now`, desc: "Current broadcast • High quality stream" },
        { start: addMinutes(now, 30), end: addMinutes(now, 90), title: `${channel.name} - Next Program`, desc: "Upcoming show • Stay tuned" }
      ];
      function addMinutes(d, m) { let nd = new Date(d); nd.setMinutes(nd.getMinutes()+m); return nd.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }
      epgContainer.innerHTML = epgMock.map(e => `
        <div class="epg-item">
          <div class="epg-time">${e.start} – ${e.end}</div>
          <div class="epg-name">${escapeHtml(e.title)}</div>
          <div class="epg-desc">${escapeHtml(e.desc)}</div>
        </div>
      `).join('');
    }
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // parse M3U with chunking (using AppCache)
    function parseM3UChunked(text, sourceId, onDone) {
      const lines = text.split(/\r?\n/);
      let channels = [];
      let cur = null;
      const chunkSize = 500;
      let idx = 0;
      function processChunk() {
        const end = Math.min(idx+chunkSize, lines.length);
        for(; idx<end; idx++) {
          const l = lines[idx].trim();
          if(l.startsWith('#EXTINF')) {
            const nameMatch = l.match(/tvg-name="([^"]*)"/i) || l.match(/,(.+)$/);
            let name = (nameMatch ? (nameMatch[1] || nameMatch[2]) : 'Channel');
            if(name.includes(',')) name = name.split(',').pop();
            name = name.trim() || 'Channel';
            const logo = (l.match(/tvg-logo="([^"]*)"/i) || [])[1] || '';
            const group = (l.match(/group-title="([^"]*)"/i) || [])[1] || 'General';
            cur = { name, logo, group, url: '', srcId: sourceId };
          } else if(l && !l.startsWith('#') && cur) {
            if(l.startsWith('http')) {
              cur.url = l;
              channels.push(cur);
              cur = null;
            }
          }
        }
        if(idx < lines.length) requestIdleCallback(processChunk, {timeout: 40});
        else onDone(channels);
      }
      processChunk();
    }

    // Load a playlist
    async function loadPlaylist(playlist) {
      if(!playlist) return;
      toast(`Loading ${playlist.name} ...`);
      try {
        let cached = await AppCache.getM3U(playlist.url);
        let m3uText = cached;
        if(!m3uText) {
          const resp = await fetch(playlist.url, { signal: AbortSignal.timeout(18000) });
          if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
          m3uText = await resp.text();
          await AppCache.setM3U(playlist.url, m3uText);
        }
        parseM3UChunked(m3uText, playlist.srcId || playlist.name, (newChs) => {
          if(playlist.builtIn) {
            // merge: for built-in we replace all channels from that source? Actually we keep all channels from multiple sources
            // For simplicity: we remove previous channels from this srcId then add fresh
            allChannels = allChannels.filter(c => c.srcId !== playlist.srcId);
            newChs.forEach(ch => { ch.srcId = playlist.srcId; });
            allChannels.push(...newChs);
          } else {
            // custom playlist: just add
            newChs.forEach(ch => { ch.srcId = 'custom'; });
            allChannels.push(...newChs);
          }
          rebuildCategories();
          applyFilterAndRender();
          toast(`✅ ${newChs.length} channels from ${playlist.name}`);
          if(allChannels.length && !isPlaying) {
            selectedChannelIndex = 0;
            renderChannelGrid();
            scrollToSelected();
          }
        });
      } catch(e) {
        toast(`Failed: ${playlist.name} - ${e.message}`);
      }
    }

    function rebuildCategories() {
      const groups = new Set(allChannels.map(c => c.group || 'General'));
      categories = ['All', ...Array.from(groups).sort()];
      renderCategoryList();
    }

    function renderCategoryList() {
      if(!categoriesDiv) return;
      const counts = new Map();
      allChannels.forEach(ch => { const g = ch.group || 'General'; counts.set(g, (counts.get(g)||0)+1); });
      categoriesDiv.innerHTML = categories.map(cat => {
        let count = (cat === 'All') ? allChannels.length : (counts.get(cat) || 0);
        return `<button class="category-item ${activeCategory === cat ? 'active' : ''}" data-category="${escapeHtml(cat)}" tabindex="0">
                  <span>${escapeHtml(cat)}</span> <span class="category-count">${count}</span>
                </button>`;
      }).join('');
      // attach events
      document.querySelectorAll('.category-item').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const cat = btn.dataset.category;
          setActiveCategory(cat);
        });
      });
    }

    function setActiveCategory(cat) {
      activeCategory = cat;
      renderCategoryList();
      applyFilterAndRender();
      currentCategoryNameSpan.innerText = cat === 'All' ? 'All Channels' : cat;
    }

    function applyFilterAndRender() {
      let filtered = [...allChannels];
      if(activeCategory !== 'All') {
        filtered = filtered.filter(ch => (ch.group || 'General') === activeCategory);
      }
      filteredChannels = filtered;
      channelCountStatus.innerText = `${filteredChannels.length} channels`;
      if(selectedChannelIndex >= filteredChannels.length) selectedChannelIndex = Math.max(0, filteredChannels.length-1);
      renderChannelGrid();
      updateFavUI();
      if(filteredChannels.length > 0 && !isPlaying) {
        generateEPGForChannel(filteredChannels[selectedChannelIndex]);
      }
    }

    function renderChannelGrid() {
      if(!channelGrid) return;
      channelGrid.innerHTML = filteredChannels.map((ch, idx) => {
        const isFav = favourites.has(ch.url);
        const isSelected = (idx === selectedChannelIndex);
        return `<div class="channel-tile ${isSelected ? 'selected' : ''}" data-index="${idx}" tabindex="0">
                  ${ch.logo ? `<img class="tile-logo" src="${escapeHtml(ch.logo)}" loading="lazy" onerror="this.style.display='none'">` : '<div style="font-size:24px;">📺</div>'}
                  <div class="tile-name">${escapeHtml(ch.name)}</div>
                  <div class="fav-star">${isFav ? '⭐' : ''}</div>
                </div>`;
      }).join('');
      // attach events
      document.querySelectorAll('.channel-tile').forEach(tile => {
        tile.addEventListener('click', (e) => {
          const idx = parseInt(tile.dataset.index);
          if(!isNaN(idx)) playChannelByIndex(idx);
        });
      });
      // scroll to selected
      scrollToSelected();
    }

    function scrollToSelected() {
      const tiles = document.querySelectorAll('.channel-tile');
      if(tiles[selectedChannelIndex]) {
        tiles[selectedChannelIndex].focus({preventScroll: false});
        tiles[selectedChannelIndex].scrollIntoView({block: 'nearest', behavior: 'smooth'});
      }
    }

    async function playChannelByIndex(idx) {
      if(!filteredChannels.length) return;
      selectedChannelIndex = idx;
      renderChannelGrid();
      const channel = filteredChannels[selectedChannelIndex];
      if(!channel || !channel.url) return;
      if(shakaPlayer && currentChannelUrl === channel.url && isPlaying) return;
      currentChannelUrl = channel.url;
      try {
        if(!shakaPlayer) await initShaka();
        await shakaPlayer.load(channel.url);
        await videoEl.play();
        isPlaying = true;
        document.getElementById('ctrlPlayPause').textContent = '⏸';
        generateEPGForChannel(channel);
        toast(`Now playing: ${channel.name}`);
        // hardware accelerated stream
      } catch(err) {
        console.warn(err);
        toast(`Playback error: ${err.message.slice(0,60)}`);
        isPlaying = false;
      }
    }

    async function initShaka() {
      await shaka.polyfill.installAll();
      if(shaka.Player.isBrowserSupported()) {
        shakaPlayer = new shaka.Player(videoEl);
        shakaPlayer.configure({
          abr: { enabled: true, defaultBandwidthEstimate: 8000000 },
          streaming: { bufferingGoal: 12, rebufferingGoal: 2 }
        });
        shakaPlayer.addEventListener('error', (e) => toast(`Stream error: ${e.detail.message}`));
        videoEl.addEventListener('playing', () => { isPlaying = true; });
        videoEl.addEventListener('pause', () => { isPlaying = false; });
        return true;
      } else {
        toast('Shaka not supported');
        return false;
      }
    }

    // UI controls
    function togglePlayPause() {
      if(!shakaPlayer) return;
      if(videoEl.paused) { videoEl.play(); isPlaying = true; document.getElementById('ctrlPlayPause').textContent = '⏸'; }
      else { videoEl.pause(); isPlaying = false; document.getElementById('ctrlPlayPause').textContent = '▶'; }
    }
    function toggleMute() {
      isMuted = !isMuted;
      videoEl.muted = isMuted;
      document.getElementById('ctrlMute').textContent = isMuted ? '🔇' : '🔊';
    }
    function cycleAspect() {
      aspectMode = (aspectMode+1) % 3;
      if(aspectMode === 0) videoEl.style.objectFit = 'contain';
      if(aspectMode === 1) videoEl.style.objectFit = 'fill';
      if(aspectMode === 2) videoEl.style.objectFit = 'cover';
      toast(['Contain','Fill','Cover'][aspectMode]);
    }
    function toggleFullscreen() {
      const container = document.querySelector('.right-col');
      if (!document.fullscreenElement) {
        container.requestFullscreen().catch(e=>{});
      } else {
        document.exitFullscreen();
      }
    }
    function favouriteCurrent() {
      const ch = filteredChannels[selectedChannelIndex];
      if(ch) toggleFav(ch);
    }

    // playlist dropdown management
    function refreshPlaylistDropdown() {
      playlistDropdown.innerHTML = '';
      const allSources = [...BUILTIN_PLAYLISTS, ...playlists];
      allSources.forEach(pl => {
        const option = document.createElement('option');
        option.value = pl.url;
        option.textContent = pl.name;
        if(activePlaylistUrl === pl.url) option.selected = true;
        playlistDropdown.appendChild(option);
      });
      playlistDropdown.onchange = async () => {
        const selectedUrl = playlistDropdown.value;
        const selectedPl = allSources.find(s => s.url === selectedUrl);
        if(selectedPl) {
          activePlaylistUrl = selectedPl.url;
          // For simplicity, reset all channels and load only selected playlist (clear previous)
          allChannels = [];
          await loadPlaylist(selectedPl);
          applyFilterAndRender();
        }
      };
    }

    // load initial data (Telugu + Jio)
    async function bootstrap() {
      loadFavs();
      // load custom playlists from storage
      try {
        const stored = localStorage.getItem('mono:playlists');
        if(stored) playlists = JSON.parse(stored);
      } catch(e) {}
      refreshPlaylistDropdown();
      await initShaka();
      // load default first playlist (Telugu)
      const defaultPl = BUILTIN_PLAYLISTS[0];
      activePlaylistUrl = defaultPl.url;
      await loadPlaylist(defaultPl);
      applyFilterAndRender();
      if(filteredChannels.length) playChannelByIndex(0);
      // hardware acceleration hint
      videoEl.style.transform = 'translateZ(0)';
      // keyboard navigation for D-pad
      window.addEventListener('keydown', handleKeyNav);
    }

    function handleKeyNav(e) {
      const key = e.key;
      if(key === 'ArrowUp') {
        e.preventDefault();
        if(selectedChannelIndex > 0) { selectedChannelIndex--; renderChannelGrid(); scrollToSelected(); generateEPGForChannel(filteredChannels[selectedChannelIndex]); }
      } else if(key === 'ArrowDown') {
        e.preventDefault();
        if(selectedChannelIndex < filteredChannels.length-1) { selectedChannelIndex++; renderChannelGrid(); scrollToSelected(); generateEPGForChannel(filteredChannels[selectedChannelIndex]); }
      } else if(key === 'ArrowLeft') {
        e.preventDefault();
        const prevRow = selectedChannelIndex - Math.floor(channelGrid.clientWidth / 180);
        if(prevRow >= 0) { selectedChannelIndex = prevRow; renderChannelGrid(); scrollToSelected(); generateEPGForChannel(filteredChannels[selectedChannelIndex]); }
      } else if(key === 'ArrowRight') {
        e.preventDefault();
        const nextRow = selectedChannelIndex + Math.floor(channelGrid.clientWidth / 180);
        if(nextRow < filteredChannels.length) { selectedChannelIndex = nextRow; renderChannelGrid(); scrollToSelected(); generateEPGForChannel(filteredChannels[selectedChannelIndex]); }
      } else if(key === 'Enter' || key === ' ') {
        e.preventDefault();
        playChannelByIndex(selectedChannelIndex);
      } else if(key === 'f' || key === 'F') {
        favouriteCurrent();
      } else if(key === 'm' || key === 'M') {
        toggleMute();
      } else if(key === 'Escape') {
        if(document.fullscreenElement) document.exitFullscreen();
      }
    }

    // attach control buttons
    document.getElementById('ctrlPlayPause').addEventListener('click', togglePlayPause);
    document.getElementById('ctrlMute').addEventListener('click', toggleMute);
    document.getElementById('ctrlAspect').addEventListener('click', cycleAspect);
    document.getElementById('ctrlFav').addEventListener('click', favouriteCurrent);
    document.getElementById('ctrlFull').addEventListener('click', toggleFullscreen);
    videoEl.volume = 0.7;
    videoEl.addEventListener('volumechange', () => { isMuted = videoEl.muted; });

    bootstrap();
  })();
</script>
</body>
</html>
