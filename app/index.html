<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>SAGA IPTV</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>

<div class="app">
  <!-- ═══ SIDEBAR ═══ -->
  <div class="sidebar" id="sidebar">

    <!-- Brand Bar -->
    <div class="brand">
      <div class="brand-logo">
        <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="5" width="26" height="18" rx="3" stroke="currentColor" stroke-width="2"/>
          <polyline points="8 23 14 19 20 23" stroke="currentColor" stroke-width="2"/>
          <circle cx="19" cy="10" r="2" fill="currentColor"/>
          <path d="M5 10 L13 15 L5 20 Z" fill="currentColor"/>
        </svg>
      </div>
      <div class="brand-title">SAGA<span>IPTV</span></div>
      <div class="brand-right">
        <div class="brand-clock" id="brandClock">--:--</div>
        <div class="network-indicator" id="networkIndicator" title="Network">
          <svg viewBox="0 0 24 24" fill="none" width="14" height="14">
            <path d="M1.5 8.5C6 4 18 4 22.5 8.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M5 12c3.9-3.9 11.1-3.9 15 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M8.5 15.5c2-2 5.5-2 7.5 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <circle cx="12" cy="19" r="1.5" fill="currentColor"/>
          </svg>
        </div>
      </div>
    </div>

    <!-- Search -->
    <div class="search-wrap" id="searchWrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none">
        <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/>
        <path d="M21 21L16.65 16.65" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search channels, groups..." autocomplete="off" spellcheck="false"/>
      <div class="search-clear" id="searchClear">✕</div>
    </div>

    <!-- Tabs -->
    <div class="tab-bar" id="tabBar"></div>

    <!-- List Header -->
    <div class="list-head">
      <div class="lbl" id="listLabel">CHANNELS</div>
      <div class="list-head-actions">
        <button class="icon-btn" id="addPlaylistBtn" title="Add Playlist">
          <svg viewBox="0 0 24 24" fill="none" width="16" height="16">
            <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </button>
        <div class="count-badge" id="countBadge">0</div>
      </div>
    </div>

    <!-- Channel List (Virtual Scroll) -->
    <div id="channelList"></div>

    <!-- Hint Bar -->
    <div class="hint-bar">
      <span class="hint-item"><span class="hint-btn red"></span>Tab</span>
      <span class="hint-item"><span class="hint-btn green"></span>Fav</span>
      <span class="hint-item"><span class="hint-btn yellow"></span>Search</span>
      <span class="hint-item"><span class="hint-btn blue"></span>Full</span>
      <span class="hint-item">0–9 Dial</span>
    </div>
  </div>

  <!-- ═══ PLAYER AREA ═══ -->
  <div class="player-area">

    <!-- Player Header -->
    <div class="player-header" id="playerHeader">
      <div class="now-playing-wrap">
        <div class="now-playing-label">NOW PLAYING</div>
        <div class="now-playing" id="nowPlaying">Select a channel</div>
        <div class="now-playing-ch" id="npChNum"></div>
      </div>
      <div class="player-controls">
        <!-- AV Sync inserted here by JS -->
        <button class="ar-btn" id="arBtn">
          <svg viewBox="0 0 24 24" fill="none" width="14" height="14"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/><path d="M9 9h6M9 12h6M9 15h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          Native
        </button>
        <div class="load-bar-wrap">
          <div class="load-bar" id="loadBar"></div>
        </div>
        <span class="status-badge idle" id="statusBadge">● IDLE</span>
      </div>
    </div>

    <!-- Video Container -->
    <div class="video-wrap" id="videoWrap">
      <video id="video" playsinline autoplay></video>

      <!-- Idle Overlay -->
      <div class="video-overlay" id="videoOverlay">
        <div class="overlay-icon">
          <svg viewBox="0 0 80 80" fill="none" width="80" height="80">
            <circle cx="40" cy="40" r="36" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
            <path d="M32 27L56 40L32 53V27Z" fill="rgba(255,255,255,0.5)"/>
          </svg>
        </div>
        <div class="overlay-hint">
          Press <strong>OK / ENTER</strong> to play selected channel<br/>
          <span>Use ▲▼ arrows to browse · Numbers to dial channel</span>
        </div>
      </div>

      <!-- Top Info Overlay -->
      <div class="overlay-top" id="overlayTop">
        <div class="time-date">
          <span id="currentTime">--:--</span>
          <span id="currentDate"></span>
        </div>
        <div class="weather-info" id="weatherInfo" style="display:none"></div>
      </div>

      <!-- Bottom Info Overlay -->
      <div class="overlay-bottom" id="overlayBottom">
        <div class="channel-details">
          <div class="channel-name" id="overlayChannelName"></div>
          <div class="channel-tech" id="overlayChannelTech"></div>
        </div>
        <div class="program-info" id="programInfoBox" style="display:none">
          <div class="program-title" id="overlayProgramTitle"></div>
          <div class="program-desc" id="overlayProgramDesc"></div>
          <div class="next-program" id="nextProgramInfo"></div>
        </div>
      </div>

      <!-- Fullscreen hint -->
      <div class="fs-hint" id="fsHint">← Back to list · OK to exit fullscreen</div>
    </div>

    <!-- Channel Dialer -->
    <div class="ch-dialer" id="chDialer">
      <div class="dialer-label">CH</div>
      <div class="dialer-number" id="chDialerNum">—</div>
    </div>

  </div><!-- /player-area -->
</div><!-- /app -->

<!-- ═══ MODALS ═══ -->

<!-- Add Playlist Modal -->
<div id="addPlaylistModal" class="modal">
  <div class="modal-content">
    <div class="modal-icon">
      <svg viewBox="0 0 24 24" fill="none" width="28" height="28">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="currentColor" stroke-width="2"/>
        <polyline points="14 2 14 8 20 8" stroke="currentColor" stroke-width="2"/>
        <line x1="12" y1="18" x2="12" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="9" y1="15" x2="15" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <h3>Add M3U Playlist</h3>
    <div class="modal-field">
      <label>Name</label>
      <input type="text" id="playlistName" placeholder="e.g. My Channels" autocomplete="off"/>
    </div>
    <div class="modal-field">
      <label>M3U URL</label>
      <input type="url" id="playlistUrl" placeholder="http://example.com/playlist.m3u" autocomplete="off"/>
    </div>
    <div class="modal-buttons">
      <button id="savePlaylistBtn" class="btn-primary">Add Playlist</button>
      <button id="cancelPlaylistBtn" class="btn-secondary">Cancel</button>
    </div>
  </div>
</div>

<!-- Xtream Login Modal -->
<div id="xtreamLoginModal" class="modal">
  <div class="modal-content">
    <div class="modal-icon xtream-icon">
      <svg viewBox="0 0 24 24" fill="none" width="28" height="28">
        <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke="currentColor" stroke-width="2"/>
        <path d="M2 12h5M17 12h5M12 2v5M12 17v5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <h3>Xtream Codes</h3>
    <div class="modal-field">
      <label>Server URL</label>
      <input type="url" id="xtreamServerUrl" placeholder="http://server:port" autocomplete="off"/>
    </div>
    <div class="modal-field">
      <label>Username</label>
      <input type="text" id="xtreamUsername" placeholder="Username" autocomplete="off"/>
    </div>
    <div class="modal-field">
      <label>Password</label>
      <input type="password" id="xtreamPassword" placeholder="Password" autocomplete="off"/>
    </div>
    <div class="xtream-status" id="xtreamLoginStatus"></div>
    <div class="xtream-account" id="xtreamAccountInfo"></div>
    <div class="modal-buttons">
      <button id="xtreamLoginBtn" class="btn-primary">
        <span>Connect</span>
      </button>
      <button id="xtreamCancelBtn" class="btn-secondary">Cancel</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<!-- Scripts -->
<script src="shaka.js"></script>
<script src="xtream.js"></script>
<script src="app.js"></script>

</body>
</html>
