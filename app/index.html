<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tizen TV</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- PLAYER CONTAINER -->
  <div id="player"></div>

  <!-- HEADER -->
  <div id="header">
    <div class="logo">Tizen TV</div>
    <div class="actions">
      <div class="icon" id="searchBtn">🔍</div>
      <div class="icon" id="addBtn">➕</div>
    </div>
  </div>

  <!-- UI GRID -->
  <div id="ui">
    <div id="overlay"></div>
    <div id="rows"></div>
  </div>

  <!-- FOOTER HELP -->
  <div class="footer">
    Use Arrows to navigate, Enter to play, Green=Playlist, Yellow=Search
  </div>

  <script src="app.js"></script>
</body>
</html>
