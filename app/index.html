<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miso IPTV</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <!-- Top row: categories -->
    <div class="top-row" id="topRow">
      <div class="category-bar" id="categoryBar"></div>
    </div>

    <!-- Left column: sidebar (channel list and controls) -->
    <aside class="sidebar" id="sidebar">
      <h1>Miso IPTV</h1>
      <div class="row">
        <input id="playlistUrl" type="text" placeholder="M3U URL..." />
      </div>
      <div class="row">
        <button id="loadBtn">Load Playlist</button>
      </div>
      <div class="row">
        <input id="searchInput" type="text" placeholder="Search channel..." />
      </div>
      <ul id="channelList"></ul>
    </aside>

    <!-- Right column: player area -->
    <main class="player-area" id="playerArea">
      <div class="player-header">
        <h2 id="nowPlaying">No channel selected</h2>
        <span id="statusText">Idle</span>
      </div>
      <video id="video" controls autoplay></video>
      <div class="help">
        <p>Remote: ↑↓ select channel, ←→ focus, Enter play, <strong>double‑click channel / Enter (while video focused) toggles fullscreen</strong>, Red focus URL, Green reload playlist.</p>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="./app.js"></script>
</body>
</html>
