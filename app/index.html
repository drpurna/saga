<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; media-src * blob: data:; img-src * data: blob:; connect-src *; style-src 'self' 'unsafe-inline';">
<title>SAGA IPTV</title>
<!-- Shaka Player from CDN (replaces missing shaka.js) -->
<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.11.0/dist/shaka-player.compiled.js"></script>
<style>
/*══════════════════════════════════════════════════════════════
  SAGA IPTV v35 — JioTV+ Style (Fully Self‑Contained)
══════════════════════════════════════════════════════════════*/
*,*::before,*::after{
  margin:0;padding:0;box-sizing:border-box;
  user-select:none;-webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
}
:root{
  --black:     #000;
  --w:         #fff;
  --w2:        rgba(255,255,255,.75);
  --w3:        rgba(255,255,255,.45);
  --w4:        rgba(255,255,255,.12);
  --accent:    #e50914;
  --accent2:   #ff4444;
  --yellow:    #f5c518;
  --green:     #00c853;
  --sep:       rgba(255,255,255,.12);
  --cw:  190px;
  --ch:  110px;
  --sw:  190px;
  --sh:  108px;
  --cgap: 14px;
  --topbar-h: 72px;
  --bottom-h: 310px;
  --dur:   120ms;
  --ease:  cubic-bezier(.4,0,.2,1);
  --spring:cubic-bezier(.22,1,.36,1);
}
html,body{
  width:100vw;height:100vh;overflow:hidden;
  background:#000;color:var(--w);
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
}
#root{
  width:100vw;height:100vh;
  position:relative;overflow:hidden;
  transform:translateZ(0);isolation:isolate;
}
#video{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;
  display:block;
  transform:translateZ(0);
  will-change:transform;
  backface-visibility:hidden;
  z-index:1;
}
#video.contain{object-fit:contain}
#video.stretch{object-fit:fill}
#vignette{
  position:absolute;inset:0;z-index:2;pointer-events:none;
  background:linear-gradient(to bottom,rgba(0,0,0,.72) 0%,rgba(0,0,0,.0) 18%,rgba(0,0,0,.0) 55%,rgba(0,0,0,.75) 78%,rgba(0,0,0,.95) 100%);
  transition:opacity 300ms;
}
#vignette.dim{opacity:.3}
#topBar{
  position:absolute;top:0;left:0;right:0;
  height:var(--topbar-h);
  z-index:30;
  display:flex;align-items:center;
  padding:0 48px;
  background:linear-gradient(to bottom,rgba(0,0,0,.78) 0%,transparent 100%);
  will-change:transform,opacity;
  transition:transform 320ms var(--spring), opacity 280ms;
}
#topBar.hidden{
  transform:translateY(-100%);
  opacity:0;pointer-events:none;
}
.brand{
  display:flex;align-items:center;gap:4px;
  margin-right:40px;flex-shrink:0;
}
.brand-jio{font-size:22px;font-weight:900;color:var(--w);letter-spacing:-.5px;}
.brand-tv{font-size:14px;font-weight:800;color:var(--w);background:var(--accent);padding:1px 5px;border-radius:4px;}
.brand-plus{font-size:18px;font-weight:900;color:var(--yellow);margin-left:1px;}
#navTabs{
  display:flex;align-items:center;gap:6px;
  flex:1;
  overflow-x:auto;
  scrollbar-width:none;
}
#navTabs::-webkit-scrollbar{display:none}
.ntab{
  height:36px;padding:0 18px;
  border:none;border-radius:18px;
  background:transparent;color:var(--w2);
  font-size:15px;font-weight:600;
  cursor:pointer;outline:none;
  white-space:nowrap;flex-shrink:0;
  transition:background var(--dur),color var(--dur);
}
.ntab.on{background:var(--w);color:#111;font-weight:700;}
.top-icons{
  display:flex;align-items:center;gap:12px;
  margin-left:24px;flex-shrink:0;
}
.top-icon{
  width:40px;height:40px;
  border-radius:50%;
  background:rgba(255,255,255,.12);
  border:none;cursor:pointer;outline:none;
  display:flex;align-items:center;justify-content:center;
  color:var(--w);
}
.top-icon svg{width:20px;height:20px;fill:currentColor}
.top-icon:focus{background:rgba(255,255,255,.24);outline:2px solid rgba(255,255,255,.5);}
#bottomPanel{
  position:absolute;bottom:0;left:0;right:0;
  height:var(--bottom-h);
  z-index:30;
  padding:0 0 16px;
  will-change:transform,opacity;
  transition:transform 320ms var(--spring), opacity 280ms;
}
#bottomPanel.hidden{
  transform:translateY(calc(100% + 20px));
  opacity:0;pointer-events:none;
}
.ch-row{padding:0 48px;margin-bottom:4px;}
.ch-row-label{
  font-size:16px;font-weight:700;color:var(--w);
  margin-bottom:12px;
  display:flex;align-items:center;gap:10px;
}
.ch-row-label-count{
  font-size:11px;font-weight:600;color:var(--w3);
  background:rgba(255,255,255,.1);
  border-radius:10px;padding:2px 8px;
}
.tile-strip{
  display:flex;gap:var(--cgap);
  will-change:transform;
  transition:transform 200ms var(--ease);
  overflow:visible;
  padding-bottom:4px;
}
.card{
  width:var(--cw);
  height:var(--ch);
  border-radius:12px;
  position:relative;flex-shrink:0;
  cursor:pointer;outline:none;
  background:#1a1a2e;
  border:2px solid rgba(255,255,255,.06);
  overflow:visible;
  transition:transform 180ms var(--spring), border-color 120ms;
  transform:scale(1) translateZ(0);
}
.card-inner{
  position:absolute;inset:0;
  border-radius:10px;
  overflow:hidden;
}
.card-bg{
  position:absolute;inset:-4px;
  background-size:cover;background-position:center;
  filter:blur(10px) brightness(.3) saturate(1.6);
  opacity:0;transition:opacity 400ms;
}
.card-bg.on{opacity:1}
.card-img{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:contain;
  padding:10px;
}
.card-badges{
  position:absolute;bottom:7px;right:7px;
  display:flex;gap:4px;z-index:4;
}
.badge{
  font-size:9px;font-weight:800;
  padding:2px 6px;border-radius:4px;
}
.badge-live{background:var(--accent);color:#fff}
.card-num{
  position:absolute;top:7px;left:8px;
  font-size:10px;color:rgba(255,255,255,.22);
}
.card.sel{
  border-color:rgba(255,255,255,.95);
  transform:scale(1.1) translateZ(0);
  z-index:10;
  box-shadow:0 0 0 3px rgba(255,255,255,.15),0 12px 40px rgba(0,0,0,.8);
}
.card.tvguide .card-inner{background:#1565c0}
.card.tvguide .card-guide-content{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
}
.card.tvguide .guide-icon{font-size:28px;color:#fff}
.card.tvguide .guide-label{font-size:13px;font-weight:700;color:#fff}
.show-card{
  width:var(--sw);height:var(--sh);
  border-radius:10px;
  position:relative;flex-shrink:0;
  cursor:pointer;outline:none;
  background:#222;
  border:2px solid rgba(255,255,255,.05);
  transition:transform 180ms var(--spring),border-color 120ms;
}
.show-card-inner{position:absolute;inset:0;border-radius:8px;overflow:hidden}
.show-card-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.show-card-grad{
  position:absolute;bottom:0;left:0;right:0;
  padding:24px 8px 7px;
  background:linear-gradient(transparent,rgba(0,0,0,.85));
  border-radius:0 0 8px 8px;
}
.show-card-name{font-size:11px;font-weight:700;color:#fff;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.show-card.sel{
  border-color:rgba(255,255,255,.9);
  transform:scale(1.1) translateZ(0);
  z-index:10;
  box-shadow:0 0 0 3px rgba(255,255,255,.15);
}
#nowInfo{
  position:absolute;
  bottom:calc(var(--bottom-h) + 16px);
  left:48px;
  z-index:20;
  max-width:600px;
  opacity:0;
  pointer-events:none;
  transition:opacity 300ms,transform 300ms var(--ease);
  transform:translateY(8px);
}
#nowInfo.visible{opacity:1;transform:none}
#nowTag{
  display:flex;align-items:center;gap:8px;
  font-size:12px;font-weight:700;letter-spacing:2px;
  color:rgba(255,255,255,.6);margin-bottom:8px;
}
.now-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--accent2);
  animation:npulse 2s infinite;
}
@keyframes npulse{0%,100%{opacity:1}50%{opacity:.3}}
#nowTitle{
  font-size:40px;font-weight:900;
  color:var(--w);line-height:1;
  text-shadow:0 4px 20px rgba(0,0,0,.8);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.now-pill{
  background:rgba(255,255,255,.15);
  backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.2);
  border-radius:5px;
  padding:4px 12px;
  font-size:12px;font-weight:700;color:var(--w);
}
#yellowPopup{
  position:absolute;inset:0;z-index:60;
  background:rgba(0,0,0,.82);
  backdrop-filter:blur(16px);
  display:none;align-items:center;justify-content:center;
}
#yellowPopup.on{display:flex}
.yp-card{
  background:rgba(16,16,28,.98);
  border:1px solid rgba(255,255,255,.18);
  border-radius:20px;
  padding:36px;
  width:480px;
  max-width:90vw;
}
.yp-header{
  display:flex;align-items:center;gap:12px;
  margin-bottom:28px;
  padding-bottom:20px;
  border-bottom:1px solid rgba(255,255,255,.1);
}
.yp-dot{
  width:12px;height:12px;border-radius:50%;
  background:var(--yellow);
}
.yp-title{font-size:20px;font-weight:800;color:var(--w)}
.yp-close{
  margin-left:auto;
  background:rgba(255,255,255,.1);border:none;
  color:var(--w3);font-size:18px;cursor:pointer;
  width:32px;height:32px;border-radius:50%;
}
.yp-actions{display:flex;flex-direction:column;gap:8px}
.yp-action{
  display:flex;align-items:center;gap:16px;
  padding:16px 18px;
  border-radius:12px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.09);
  cursor:pointer;outline:none;
  font-size:16px;font-weight:600;color:var(--w);
}
.yp-action:focus{background:rgba(255,255,255,.12);outline:2px solid rgba(255,255,255,.4);}
.yp-action-icon{
  width:40px;height:40px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;
}
#ypAddForm{display:none;flex-direction:column;gap:12px;margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,.1)}
#ypAddForm.open{display:flex}
.yp-input{
  width:100%;padding:12px 16px;border-radius:10px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  color:var(--w);font-size:15px;outline:none;
}
.yp-input:focus{border-color:rgba(255,255,255,.4);outline:2px solid rgba(255,255,255,.3);}
.yp-row{display:flex;gap:10px}
.yp-btn{
  flex:1;padding:12px;border-radius:10px;
  background:rgba(255,255,255,.08);color:var(--w);
  font-size:14px;font-weight:700;cursor:pointer;
}
.yp-btn-prim{background:var(--accent);border-color:var(--accent)}
#settingsOverlay{
  position:absolute;inset:0;z-index:55;
  background:rgba(0,0,0,.88);
  backdrop-filter:blur(18px);
  display:none;flex-direction:column;
}
#settingsOverlay.on{display:flex}
.so-hdr{
  display:flex;align-items:center;
  padding:28px 48px 20px;
  border-bottom:1px solid rgba(255,255,255,.1);
}
.so-title{font-size:24px;font-weight:800;color:var(--w);flex:1}
.so-close{
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  color:var(--w2);padding:8px 20px;border-radius:8px;cursor:pointer;
}
.so-body{display:flex;flex:1;overflow:hidden}
.so-side{width:260px;border-right:1px solid rgba(255,255,255,.1);padding:16px 0;overflow-y:auto}
.so-main{flex:1;overflow-y:auto;padding:24px 48px}
.so-nav{
  display:flex;align-items:center;gap:14px;
  padding:14px 24px;cursor:pointer;
  font-size:15px;font-weight:600;color:var(--w3);
  border-left:3px solid transparent;
}
.so-nav.on,.so-nav:focus{background:rgba(255,255,255,.07);color:var(--w);border-left-color:var(--accent);outline:none}
.srow{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 0;border-bottom:1px solid rgba(255,255,255,.08);
  cursor:pointer;
}
.srow-l{flex:1}
.srow-title{font-size:17px;font-weight:600;color:var(--w)}
.srow-desc{font-size:12px;color:var(--w3);margin-top:3px}
.tog{position:relative;width:54px;height:28px}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tog-t{
  position:absolute;inset:0;cursor:pointer;
  background:rgba(255,255,255,.18);border-radius:14px;
  transition:background 180ms;
}
.tog-t::before{
  content:'';position:absolute;
  width:20px;height:20px;top:4px;left:4px;
  background:#fff;border-radius:50%;
  transition:transform 180ms;
}
.tog input:checked+.tog-t{background:var(--accent)}
.tog input:checked+.tog-t::before{transform:translateX(26px)}
.oui-sel{
  width:100%;padding:11px 14px;margin-top:8px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  border-radius:8px;color:var(--w);
}
.src-card{
  display:flex;align-items:center;gap:14px;
  padding:14px 0;border-bottom:1px solid rgba(255,255,255,.08);
  cursor:pointer;
}
.src-nm{font-size:15px;font-weight:700}
.src-url{font-size:11px;color:var(--w3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.src-del{background:none;border:none;color:var(--w3);cursor:pointer;font-size:18px}
#mDial{
  position:absolute;inset:0;z-index:65;
  background:rgba(0,0,0,.85);backdrop-filter:blur(14px);
  display:none;align-items:center;justify-content:center;
}
#mDial.on{display:flex}
.dial-box{
  background:rgba(14,14,24,.99);
  border:1px solid rgba(255,255,255,.18);
  padding:36px;width:320px;border-radius:20px;
}
.dial-screen{
  background:rgba(255,255,255,.06);
  border-radius:12px;padding:20px;text-align:center;margin-bottom:18px;
}
.dial-num{font-size:46px;font-weight:800;color:var(--w);letter-spacing:8px;min-height:58px}
.dgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.dk{
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  color:var(--w);padding:18px;border-radius:12px;
  font-size:28px;font-weight:700;cursor:pointer;
}
.dk:focus{background:var(--accent);outline:none}
.dk.go{grid-column:span 2;background:rgba(229,9,20,.2);font-size:16px}
#volHud{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:70;
  background:rgba(0,0,0,.92);
  backdrop-filter:blur(16px);
  padding:20px 40px;border-radius:16px;
  display:flex;align-items:center;gap:20px;
  min-width:360px;
  opacity:0;transition:opacity 180ms;
  pointer-events:none;
}
#volHud.on{opacity:1}
.vol-track{flex:1;height:5px;background:rgba(255,255,255,.2);border-radius:3px}
.vol-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px}
#toasts{
  position:absolute;top:90px;right:24px;z-index:9999;
  display:flex;flex-direction:column;gap:8px;pointer-events:none;
}
.toast{
  background:rgba(8,8,20,.96);
  border-left:3px solid var(--accent);
  padding:12px 20px;font-size:15px;color:var(--w);
  border-radius:10px;
  animation:tIn 160ms ease forwards;
}
@keyframes tIn{from{transform:translateX(110%);opacity:0}to{transform:none;opacity:1}}
#splash{
  position:absolute;inset:0;z-index:9500;
  background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity 600ms;
}
#splash.off{opacity:0;pointer-events:none}
.spl-logo{font-size:20vw;font-weight:900;color:var(--w)}
.spl-accent{color:var(--accent)}
.spl-bar{width:20vw;height:2px;background:rgba(255,255,255,.1);margin-top:5vw;overflow:hidden}
.spl-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--yellow));animation:sf 1s infinite}
@keyframes sf{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}
.spl-msg{font-size:1vw;color:var(--w3);margin-top:2vw}
</style>
</head>
<body>
<div id="splash"><div class="spl-logo">S<span class="spl-accent">+</span></div><div class="spl-bar"><div class="spl-fill"></div></div><div class="spl-msg" id="splMsg">Initialising…</div></div>
<div id="root">
  <video id="video" playsinline autoplay></video>
  <div id="vignette"></div>
  <div id="topBar">
    <div class="brand"><span class="brand-jio">SAGA</span><span class="brand-tv">TV</span><span class="brand-plus">+</span></div>
    <div id="navTabs"></div>
    <div class="top-icons"><button class="top-icon" id="settingsBtn"><svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54A.484.484 0 0 0 16 3h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L4.74 9.15c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg></button></div>
  </div>
  <div id="nowInfo"><div id="nowTag"><span class="now-dot"></span>NOW PLAYING</div><div id="nowTitle">Select a channel</div><div id="nowMeta"><span class="now-pill live">● LIVE</span><span class="now-pill" id="nowGroup"></span><span class="now-pill" id="nowQ"></span></div></div>
  <div id="bottomPanel">
    <div class="ch-row"><div class="ch-row-label">Live Channels <span class="ch-row-label-count" id="row1Count">0</span></div><div class="tile-strip" id="row1Strip"></div></div>

/*══════════════════════════════════════════════════════════════════
  INLINE CACHE.JS (AppCache) – IndexedDB + localStorage fallback
══════════════════════════════════════════════════════════════════*/
(function(){
  const DB_NAME = 'SagaIPTV';
  const STORE_NAME = 'm3uCache';
  let db = null;
  const pending = [];

  function openDB(){
    return new Promise((resolve, reject)=>{
      if(db && db.name === DB_NAME) return resolve(db);
      const req = indexedDB.open(DB_NAME, 1);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if(!db.objectStoreNames.contains(STORE_NAME)){
          db.createObjectStore(STORE_NAME);
        }
      };
      req.onsuccess = (e) => { db = e.target.result; resolve(db); };
      req.onerror = (e) => reject(e.target.error);
    });
  }

  window.AppCache = {
    getM3U: async function(url){
      try{
        const db = await openDB();
        const tx = db.transaction(STORE_NAME, 'readonly');
        const store = tx.objectStore(STORE_NAME);
        const record = await new Promise((res,rej)=>{
          const get = store.get(url);
          get.onsuccess = () => res(get.result);
          get.onerror = () => rej(get.error);
        });
        if(record && record.data && record.expiry > Date.now()) return record.data;
        return null;
      }catch(e){
        try{ return localStorage.getItem('cache_'+btoa(url)); }catch(e2){ return null; }
      }
    },
    setM3U: async function(url, data){
      try{
        const db = await openDB();
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        store.put({ data: data, expiry: Date.now() + 3600000 }, url);
        await new Promise((res,rej)=>{ tx.oncomplete = res; tx.onerror = rej; });
      }catch(e){
        try{ localStorage.setItem('cache_'+btoa(url), data); }catch(e2){}
      }
    },
    clearAllM3U: async function(){
      try{
        const db = await openDB();
        const tx = db.transaction(STORE_NAME, 'readwrite');
        tx.objectStore(STORE_NAME).clear();
        await new Promise((res,rej)=>{ tx.oncomplete = res; tx.onerror = rej; });
      }catch(e){}
      try{
        for(let i=0;i<localStorage.length;i++){
          let key = localStorage.key(i);
          if(key && key.startsWith('cache_')) localStorage.removeItem(key);
        }
      }catch(e){}
    },
    preloadImages: function(urls, onProgress){
      // stub for compatibility
    }
  };
})();

/* ---- Playlist loading ---- */
function parseM3UChunked(txt, onDone){
  const lines = txt.split(/\r?\n/);
  const out = [];
  let cur = null;
  let i = 0;
  function chunk(){
    const end = Math.min(i+800, lines.length);
    for(; i<end; i++){
      const l = lines[i].trim();
      if(l.startsWith('#EXTINF')){
        const ci = l.lastIndexOf(',');
        let name = ci>=0 ? l.slice(ci+1).trim() : 'Channel';
        name = name.replace(/\s*\([^)]*\)|\s*\[[^\]]*\]/g,'').trim() || 'Channel';
        cur = {
          name: name,
          logo: (l.match(/tvg-logo="([^"]*)"/i)||[])[1] || '',
          group: (l.match(/group-title="([^"]*)"/i)||[])[1] || 'General',
          url: ''
        };
      }else if(l && !l.startsWith('#') && cur){
        if(l.startsWith('http')){
          cur.url = l;
          out.push(cur);
          cur = null;
        }
      }
    }
    if(i < lines.length) requestIdleCallback(chunk, {timeout:50});
    else onDone(out);
  }
  chunk();
}

async function loadPl(url, name, force=false){
  try{
    let txt = force ? null : await AppCache.getM3U(url);
    if(!txt){
      const ctrl = new AbortController();
      const tid = setTimeout(()=>ctrl.abort(), 25000);
      const resp = await fetch(url, {signal:ctrl.signal});
      clearTimeout(tid);
      if(!resp.ok) throw new Error('HTTP '+resp.status);
      txt = await resp.text();
      await AppCache.setM3U(url, txt);
    }
    parseM3UChunked(txt, parsed=>{
      if(!parsed.length){ toast('No channels - '+name,'err'); return; }
      const seen = new Set(allChs.map(c=>c.url));
      const fresh = parsed.filter(c=>!seen.has(c.url));
      if(name === 'Jio') fresh.forEach(ch=>{ ch._src='jio'; });
      allChs = allChs.concat(fresh);
      rebuildGroups();
      rebuildNavTabs();
      updateRows();
      toast(parsed.length+' channels - '+name,'ok');
    });
  }catch(e){
    toast(e.message.slice(0,50),'err');
  }
}

  recfg();

function recfg(){
  if(!player) return;
  player.configure({
    abr: { enabled: !cfg.hq, defaultBandwidthEstimate: 10000000 },
    streaming: { bufferingGoal: cfg.buf, rebufferingGoal: 2, stallEnabled: true, stallThreshold: 1 }
  });
}
function lockHQ(){
  if(!player || !isPlaying) return;
  try{
    const tracks = player.getVariantTracks();
    if(tracks.length) player.selectVariantTrack(tracks.reduce((a,b)=>a.bandwidth>b.bandwidth?a:b));
  }catch(e){}
}
function immediatePlay(){
  clearTimeout(playTimer);
  playTimer = setTimeout(async ()=>{
    const ch = focusRow===1 ? row1Chs[col1] : row2Chs[col2];
    if(!ch || !player) return;
    if(ch.url === curUrl && isPlaying) return;
    curUrl = ch.url; lsSet('saga:lchu', ch.url);
    if(cfg.muteSwitch && isPlaying) video.muted = true;
    isPlaying = false;
    updateNowInfo(ch);
    try{
      await player.load(ch.url);
      await video.play();
      isPlaying = true;
      if(cfg.muteSwitch) setTimeout(()=>{ video.muted = isMuted; },700);
      if(cfg.hq) setTimeout(lockHQ,4000);
      updateRow1Focus(); updateRow2Focus();
    }catch(err){ toast('Playback error','err'); isPlaying=false; }
  }, 80);
}
function cycleAspect(){
  aspectMode = (aspectMode+1)%3;
  video.classList.remove('contain','stretch');
  if(aspectMode===1) video.classList.add('contain');
  if(aspectMode===2) video.classList.add('stretch');
  toast(['Cover','Contain','Stretch'][aspectMode]);
}
function toggleFav(){
  const ch = focusRow===1 ? row1Chs[col1] : row2Chs[col2];
  if(!ch) return;
  if(favs.has(ch.url)){ favs.delete(ch.url); toast('Removed from favourites'); }
  else{ favs.add(ch.url); toast('Added to favourites','ok'); }
  saveFavs();
}

/* ---- Yellow Popup ---- */
function openYP(){ yellowPopup.classList.add('on'); zone='yp'; ypIdx=0; ypAddForm.classList.remove('open'); ypAddForm.style.display='none'; document.getElementById('ypActions').style.display='flex'; wakeUI(); clearTimeout(hideTimer); setTimeout(()=>focusYP(),50); }
function closeYP(){ yellowPopup.classList.remove('on'); zone='rows'; resetHideTimer(); syncFocusInRows(); }
function focusYP(){ const items = document.querySelectorAll('#ypActions .yp-action'); if(items[ypIdx]) items[ypIdx].focus(); }
document.getElementById('ypClose').addEventListener('click',closeYP);
document.getElementById('ypa-add').addEventListener('click',()=>{ document.getElementById('ypActions').style.display='none'; ypAddForm.classList.add('open'); ypAddForm.style.display='flex'; setTimeout(()=>document.getElementById('ypPlName').focus(),50); });
document.getElementById('ypa-refresh').addEventListener('click',()=>{ closeYP(); AppCache.clearAllM3U(); allChs=[]; toast('Refreshing...'); loadAll(true); });
document.getElementById('ypa-dialer').addEventListener('click',()=>{ closeYP(); openDial(); });
document.getElementById('ypa-settings').addEventListener('click',()=>{ closeYP(); openSettings(); });
document.getElementById('ypa-favs').addEventListener('click',()=>{ closeYP(); setTab('Favourites'); });
document.getElementById('ypCancel').addEventListener('click',()=>{ ypAddForm.classList.remove('open'); ypAddForm.style.display='none'; document.getElementById('ypActions').style.display='flex'; setTimeout(focusYP,30); });
document.getElementById('ypSave').addEventListener('click',()=>{
  const name = document.getElementById('ypPlName').value.trim();
  const url = document.getElementById('ypPlUrl').value.trim();
  if(!name || !url){ toast('Enter name and URL','err'); return; }
  if(pls.some(p=>p.url===url)){ toast('Already added','err'); return; }
  pls.push({name,url}); savePls();
  document.getElementById('ypPlName').value=''; document.getElementById('ypPlUrl').value='';
  ypAddForm.classList.remove('open'); ypAddForm.style.display='none';
  document.getElementById('ypActions').style.display='flex';
  closeYP(); loadPl(url,name);
});

/* ---- Settings ---- */
function openSettings(){ settingsOv.classList.add('on'); zone='settings'; soSideIdx=0; soMainIdx=0; soSideZone=true; renderSettingsSect('playback'); wakeUI(); clearTimeout(hideTimer); setTimeout(()=>document.querySelectorAll('.so-nav')[0]?.focus(),50); }
function closeSettings(){ settingsOv.classList.remove('on'); zone='rows'; resetHideTimer(); syncFocusInRows(); }
document.getElementById('soClose').addEventListener('click',closeSettings);
document.getElementById('settingsBtn').addEventListener('click',openSettings);
document.querySelectorAll('.so-nav').forEach(n=>{ n.addEventListener('click',()=>{ document.querySelectorAll('.so-nav').forEach(x=>x.classList.remove('on')); n.classList.add('on'); renderSettingsSect(n.dataset.s); soMainIdx=0; setTimeout(()=>{ const it=document.querySelectorAll('[tabindex="0"]',soMain); if(it[0]) it[0].focus(); },30); }); });
function renderSettingsSect(s){
  if(s==='playback'){
    soMain.innerHTML = `<div class="srow" tabindex="0"><div class="srow-l"><div class="srow-title">Force Highest Quality</div><div class="srow-desc">Lock max bitrate</div></div><label class="tog"><input type="checkbox" id="cfgHQ" ${cfg.hq?'checked':''}><span class="tog-t"></span></label></div>
                        <div class="srow" tabindex="0"><div class="srow-l"><div class="srow-title">Mute on Channel Switch</div><div class="srow-desc">Silence during zap</div></div><label class="tog"><input type="checkbox" id="cfgMute" ${cfg.muteSwitch?'checked':''}><span class="tog-t"></span></label></div>
                        <div class="srow-title" style="margin-top:20px;">Buffer Goal</div>
                        <select class="oui-sel" id="cfgBuf"><option value="6" ${cfg.buf==6?'selected':''}>6 s</option><option value="8" ${cfg.buf==8?'selected':''}>8 s</option><option value="12" ${cfg.buf==12?'selected':''}>12 s</option><option value="20" ${cfg.buf==20?'selected':''}>20 s</option></select>`;
    const hq = document.getElementById('cfgHQ'); const mu = document.getElementById('cfgMute'); const bu = document.getElementById('cfgBuf');
    if(hq) hq.onchange = function(){ cfg.hq = this.checked; saveCfg(); recfg(); };
    if(mu) mu.onchange = function(){ cfg.muteSwitch = this.checked; saveCfg(); };
    if(bu) bu.onchange = function(){ cfg.buf = +this.value; saveCfg(); recfg(); };
  }else if(s==='display'){
    soMain.innerHTML = `<div class="srow" tabindex="0"><div class="srow-l"><div class="srow-title">OSD Auto-hide</div><div class="srow-desc">Channel info fades after 5 seconds</div></div><label class="tog"><input type="checkbox" id="cfgOsd" ${cfg.osd?'checked':''}><span class="tog-t"></span></label></div>`;
    const os = document.getElementById('cfgOsd');
    if(os) os.onchange = function(){ cfg.osd = this.checked; saveCfg(); };
  }else if(s==='sources'){
    const dp = [...pls];
    let html = dp.map((p,i)=>`<div class="src-card" tabindex="0" data-i="${i}"><div class="src-dot"></div><div class="src-info"><div class="src-nm">${escapeHtml(p.name)}${p.builtIn?' <small>(built-in)</small>':''}</div><div class="src-url">${escapeHtml(p.url)}</div></div>${p.builtIn?'':`<button class="src-del" data-del="${i}">🗑</button>`}</div>`).join('');
    soMain.innerHTML = html + `<button class="so-btn" id="refreshSoBtnSo" tabindex="0">↺ Refresh All</button>`;
    soMain.querySelectorAll('.src-card').forEach(el=>{
      el.addEventListener('click',e=>{ if(e.target.closest('[data-del]')) return; const p=dp[+el.dataset.i]; if(p){ loadPl(p.url,p.name); closeSettings(); } });
    });
    soMain.querySelectorAll('[data-del]').forEach(btn=>{
      btn.addEventListener('click',e=>{ e.stopPropagation(); const i=+btn.dataset.del; pls.splice(i,1); savePls(); renderSettingsSect('sources'); });
    });
    const refBtn = document.getElementById('refreshSoBtnSo');
    if(refBtn) refBtn.addEventListener('click',()=>{ AppCache.clearAllM3U(); allChs=[]; loadAll(true); closeSettings(); });
  }
}
function escapeHtml(s){ return String(s).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; }); }

/* ---- Dialer ---- */
function openDial(){ mDial.classList.add('on'); zone='dialer'; wakeUI(); clearTimeout(hideTimer); setTimeout(()=>dnum.parentElement?.focus(),50); }
function closeDial(){ mDial.classList.remove('on'); zone='rows'; resetHideTimer(); syncFocusInRows(); }
function dialPush(d){
  if(d==='clr') dialStr = dialStr.slice(0,-1);
  else if(d==='go'){ dialGo(); return; }
  else if(dialStr.length<4) dialStr += d;
  dnum.textContent = dialStr || '—';
  clearTimeout(dialTimer);
  if(dialStr.length>=3) dialTimer = setTimeout(dialGo,1400);
}
function dialGo(){
  const n = parseInt(dialStr,10); dialStr=''; dnum.textContent='—'; closeDial();
  if(!isNaN(n) && n>=1 && n<=row1Chs.length){ col1=n-1; focusRow=1; updateRow1Focus(); syncRow1Scroll(); immediatePlay(); }
  else toast('Channel not found','err');
}
function remoteDigit(d){
  rDialStr += d; clearTimeout(rDialTimer);
  rDialTimer = setTimeout(()=>{ const n=parseInt(rDialStr,10); rDialStr=''; if(!isNaN(n) && n>=1 && n<=row1Chs.length){ col1=n-1; focusRow=1; updateRow1Focus(); syncRow1Scroll(); immediatePlay(); }else toast('Not found','err'); },1200);
}
function syncFocusInRows(){
  if(focusRow===1){
    const cards = [...row1Strip.children];
    const idx = col1+1;
    if(cards[idx]){ cards[idx].tabIndex=0; cards[idx].focus({preventScroll:true}); }
  }else if(focusRow===2){
    const cards = [...row2Strip.children];
    if(cards[col2]){ cards[col2].tabIndex=0; cards[col2].focus({preventScroll:true}); }
  }
}

/* ---- Key handling (Tizen friendly) ---- */
function hideSplash(){ document.getElementById('splash').classList.add('off'); setTimeout(()=>document.getElementById('splash').style.display='none',600); }

window.addEventListener('keydown', e=>{
  const kc = e.keyCode;
  const key = e.key;
  if(kc === 447 || key === 'VolumeUp'){ e.preventDefault(); volUp(); wakeUI(); return; }
  if(kc === 448 || key === 'VolumeDown'){ e.preventDefault(); volDown(); wakeUI(); return; }
  if(kc === 449 || key === 'VolumeMute'){ e.preventDefault(); wakeUI(); try{ if(window.tizen && tizen.tvaudiocontrol){ tizen.tvaudiocontrol.setMute(!tizen.tvaudiocontrol.isMute()); showVol(); }else{ isMuted=!isMuted; video.muted=isMuted; } }catch(e){} return; }
  wakeUI();
  if(document.activeElement === document.getElementById('ypPlName') || document.activeElement === document.getElementById('ypPlUrl')){
    if(kc===10009 || key==='Escape'){ e.preventDefault(); document.getElementById('ypCancel').click(); }
    return;
  }
  if(zone === 'dialer'){
    if((kc>=48 && kc<=57) || (kc>=96 && kc<=105) || (key>='0' && key<='9')){ e.preventDefault(); dialPush(key); return; }
    if(kc===13 || key==='Enter'){ e.preventDefault(); dialGo(); return; }
    if(kc===10009 || key==='Escape'){ e.preventDefault(); closeDial(); return; }
    return;
  }
  if(zone === 'yp'){
    if(kc===10009 || key==='Escape'){ e.preventDefault(); closeYP(); return; }
    if(!ypAddForm.classList.contains('open')){
      const items = document.querySelectorAll('#ypActions .yp-action');
      if(kc===38 || key==='ArrowUp'){ e.preventDefault(); ypIdx = Math.max(0, ypIdx-1); focusYP(); return; }
      if(kc===40 || key==='ArrowDown'){ e.preventDefault(); ypIdx = Math.min(items.length-1, ypIdx+1); focusYP(); return; }
      if(kc===13 || key==='Enter'){ e.preventDefault(); items[ypIdx]?.click(); return; }
    }
    return;
  }
  if(zone === 'settings'){
    if(kc===10009 || key==='Escape'){ e.preventDefault(); closeSettings(); return; }
    const sideItems = document.querySelectorAll('.so-nav');
    const mainItems = document.querySelectorAll('[tabindex="0"]', soMain);
    if(kc===38 || key==='ArrowUp'){
      e.preventDefault();
      if(soSideZone){ soSideIdx = Math.max(0, soSideIdx-1); sideItems[soSideIdx]?.focus({preventScroll:true}); }
      else{ soMainIdx = Math.max(0, soMainIdx-1); mainItems[soMainIdx]?.focus({preventScroll:true}); }
      return;
    }
    if(kc===40 || key==='ArrowDown'){
      e.preventDefault();
      if(soSideZone){ soSideIdx = Math.min(sideItems.length-1, soSideIdx+1); sideItems[soSideIdx]?.focus({preventScroll:true}); }
      else{ soMainIdx = Math.min(mainItems.length-1, soMainIdx+1); mainItems[soMainIdx]?.focus({preventScroll:true}); }
      return;
    }
    if((kc===39 || key==='ArrowRight') && soSideZone){ e.preventDefault(); soSideZone=false; soMainIdx=0; if(mainItems[0]) mainItems[0].focus({preventScroll:true}); return; }
    if((kc===37 || key==='ArrowLeft') && !soSideZone){ e.preventDefault(); soSideZone=true; sideItems[soSideIdx]?.focus({preventScroll:true}); return; }
    if(kc===13 || key==='Enter'){
      e.preventDefault();
      const f = document.activeElement;
      if(f?.classList.contains('srow')){ const cb = f.querySelector('input[type=checkbox]'); if(cb){ cb.checked=!cb.checked; cb.dispatchEvent(new Event('change',{bubbles:true})); } }
      else if(f?.classList.contains('so-nav')) f.click();
      else f?.click();
      return;
    }
    return;
  }
  if(zone === 'tabs'){
    const tabs = document.querySelectorAll('.ntab');
    if(kc===37 || key==='ArrowLeft'){ e.preventDefault(); tabIdx = Math.max(0, tabIdx-1); tabs[tabIdx]?.focus({preventScroll:true}); tabs[tabIdx]?.scrollIntoView({inline:'nearest'}); return; }
    if(kc===39 || key==='ArrowRight'){ e.preventDefault(); tabIdx = Math.min(tabs.length-1, tabIdx+1); tabs[tabIdx]?.focus({preventScroll:true}); tabs[tabIdx]?.scrollIntoView({inline:'nearest'}); return; }
    if(kc===13 || key==='Enter'){ e.preventDefault(); tabs[tabIdx]?.click(); zone='rows'; focusRow=1; syncFocusInRows(); return; }
    if(kc===40 || key==='ArrowDown'){ e.preventDefault(); zone='rows'; focusRow=1; syncFocusInRows(); return; }
    if(kc===10009 || key==='Escape'){ e.preventDefault(); zone='rows'; focusRow=1; syncFocusInRows(); return; }
    return;
  }
  if(zone === 'rows'){
    if(kc===38 || key==='ArrowUp'){
      e.preventDefault();
      if(focusRow===2){ focusRow=1; updateRow1Focus(); syncRow1Scroll(); syncFocusInRows(); }
      else if(focusRow===1){ zone='tabs'; focusRow=0; const tabs=document.querySelectorAll('.ntab'); tabIdx=Math.max(0,allGroups.indexOf(activeTab)); tabs[tabIdx]?.focus({preventScroll:true}); }
      return;
    }
    if(kc===40 || key==='ArrowDown'){
      e.preventDefault();
      if(focusRow===1 && row2Chs.length>0){ focusRow=2; updateRow2Focus(); syncRow2Scroll(); syncFocusInRows(); }
      return;
    }
    if(kc===37 || key==='ArrowLeft'){
      e.preventDefault();
      if(focusRow===1){ if(col1>0){ col1--; updateRow1Focus(); syncRow1Scroll(); syncFocusInRows(); updateNowInfo(); } }
      else if(focusRow===2){ if(col2>0){ col2--; updateRow2Focus(); syncRow2Scroll(); } }
      return;
    }
    if(kc===39 || key==='ArrowRight'){
      e.preventDefault();
      if(focusRow===1){ if(col1<row1Chs.length-1){ col1++; updateRow1Focus(); syncRow1Scroll(); syncFocusInRows(); updateNowInfo(); } }
      else if(focusRow===2){ if(col2<row2Chs.length-1){ col2++; updateRow2Focus(); syncRow2Scroll(); } }
      return;
    }
    if(kc===13 || key==='Enter'){ e.preventDefault(); immediatePlay(); return; }
  }
  switch(true){
    case (kc===403): e.preventDefault(); const i=allGroups.indexOf(activeTab); setTab(allGroups[(i+1)%allGroups.length]); break;
    case (kc===404): e.preventDefault(); cycleAspect(); break;
    case (kc===405): e.preventDefault(); openYP(); break;
    case (kc===406): e.preventDefault(); toggleFav(); break;
    case (kc===415): e.preventDefault(); video.play().catch(()=>{}); break;
    case (kc===19): e.preventDefault(); video.pause(); break;
    case (kc===10252): e.preventDefault(); video.paused?video.play().catch(()=>{}):video.pause(); break;
    case (kc===413): e.preventDefault(); if(player){ player.unload(); isPlaying=false; curUrl=''; } break;
    case (kc===427): e.preventDefault(); if(focusRow===1 && col1>0){ col1--; updateRow1Focus(); syncRow1Scroll(); updateNowInfo(); } break;
    case (kc===428): e.preventDefault(); if(focusRow===1 && col1<row1Chs.length-1){ col1++; updateRow1Focus(); syncRow1Scroll(); updateNowInfo(); } break;
    case (key==='f'||key==='F'): e.preventDefault(); toggleFav(); break;
    case (key==='d'||key==='D'): e.preventDefault(); openDial(); break;
    default: if((kc>=48 && kc<=57) || (kc>=96 && kc<=105) || (key>='0' && key<='9')){ e.preventDefault(); remoteDigit(key); break; }
  }
});
document.getElementById('root').addEventListener('click', wakeUI);

/* ---- Boot ---- */
(async function boot(){
  loadStore();
  pls = pls.filter(p=>p.url!=='https://iptv-org.github.io/iptv/languages/tel.m3u' && p.url!=='https://jioplaylist.joinus-apiworker.workers.dev/playlist.m3u');
  pls.unshift({name:'Jio', url:'https://jioplaylist.joinus-apiworker.workers.dev/playlist.m3u', builtIn:true});
  pls.unshift({name:'Telugu', url:'https://iptv-org.github.io/iptv/languages/tel.m3u', builtIn:true});
  document.getElementById('splMsg').textContent = 'Initialising player...';
  await initPlayer();
  document.getElementById('splMsg').textContent = 'Loading channels...';
  allGroups = ['For You','Telugu','Jio','Entertainment','News','Movies'];
  rebuildNavTabs(); setTab('For You');
  await loadAll(false);
  rebuildGroups(); rebuildNavTabs(); setTab('For You');
  const lastUrl = lsGet('saga:lchu');
  if(lastUrl){
    const idx = row1Chs.findIndex(c=>c.url===lastUrl);
    if(idx>=0){ col1=idx; focusRow=1; updateRow1Focus(); syncRow1Scroll(); updateNowInfo(); }
  }
  hideSplash();
  startHideTimer();
  currentVol = getSysVol();
})();
})();
</script>
