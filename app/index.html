<style>
/* ═══ CORE DESIGN & PERFORMANCE ═══ */
:root {
  --topH: 110px;
  --accent: #007aff;
  --bg: #060606;
  --spring: cubic-bezier(0.18, 0.89, 0.32, 1.28);
  --slow: 400ms;
  --mid: 250ms;
}

* { box-sizing: border-box; -webkit-user-select: none; outline: none; }
body { 
  background: var(--bg); color: #fff; margin: 0; 
  font-family: 'Segoe UI', Roboto, sans-serif; 
  overflow: hidden; width: 1920px; height: 1080px; 
}

/* FIXED: 3-Column Layout for Centered Categories */
#topBar {
  position: absolute; top: 0; left: 0; right: 0;
  height: var(--topH); z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 60px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0) 100%);
  transition: transform var(--mid) ease;
}

.brand { flex: 1; display: flex; align-items: center; }
.brand img { height: 50px; }

#navTabs {
  flex: 2; /* Center column gets double space */
  display: flex; align-items: center; justify-content: center;
  gap: 10px;
  background: transparent !important; /* Fixed: Transparent categories */
}

.top-right { flex: 1; display: flex; align-items: center; justify-content: flex-end; gap: 20px; }
#searchIcon { font-size: 30px; opacity: 0.7; }

/* NAV TAB STYLING */
.tab {
  padding: 8px 24px; border-radius: 40px; font-size: 22px; font-weight: 600;
  color: rgba(255,255,255,0.4); transition: all var(--mid) ease;
  border: 2px solid transparent;
}
.tab.focused { background: rgba(255,255,255,0.12); color: #fff; transform: scale(1.08); }
.tab.active { color: var(--accent); border-bottom: 3px solid var(--accent); border-radius: 0; }

/* CHANNEL GRID & CARDS */
#mainScroll {
  position: absolute; inset: 0; top: var(--topH);
  overflow: hidden; padding: 40px 60px;
}
.strip-row { display: flex; gap: 25px; transition: transform var(--slow) var(--spring); }

.card {
  position: relative; width: 320px; height: 180px;
  background: #111; border-radius: 12px; overflow: hidden;
  transition: transform var(--mid) ease, box-shadow var(--mid) ease;
  border: 3px solid transparent;
}
.card.focused { transform: scale(1.1); border-color: var(--accent); z-index: 10; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }

/* GPU-FRIENDLY CARD BG (No Blurs) */
.card-bg {
  position: absolute; inset: 0; background-size: cover; background-position: center;
  opacity: 0; transition: opacity 400ms linear; transform: translateZ(0); 
}
.card-bg.on { opacity: 0.35; }

/* PLAYER & SPINNER */
#av-player-container { position: fixed; inset: 0; display: none; z-index: 1; background: #000; }
#main-video { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 1; display: none; }

#bufSpinner {
  position: absolute; top: 50%; left: 50%; margin: -40px 0 0 -40px;
  width: 80px; height: 80px; border: 6px solid rgba(255,255,255,0.1);
  border-top-color: var(--accent); border-radius: 50%;
  display: none; z-index: 150; animation: spin 1s linear infinite;
}
#bufSpinner.on { display: block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* SPLASH SCREEN */
#splash {
  position: fixed; inset: 0; z-index: 1000; background: #000;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
</style>
</head>
<body>

<div id="splash">
  <img src="icon.png" style="width:120px; margin-bottom:20px;">
  <div id="splMsg" style="font-size:20px; color:#666;">Initialising...</div>
</div>

<div id="bufSpinner"></div>
<div id="av-player-container"></div>
<video id="main-video" crossorigin="anonymous"></video>

<div id="topBar">
  <div class="brand"><img src="icon.png"></div>
  <div id="navTabs"></div>
  <div class="top-right">
    <div id="searchIcon">🔍</div>
    <div id="clock" style="font-size:24px; font-weight:700;"></div>
  </div>
</div>

<div id="mainScroll">
  <div id="stripCont"></div>
</div>

<script>
/* ═══ GLOBAL CONFIG ═══ */
var CH_CACHE_TTL = 84 * 60 * 60 * 1000; // 3.5 Days
var PLAY_DEB     = 650;                // Prevents remote spamming
var allChs       = [];
var curUrl       = '';
var playTimer    = null;
var ENGINE       = 'none';
var activeTab    = 'Telugu';

/* ═══ ASYNC AVPLAYER ENGINE (SUPER SOLID) ═══ */
function playWithAVPlay(ch) {
  if (!window.webapis || !window.webapis.avplay) return playWithShaka(ch);
  
  var url = ch.url;
  curUrl = url;
  
  // 1. INSTANT STOP: Immediately free hardware to allow UI scrolling
  avplayStop(); 
  document.getElementById('bufSpinner').classList.add('on');

  try {
    var av = webapis.avplay;
    av.open(url);
    av.setDisplayRect(0, 0, 1920, 1080);
    
    // 2. AGGRESSIVE QUALITY: Force highest quality immediately
    try {
      av.setStreamingProperty("ADAPTIVE_INFO", "BITRATE_LIMIT=0|START_BITRATE=HIGHEST|SET_MODE=AUTO");
    } catch(e){}

    av.setListener({
      onbufferingstart: function() { document.getElementById('bufSpinner').classList.add('on'); },
      onbufferingcomplete: function() { document.getElementById('bufSpinner').classList.remove('on'); },
      onerror: function(e) { console.error("AVP Error", e); avplayRetry(ch, e); }
    });

    // 3. NON-BLOCKING LOAD: prepareAsync ensures the app stays responsive
    av.prepareAsync(function() {
      if (curUrl === url) {
        av.play();
        ENGINE = 'avplay';
        document.getElementById('av-player-container').style.display = 'block';
      } else {
        avplayStop(); // User moved away during load
      }
    }, function(err) {
      playWithShaka(ch);
    });

  } catch (e) {
    playWithShaka(ch);
  }
}

function avplayStop() {
  if (window.webapis && webapis.avplay) {
    try { 
      webapis.avplay.stop(); 
      document.getElementById('av-player-container').style.display = 'none';
    } catch(e){}
  }
}

/* ═══ REMOTE READY NAVIGATION ═══ */
function immediatePlay() {
  clearTimeout(playTimer);
  // Kill decoder on every tap to keep system thread free
  avplayStop(); 
  playTimer = setTimeout(_triggerPlay, PLAY_DEB);
}

function _triggerPlay() {
  var ch = getFocusedChannel(); // your logic to get current focused item
  if (ch) playWithAVPlay(ch);
}

/* ═══ BI-WEEKLY CACHE LOGIC (84 HOURS) ═══ */
function boot() {
  var lastTs = localStorage.getItem('saga_playlist_ts') || 0;
  var now = Date.now();

  AppCache.load('saga_channels').then(function(cached) {
    if (cached && (now - lastTs < CH_CACHE_TTL)) {
      // 100% OFFLINE START: No network hit, super fast boot
      allChs = cached;
      finishBoot();
      console.log("Loaded from local 84h cache.");
    } else {
      // CACHE EXPIRED: Update only twice a week
      refreshPlaylist();
    }
  });
}

function refreshPlaylist() {
  document.getElementById('splMsg').textContent = 'Updating playlist...';
  // Your existing fetch logic for workers
  // fetch('...').then(data => {
  //    localStorage.setItem('saga_playlist_ts', Date.now());
  //    AppCache.save('saga_channels', data);
  //    allChs = data;
  //    finishBoot();
  // });
}

function finishBoot() {
  document.getElementById('splash').style.display = 'none';
  renderUI(); // Preact render
  updateClock();
  setInterval(updateClock, 1000);
}

function updateClock() {
  var d = new Date();
  document.getElementById('clock').textContent = d.getHours() + ":" + (d.getMinutes()<10?'0':'') + d.getMinutes();
}

/* ═══ SHAKA FALLBACK ═══ */
function playWithShaka(ch) {
  avplayStop();
  var video = document.getElementById('main-video');
  video.style.display = 'block';
  // your existing Shaka init code here...
  ENGINE = 'shaka';
}

window.onload = boot;
</script>

</body>
