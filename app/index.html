<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>IPTV Smarters Pro | Monochrome</title>
  <!-- Shaka Player CDN (hardware acceleration) -->
  <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.11.0/dist/shaka-player.compiled.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* MONOCHROME DARK THEME – exactly like reference */
    :root {
      --bg-primary: #0a0a0a;
      --bg-sidebar: #0f0f0f;
      --bg-card: #141414;
      --border: rgba(255, 255, 255, 0.08);
      --text-primary: #ffffff;
      --text-secondary: #aaaaaa;
      --text-muted: #5a5a5a;
      --accent: #dddddd;
      --focus-glow: rgba(255, 255, 255, 0.2);
      --hover-bg: rgba(255, 255, 255, 0.05);
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Segoe UI', system-ui, -apple-system, 'Inter', sans-serif;
      overflow: hidden;
      height: 100vh;
      font-weight: 500;
    }

    /* hardware acceleration base */
    #app, .category-list, .channels-grid, .video-container {
      transform: translateZ(0);
      will-change: transform;
      backface-visibility: hidden;
    }

    .app-container {
      display: flex;
      height: 100%;
      width: 100%;
    }

    /* ========= LEFT SIDEBAR (categories with counts) ========= */
    .sidebar {
      width: 320px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      z-index: 2;
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 20px 18px 12px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: white;
      margin-bottom: 16px;
    }

    .search-box {
      position: relative;
      margin-top: 8px;
    }

    #searchInput {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 12px 14px;
      color: white;
      font-size: 13px;
      border-radius: 10px;
      outline: none;
      transition: all 0.1s;
    }

    #searchInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--focus-glow);
    }

    .category-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 8px;
    }

    .category-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      margin: 4px 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.08s linear;
      background: transparent;
      border: none;
      width: calc(100% - 16px);
      text-align: left;
    }

    .category-item:focus {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
      background: var(--hover-bg);
      color: white;
    }

    .category-item.active {
      background: var(--bg-card);
      color: white;
      border-left: 3px solid var(--accent);
    }

    .category-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .category-count {
      font-size: 12px;
      color: var(--text-muted);
      background: rgba(255,255,255,0.05);
      padding: 2px 8px;
      border-radius: 20px;
    }

    /* ========= RIGHT PANEL (channels + player) ========= */
    .main-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: var(--bg-primary);
    }

    /* top bar: time & status */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-primary);
    }

    .current-category {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .time-display {
      font-size: 14px;
      color: var(--text-secondary);
      font-family: monospace;
    }

    /* video player area (mini player) */
    .video-area {
      background: #000000;
      aspect-ratio: 16 / 9;
      width: 100%;
      position: relative;
      border-bottom: 1px solid var(--border);
      display: none;
    }
    .video-area.active {
      display: block;
    }
    #videoPlayer {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: black;
    }
    .player-controls {
      position: absolute;
      bottom: 12px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 18px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      padding: 8px;
      border-radius: 40px;
      width: fit-content;
      margin: 0 auto;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .video-area:hover .player-controls {
      opacity: 1;
      pointer-events: auto;
    }
    .ctrl-btn {
      background: transparent;
      border: none;
      color: white;
      font-size: 18px;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 30px;
    }
    .ctrl-btn:focus {
      outline: 1px solid white;
    }

    /* channel grid (exactly two columns like image) */
    .channels-wrapper {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }
    .channels-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px 20px;
    }
    .channel-item {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      cursor: pointer;
      transition: all 0.08s linear;
      display: flex;
      align-items: center;
      gap: 12px;
      transform: translateZ(0);
    }
    .channel-item:focus {
      outline: 2px solid var(--accent);
      outline-offset: -1px;
      background: var(--hover-bg);
      transform: scale(1.01);
    }
    .channel-item.selected {
      border-color: var(--accent);
      background: rgba(255,255,255,0.08);
      box-shadow: 0 0 0 1px var(--accent);
    }
    .channel-logo {
      width: 36px;
      height: 36px;
      object-fit: contain;
      filter: grayscale(0.3);
    }
    .channel-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .fav-star {
      color: #ccc;
      font-size: 12px;
    }

    /* EPG info bar (minimal) */
    .epg-bar {
      background: var(--bg-sidebar);
      border-top: 1px solid var(--border);
      padding: 8px 20px;
      font-size: 12px;
      color: var(--text-secondary);
      display: flex;
      gap: 20px;
    }
    .epg-now {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* scrollbar */
    ::-webkit-scrollbar {
      width: 5px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 4px;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e1e1e;
      border: 1px solid #333;
      padding: 8px 24px;
      border-radius: 30px;
      font-size: 13px;
      z-index: 9999;
      pointer-events: none;
    }
  </style>
</head>
<body>
<div id="app">
  <div class="app-container">
    <!-- LEFT SIDEBAR: categories with counts (exactly as image) -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="logo">IPTV SMARTERS PRO</div>
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="🔍 Search in categories..." autocomplete="off">
        </div>
      </div>
      <div class="category-list" id="categoryList"></div>
      <div class="epg-bar" style="border-top:1px solid var(--border); padding:12px">
        <span>⭐ Favourites: <span id="favCount">0</span></span>
        <span>📡 <span id="channelTotal">0</span> channels</span>
      </div>
    </div>

    <!-- RIGHT PANEL: channels grid + video player -->
    <div class="main-panel">
      <div class="top-bar">
        <div class="current-category" id="currentCategoryTitle">ALL CHANNELS</div>
        <div class="time-display" id="liveTime"></div>
      </div>

      <!-- hardware accelerated video player (Shaka) -->
      <div class="video-area" id="videoArea">
        <video id="videoPlayer" playsinline autoplay></video>
        <div class="player-controls">
          <button class="ctrl-btn" id="playPauseBtn">⏯</button>
          <button class="ctrl-btn" id="muteBtn">🔊</button>
          <button class="ctrl-btn" id="fullscreenBtn">⛶</button>
          <button class="ctrl-btn" id="favChannelBtn">⭐</button>
        </div>
      </div>

      <!-- channel grid (two columns, like reference image) -->
      <div class="channels-wrapper">
        <div class="channels-grid" id="channelsGrid"></div>
      </div>

      <!-- bottom EPG info line -->
      <div class="epg-bar">
        <div class="epg-now" id="epgNowText">📺 Select a channel to see program info</div>
      </div>
    </div>
  </div>
</div>
<div id="toastMsg" class="toast" style="display:none"></div>

<script>
  /* ============================================================
     FULL IPTV APP – EXACT UI AS IMAGE
     Categories with counts, two‑column channels, Shaka Player,
     hardware acceleration, caching (cache.js embedded), remote keys
  ============================================================ */
  (function(){
    // ---------- EMBEDDED CACHE.JS (from user's file, simplified but full) ----------
    const AppCache = (function () {
      var M3U_TTL = 30 * 60 * 1000;
      var LS_QUOTA_WARN = 4.5 * 1024 * 1024;
      var _memCache = new Map();
      var MEM_MAX = 80;

      function memSet(key, value, ts) {
        if (_memCache.has(key)) _memCache.delete(key);
        if (_memCache.size >= MEM_MAX) {
          var oldest = _memCache.keys().next().value;
          _memCache.delete(oldest);
        }
        _memCache.set(key, { value: value, ts: ts || Date.now() });
      }
      function memGet(key) {
        if (!_memCache.has(key)) return null;
        var rec = _memCache.get(key);
        _memCache.delete(key);
        _memCache.set(key, rec);
        return rec;
      }
      function lsSet(k, v) { try { localStorage.setItem(k, v); return true; } catch(e) { return false; } }
      function lsGet(k) { try { return localStorage.getItem(k); } catch(e) { return null; } }
      function lsRemove(k) { try { localStorage.removeItem(k); } catch(e) {} }

      function getM3U(url) {
        var ck = 'plCache:' + url, ctk = 'plTime:' + url;
        var ts = parseInt(lsGet(ctk) || '0', 10);
        if (Date.now() - ts <= M3U_TTL) {
          var data = lsGet(ck);
          if (data && data.length > 100) return Promise.resolve(data);
        }
        return Promise.resolve(null);
      }
      function setM3U(url, text) {
        var ck = 'plCache:' + url, ctk = 'plTime:' + url;
        lsSet(ctk, String(Date.now()));
        if (!lsSet(ck, text)) { lsRemove(ck); lsRemove(ctk); return Promise.resolve(false); }
        return Promise.resolve(true);
      }
      function clearAllM3U() {
        try {
          var keys = [];
          for (var i = 0; i < localStorage.length; i++) {
            var k = localStorage.key(i);
            if (k && (k.startsWith('plCache:') || k.startsWith('plTime:'))) keys.push(k);
          }
          keys.forEach(function (k) { localStorage.removeItem(k); });
        } catch(e) {}
        return Promise.resolve();
      }
      return { getM3U, setM3U, clearAllM3U };
    })();

    // ---------- GLOBALS ----------
    let allChannels = [];        // { name, url, logo, group }
    let categoriesMap = new Map(); // groupName -> count
    let activeCategory = "All";
    let filteredChannels = [];
    let selectedChannelIndex = 0;
    let shakaPlayer = null;
    let videoEl = document.getElementById('videoPlayer');
    let isPlaying = false;
    let currentUrl = '';
    let favourites = new Set();
    let searchQuery = '';

    // DOM elements
    const categoryContainer = document.getElementById('categoryList');
    const channelsGrid = document.getElementById('channelsGrid');
    const currentCategoryTitle = document.getElementById('currentCategoryTitle');
    const searchInput = document.getElementById('searchInput');
    const liveTimeSpan = document.getElementById('liveTime');
    const channelTotalSpan = document.getElementById('channelTotal');
    const favCountSpan = document.getElementById('favCount');
    const epgNowText = document.getElementById('epgNowText');
    const videoArea = document.getElementById('videoArea');
    const toastDiv = document.getElementById('toastMsg');

    // helper: toast
    function toast(msg, duration = 2000) {
      toastDiv.textContent = msg;
      toastDiv.style.display = 'block';
      setTimeout(() => { toastDiv.style.display = 'none'; }, duration);
    }

    // time updater
    function updateTime() {
      const now = new Date();
      liveTimeSpan.innerText = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true }) + ' • ' + now.toLocaleDateString();
    }
    setInterval(updateTime, 1000);
    updateTime();

    // favourites storage
    function loadFavs() {
      try { const f = localStorage.getItem('mono_favs'); if(f) favourites = new Set(JSON.parse(f)); } catch(e) {}
      updateFavUI();
    }
    function saveFavs() { localStorage.setItem('mono_favs', JSON.stringify([...favourites])); updateFavUI(); }
    function updateFavUI() {
      const totalFavs = [...favourites].filter(url => allChannels.some(c => c.url === url)).length;
      favCountSpan.innerText = totalFavs;
    }
    function toggleFav(channel) {
      if(favourites.has(channel.url)) favourites.delete(channel.url);
      else favourites.add(channel.url);
      saveFavs();
      renderChannelGrid();
      toast(favourites.has(channel.url) ? '⭐ Added to favourites' : '☆ Removed');
    }

    // ---------- M3U PARSER (chunked, respects groups & counts) ----------
    function parseM3U(text, onDone) {
      const lines = text.split(/\r?\n/);
      let channels = [];
      let cur = null;
      let i = 0;
      const chunk = 600;
      function processChunk() {
        const end = Math.min(i + chunk, lines.length);
        for (; i < end; i++) {
          const l = lines[i].trim();
          if (l.startsWith('#EXTINF')) {
            const nameMatch = l.match(/tvg-name="([^"]*)"/i) || l.match(/,([^,]+)$/);
            let name = nameMatch ? (nameMatch[1] || nameMatch[2]) : 'Channel';
            if (name.includes(',')) name = name.split(',').pop();
            name = name.trim() || 'Channel';
            const logo = (l.match(/tvg-logo="([^"]*)"/i) || [])[1] || '';
            const group = (l.match(/group-title="([^"]*)"/i) || [])[1] || 'General';
            cur = { name, logo, group, url: '' };
          } else if (l && !l.startsWith('#') && cur) {
            if (l.startsWith('http')) {
              cur.url = l;
              channels.push(cur);
              cur = null;
            }
          }
        }
        if (i < lines.length) requestIdleCallback(processChunk, { timeout: 40 });
        else onDone(channels);
      }
      processChunk();
    }

    // load playlist from URL (cached via AppCache)
    async function loadPlaylist(url, playlistName = "default") {
      toast(`Loading ${playlistName}...`);
      try {
        let cached = await AppCache.getM3U(url);
        let m3u = cached;
        if (!m3u) {
          const resp = await fetch(url, { signal: AbortSignal.timeout(20000) });
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          m3u = await resp.text();
          await AppCache.setM3U(url, m3u);
        }
        parseM3U(m3u, (channels) => {
          allChannels = channels;
          rebuildCategories();
          applyFilterAndRender();
          toast(`✅ ${allChannels.length} channels loaded`);
          if (allChannels.length > 0 && !isPlaying) {
            selectedChannelIndex = 0;
            playChannelByIndex(0);
          }
        });
      } catch(e) {
        toast(`Playlist error: ${e.message}`);
        console.error(e);
      }
    }

    // rebuild categories with counts (exactly like image: "USA SPORTS 111")
    function rebuildCategories() {
      const groupCount = new Map();
      allChannels.forEach(ch => {
        const grp = ch.group || 'General';
        groupCount.set(grp, (groupCount.get(grp) || 0) + 1);
      });
      categoriesMap = groupCount;
      renderCategoryList();
    }

    function renderCategoryList() {
      let cats = [['All', allChannels.length], ...Array.from(categoriesMap.entries()).sort((a,b)=>a[0].localeCompare(b[0]))];
      categoryContainer.innerHTML = cats.map(([cat, cnt]) => `
        <button class="category-item ${activeCategory === cat ? 'active' : ''}" data-category="${escapeHtml(cat)}">
          <span class="category-name">${escapeHtml(cat)}</span>
          <span class="category-count">${cnt}</span>
        </button>
      `).join('');
      document.querySelectorAll('.category-item').forEach(btn => {
        btn.addEventListener('click', () => {
          const cat = btn.dataset.category;
          setActiveCategory(cat);
        });
      });
    }

    function setActiveCategory(cat) {
      activeCategory = cat;
      renderCategoryList();
      applyFilterAndRender();
      currentCategoryTitle.innerText = cat === 'All' ? 'ALL CHANNELS' : cat.toUpperCase();
    }

    function applyFilterAndRender() {
      let filtered = [...allChannels];
      if (activeCategory !== 'All') {
        filtered = filtered.filter(ch => (ch.group || 'General') === activeCategory);
      }
      if (searchQuery.trim()) {
        const q = searchQuery.toLowerCase();
        filtered = filtered.filter(ch => ch.name.toLowerCase().includes(q));
      }
      filteredChannels = filtered;
      channelTotalSpan.innerText = filteredChannels.length;
      if (selectedChannelIndex >= filteredChannels.length) selectedChannelIndex = Math.max(0, filteredChannels.length-1);
      renderChannelGrid();
      if (filteredChannels.length && !isPlaying && !currentUrl) {
        // auto play first if nothing playing
        playChannelByIndex(selectedChannelIndex);
      }
    }

    function renderChannelGrid() {
      channelsGrid.innerHTML = filteredChannels.map((ch, idx) => {
        const isFav = favourites.has(ch.url);
        const selectedClass = (idx === selectedChannelIndex) ? 'selected' : '';
        return `
          <div class="channel-item ${selectedClass}" data-index="${idx}" tabindex="0">
            ${ch.logo ? `<img class="channel-logo" src="${escapeHtml(ch.logo)}" loading="lazy" onerror="this.style.display='none'">` : '<div style="width:36px; text-align:center;">📺</div>'}
            <span class="channel-name">${escapeHtml(ch.name)}</span>
            <span class="fav-star">${isFav ? '⭐' : ''}</span>
          </div>
        `;
      }).join('');
      // attach click events
      document.querySelectorAll('.channel-item').forEach(el => {
        el.addEventListener('click', (e) => {
          const idx = parseInt(el.dataset.index);
          if (!isNaN(idx)) playChannelByIndex(idx);
        });
      });
      scrollToSelected();
    }

    function scrollToSelected() {
      const tiles = document.querySelectorAll('.channel-item');
      if (tiles[selectedChannelIndex]) {
        tiles[selectedChannelIndex].focus({preventScroll: false});
        tiles[selectedChannelIndex].scrollIntoView({block: 'nearest', behavior: 'smooth'});
      }
    }

    // Shaka player init with hardware acceleration
    async function initShaka() {
      await shaka.polyfill.installAll();
      if (shaka.Player.isBrowserSupported()) {
        shakaPlayer = new shaka.Player(videoEl);
        shakaPlayer.configure({
          abr: { enabled: true, defaultBandwidthEstimate: 8000000 },
          streaming: { bufferingGoal: 12, rebufferingGoal: 2, stallEnabled: true },
          drm: { retryParameters: { maxAttempts: 3 } }
        });
        shakaPlayer.addEventListener('error', (e) => toast(`Stream error: ${e.detail.message}`));
        videoEl.addEventListener('playing', () => { isPlaying = true; document.getElementById('playPauseBtn').innerHTML = '⏸'; });
        videoEl.addEventListener('pause', () => { isPlaying = false; document.getElementById('playPauseBtn').innerHTML = '▶'; });
        return true;
      } else {
        toast('Shaka not supported');
        return false;
      }
    }

    async function playChannelByIndex(idx) {
      if (!filteredChannels.length) return;
      selectedChannelIndex = idx;
      renderChannelGrid();
      const channel = filteredChannels[selectedChannelIndex];
      if (!channel || !channel.url) return;
      if (shakaPlayer && currentUrl === channel.url && isPlaying) return;
      currentUrl = channel.url;
      try {
        if (!shakaPlayer) await initShaka();
        videoArea.classList.add('active');
        await shakaPlayer.load(channel.url);
        await videoEl.play();
        isPlaying = true;
        // update EPG info (mock)
        epgNowText.innerText = `📺 NOW PLAYING: ${channel.name}  •  ${channel.group || 'Live'}`;
        toast(`Now: ${channel.name}`);
      } catch (err) {
        toast(`Playback error: ${err.message.slice(0,60)}`);
        isPlaying = false;
      }
    }

    // Player controls
    document.getElementById('playPauseBtn').addEventListener('click', () => {
      if (!shakaPlayer) return;
      if (videoEl.paused) videoEl.play();
      else videoEl.pause();
    });
    document.getElementById('muteBtn').addEventListener('click', () => {
      videoEl.muted = !videoEl.muted;
      document.getElementById('muteBtn').innerHTML = videoEl.muted ? '🔇' : '🔊';
    });
    document.getElementById('fullscreenBtn').addEventListener('click', () => {
      const container = document.querySelector('.video-area');
      if (!document.fullscreenElement) container.requestFullscreen().catch(e=>{});
      else document.exitFullscreen();
    });
    document.getElementById('favChannelBtn').addEventListener('click', () => {
      if (filteredChannels[selectedChannelIndex]) toggleFav(filteredChannels[selectedChannelIndex]);
    });

    // Search functionality
    searchInput.addEventListener('input', (e) => {
      searchQuery = e.target.value;
      applyFilterAndRender();
    });

    // Remote / keyboard navigation (full D-pad support)
    window.addEventListener('keydown', (e) => {
      const key = e.key;
      // navigation in channel grid
      if (key === 'ArrowDown') {
        e.preventDefault();
        if (selectedChannelIndex < filteredChannels.length-1) { selectedChannelIndex++; renderChannelGrid(); scrollToSelected(); if(filteredChannels[selectedChannelIndex]) epgNowText.innerText = `▶ ${filteredChannels[selectedChannelIndex].name}`; }
      } else if (key === 'ArrowUp') {
        e.preventDefault();
        if (selectedChannelIndex > 0) { selectedChannelIndex--; renderChannelGrid(); scrollToSelected(); if(filteredChannels[selectedChannelIndex]) epgNowText.innerText = `▶ ${filteredChannels[selectedChannelIndex].name}`; }
      } else if (key === 'ArrowLeft') {
        e.preventDefault();
        let newIdx = selectedChannelIndex - 1;
        if (newIdx >= 0) { selectedChannelIndex = newIdx; renderChannelGrid(); scrollToSelected(); }
      } else if (key === 'ArrowRight') {
        e.preventDefault();
        let newIdx = selectedChannelIndex + 1;
        if (newIdx < filteredChannels.length) { selectedChannelIndex = newIdx; renderChannelGrid(); scrollToSelected(); }
      } else if (key === 'Enter' || key === ' ') {
        e.preventDefault();
        playChannelByIndex(selectedChannelIndex);
      } else if (key === 'f' || key === 'F') {
        if (filteredChannels[selectedChannelIndex]) toggleFav(filteredChannels[selectedChannelIndex]);
      } else if (key === 'Escape') {
        if (document.fullscreenElement) document.exitFullscreen();
      }
    });

    // category focus support with left/right? but fine.
    function escapeHtml(str) { if(!str) return ''; return String(str).replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // DEFAULT PLAYLIST: a public sports-rich M3U that includes many USA groups (for demo)
    // Replace with any URL, but we use a reliable test playlist with many categories.
    const DEFAULT_M3U = 'https://iptv-org.github.io/iptv/categories/sports.m3u';
    // fallback: also try a more comprehensive one? but this gives sports categories.
    // to match image's "USA SPORTS 111" we need a real M3U with many US groups.
    // user can add their own later, but we provide a default.
    async function boot() {
      loadFavs();
      await initShaka();
      await loadPlaylist(DEFAULT_M3U, 'Sports IPTV');
      // If playlist fails to load huge categories, user can provide custom URL via console: but UI already shows.
      // Additional: allow user to change playlist via a button? we add simple hidden feature: double-click on logo.
      console.log('Ready — use arrow keys, Enter to play, F to favourite');
    }
    boot();
  })();
</script>
