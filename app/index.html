<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline'; media-src * blob: data:; img-src * data: blob:; connect-src *; style-src 'self' 'unsafe-inline';">
<title>SAGA TV+</title>

<link rel="preconnect" href="https://iptv-org.github.io">
<link rel="preconnect" href="https://raw.githubusercontent.com">
<link rel="dns-prefetch" href="https://jioplaylist.joinus-apiworker.workers.dev">
<link rel="dns-prefetch" href="https://yupptv.yecic62314.workers.dev">
<link rel="dns-prefetch" href="https://crichdhome.uhd2026.workers.dev">

<script src="./js/shaka.js"></script>
<script src="./js/cache.js"></script>
<script src="./js/preact.min.js"></script>
<script src="./js/htm.min.js"></script>
<script src="./js/hls.min.js"></script>
<script src="./js/epg.js"></script>

<style>
/*══════════════════════════════════════════════════════
  SAGA IPTV — Tizen OS9 Optimized (Enterprise V14.1)
  Performance Focus: GPU Compositing + Async AVPlayer
══════════════════════════════════════════════════════*/
:root {
  --bg: #060606;
  --acc: #ffffff;
  --topH: 110px;
  --botH: 260px;
  --spring: cubic-bezier(0.18, 0.89, 0.32, 1.28);
}

*, *::before, *::after { box-sizing: border-box; -webkit-user-select: none; outline: none; }
body { 
  background: var(--bg); color: #fff; margin: 0; padding: 0;
  font-family: 'Segoe UI', Roboto, sans-serif; 
  overflow: hidden; width: 1920px; height: 1080px; 
}

/* ── CENTERED TOP BAR ── */
#topBar {
  position: absolute; top: 0; left: 0; right: 0;
  height: var(--topH); z-index: 100;
  display: grid;
  grid-template-columns: 1fr auto 1fr; /* Mathematical centering */
  align-items: center;
  padding: 0 60px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0) 100%);
  transition: transform 400ms var(--spring);
}
#topBar.hide { transform: translateY(-100%); }

/* Logo Left */
.brand { display: flex; align-items: center; }
.brand img { height: 55px; filter: drop-shadow(0 2px 10px rgba(0,0,0,0.5)); }

/* CATEGORIES CENTERED & TRANSPARENT */
#navTabs {
  grid-column: 2;
  display: flex; align-items: center; justify-content: center;
  gap: 12px;
  background: transparent !important; /* Fixed: Transparent background */
}

/* Search/Clock Right */
.top-right { grid-column: 3; display: flex; align-items: center; justify-content: flex-end; gap: 30px; }
#clock { font-size: 26px; font-weight: 700; font-variant-numeric: tabular-nums; opacity: 0.8; }

.tab {
  padding: 10px 24px; border-radius: 40px; font-size: 22px; font-weight: 700;
  color: rgba(255,255,255,0.45); transition: all 250ms ease;
  border: 2px solid transparent; background: transparent;
}
.tab.focused { background: rgba(255,255,255,0.12); color: #fff; transform: scale(1.08); }
.tab.active { color: #fff; border-bottom: 4px solid #fff; border-radius: 0; opacity: 1; }

/* ── PLAYER LAYER ── */
#playerWrap { position: fixed; inset: 0; z-index: 1; background: #000; }
#video { width: 100%; height: 100%; display: none; }
#avContainer { position: absolute; inset: 0; width: 1920px; height: 1080px; z-index: 2; display: none; }

/* ── STRIP & CARDS ── */
#mainUI { position: absolute; inset: 0; z-index: 50; pointer-events: none; }
#stripArea {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: var(--botH); pointer-events: auto;
  background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0) 100%);
  padding: 20px 60px 40px;
  transition: transform 400ms var(--spring);
}
#stripArea.hide { transform: translateY(100%); }

.card {
  width: 280px; height: 160px; background: #111; border-radius: 12px;
  flex-shrink: 0; border: 3.5px solid transparent; transition: all 180ms ease;
  overflow: hidden; transform: translateZ(0);
}
.card.sel { 
  transform: scale(1.12); border-color: #fff; z-index: 100;
  box-shadow: 0 15px 45px rgba(0,0,0,0.9), 0 0 30px rgba(255,255,255,0.1);
}

/* ── SPINNER ── */
#bufSpinner {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 70px; height: 70px; border: 5px solid rgba(255,255,255,0.1);
  border-top-color: #fff; border-radius: 50%; display: none; z-index: 200;
  animation: spin 800ms linear infinite;
}
#bufSpinner.on { display: block; }
@keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

#splash {
  position: fixed; inset: 0; z-index: 9999; background: #000;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
</style>
</head>
<body>

<div id="splash">
  <div style="font-size: 80px; font-weight: 900; letter-spacing: -4px;">TV+</div>
  <div id="splMsg" style="color: #555; margin-top: 20px; font-size: 18px; letter-spacing: 2px; text-transform: uppercase;">Initialising Hardware</div>
</div>

<div id="playerWrap">
    <video id="video" crossorigin="anonymous"></video>
    <object id="avContainer" type="application/avplayer"></object>
</div>

<div id="bufSpinner"></div>

<div id="topBar">
  <div class="brand"><img src="icon.png" alt="SAGA"></div>
  <div id="navTabs"></div>
  <div class="top-right">
    <div id="searchBtn" style="font-size: 32px;">🔍</div>
    <div id="clock">00:00</div>
  </div>
</div>

<div id="mainUI">
  <div id="stripArea">
    <div id="stripLabel" style="font-size: 24px; font-weight: 700; margin-bottom: 15px; color: rgba(255,255,255,0.6);">Telugu Channels</div>
    <div id="cardCont" style="display: flex; gap: 20px; transition: transform 400ms var(--spring);"></div>
  </div>
</div>

<script>
/* ══ CONFIG & STATE ══ */
var M3U_CACHE_TTL = 84 * 60 * 60 * 1000; // 3.5 Days
var DEBOUNCE_PLAY = 650;
var allChs = [];
var curCh = null;
var playTimeout = null;
var currentEngine = 'none';

/* ══ ASYNC PLAYER ENGINE ══ */
function playChannel(ch) {
  if (!ch) return;
  curCh = ch;
  
  // 1. CLEAR PREVIOUS IMMEDIATELY
  stopPlayerNow();
  document.getElementById('bufSpinner').classList.add('on');

  // 2. TIZEN AVPLAY OPTIMIZATION
  if (window.webapis && webapis.avplay) {
    try {
      var av = webapis.avplay;
      av.open(ch.url);
      av.setDisplayRect(0, 0, 1920, 1080);
      
      // AGGRESSIVE QUALITY SETTINGS
      try {
        av.setStreamingProperty("ADAPTIVE_INFO", "BITRATE_LIMIT=0|START_BITRATE=HIGHEST|SET_MODE=AUTO");
      } catch(e){}

      av.setListener({
        onbufferingstart: function() { document.getElementById('bufSpinner').classList.add('on'); },
        onbufferingcomplete: function() { document.getElementById('bufSpinner').classList.remove('on'); },
        onerror: function(e) { console.error("AVP Error", e); fallbackToShaka(ch); }
      });

      // 3. ASYNC PREPARE (No Freezing)
      av.prepareAsync(function() {
        if (curCh && curCh.url === ch.url) {
          av.play();
          currentEngine = 'avplay';
          document.getElementById('avContainer').style.display = 'block';
        }
      }, function(err) { fallbackToShaka(ch); });

    } catch (e) { fallbackToShaka(ch); }
  } else {
    fallbackToShaka(ch);
  }
}

function stopPlayerNow() {
  clearTimeout(playTimeout);
  if (window.webapis && webapis.avplay) {
    try { 
      webapis.avplay.stop(); 
      document.getElementById('avContainer').style.display = 'none';
    } catch(e){}
  }
  var v = document.getElementById('video');
  v.pause(); v.src = ""; v.load(); v.style.display = 'none';
  document.getElementById('bufSpinner').classList.remove('on');
}

/* ══ 84-HOUR CACHE ENGINE ══ */
function initApp() {
  updateClock();
  setInterval(updateClock, 1000);

  var lastUpdate = localStorage.getItem('saga_pl_timestamp') || 0;
  var now = Date.now();

  // Load from AppCache (IndexedDB)
  AppCache.load('channels_full').then(function(cached) {
    if (cached && (now - lastUpdate < M3U_CACHE_TTL)) {
      console.log("Enterprise Cache: Hit (84h policy)");
      allChs = cached;
      bootUI();
    } else {
      console.log("Enterprise Cache: Expired/Missing. Fetching workers...");
      fetchPlaylistFromWorkers();
    }
  });
}

function fetchPlaylistFromWorkers() {
  document.getElementById('splMsg').textContent = 'Refreshing Playlist...';
  // Worker fetching logic from V14 goes here
  // After fetch completion:
  // localStorage.setItem('saga_pl_timestamp', Date.now());
  // AppCache.save('channels_full', data).then(bootUI);
}

function bootUI() {
  document.getElementById('splash').style.opacity = '0';
  setTimeout(function(){ document.getElementById('splash').style.display = 'none'; }, 500);
  renderTabs();
  renderGrid('Telugu');
}

/* ══ KEYBOARD / REMOTE OPTIMIZATION ══ */
document.addEventListener('keydown', function(e) {
  var key = e.keyCode;
  
  // IMMEDIATELY RELEASE DECODER ON ANY NAV KEY
  if (key >= 37 && key <= 40) {
    stopPlayerNow(); 
    // Navigation logic...
  }

  // DEBOUNCED PLAY ON SELECT
  if (key === 13) {
    playTimeout = setTimeout(function() {
      var selectedCh = getSelectedFromDOM(); // Your V14 logic
      playChannel(selectedCh);
    }, DEBOUNCE_PLAY);
  }
  
  // TIZEN BACK KEY
  if (key === 10009) {
    e.preventDefault();
    showExitOverlay(); // Your V14 logic
  }
});

function updateClock() {
  var d = new Date();
  var h = d.getHours(), m = d.getMinutes();
  document.getElementById('clock').textContent = (h<10?'0':'')+h + ":" + (m<10?'0':'')+m;
}

window.onload = initApp;
</script>
</body>
</html>
