<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' blob: data:; script-src * 'unsafe-inline' blob:; media-src * blob: data:; img-src * data: blob:; connect-src *; style-src * 'unsafe-inline';">
<title>TV+</title>
<link rel="preconnect" href="https://iptv-org.github.io">
<link rel="preconnect" href="https://raw.githubusercontent.com">
<link rel="dns-prefetch" href="https://jioplaylist.joinus-apiworker.workers.dev">
<link rel="dns-prefetch" href="https://yupptv.yecic62314.workers.dev">
<link rel="dns-prefetch" href="https://crichdhome.uhd2026.workers.dev">
<script src="./js/shaka.js"></script>
<script src="./js/cache.js"></script>
<script src="./js/epg.js"></script>
<style>
/*══════════════════════════════════════════════════
  SAGA IPTV — Native Edition v15
  AVPlay (async) · Shaka · HLS.js · Samsung Tizen OS9
  Zero-jank remote · GPU layers · Twice-a-week refresh
══════════════════════════════════════════════════*/
*,*::before,*::after{
  margin:0;padding:0;box-sizing:border-box;
  user-select:none;-webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
}
:root{
  --bg:#080808;--s1:#111;--s2:#1c1c1c;--s3:#262626;--s4:#303030;
  --b1:rgba(255,255,255,.08);--b2:rgba(255,255,255,.15);--b3:rgba(255,255,255,.28);
  --w0:#fff;--w1:rgba(255,255,255,.88);--w2:rgba(255,255,255,.60);
  --w3:rgba(255,255,255,.38);--w4:rgba(255,255,255,.16);
  --live:#ff3b30;--ok:#30d158;--warn:#ff9f0a;--info:#0a84ff;
  --topH:88px;--botH:220px;--cw:240px;--ch:144px;--gap:12px;
  --fast:70ms;--mid:140ms;--slow:280ms;
  --spring:cubic-bezier(.22,1,.36,1);--ease:cubic-bezier(.4,0,.2,1);
}
html,body{
  width:100vw;height:100vh;overflow:hidden;
  background:var(--bg);color:var(--w0);
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;font-size:16px;
}
#root{
  width:100vw;height:100vh;position:relative;overflow:hidden;
  transform:translateZ(0);contain:strict;
}

/* ── PLAYER ── */
#playerWrap{position:absolute;inset:0;z-index:1;background:#000;transform:translateZ(0);}
#video{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:fill;/* default: stretch, no black bars */
  display:block;background:#000;
  transform:translateZ(0);will-change:transform;
}
#avContainer{position:absolute;left:0;top:0;width:1920px;height:1080px;display:none;z-index:2;}

/* ── VIGNETTE ── */
#vig{
  position:absolute;inset:0;z-index:2;pointer-events:none;
  background:linear-gradient(to bottom,
    rgba(0,0,0,.82) 0%,rgba(0,0,0,0) 18%,
    rgba(0,0,0,0) 52%,rgba(0,0,0,.72) 72%,rgba(0,0,0,.97) 100%);
  transition:opacity var(--slow) var(--ease);
}
#vig.dim{opacity:.12}

/* ══ TOP BAR ══════════════════════════════════════════════════ */
#topBar{
  position:absolute;top:0;left:0;right:0;height:var(--topH);z-index:30;
  display:flex;align-items:center;
  padding:0 28px;
  background:rgba(5,5,5,.97);
  border-bottom:1px solid rgba(255,255,255,.08);
  will-change:transform,opacity;
  transition:transform var(--slow) var(--spring),opacity var(--mid);
}
#topBar.hide{transform:translateY(-115%);opacity:0;pointer-events:none}

/* Brand — fixed left */
.brand{
  display:flex;align-items:center;flex-shrink:0;
  margin-right:0;/* no gap — tabs are centered via flex */
}
.brand-name{
  font-size:26px;font-weight:900;letter-spacing:-.5px;color:#fff;
  padding:0;background:transparent;
}

/* ── NAV TABS — centred between brand and top-right ── */
#navTabs{
  flex:1;
  display:flex;align-items:center;justify-content:center;
  gap:4px;overflow:hidden;min-width:0;
  /* transparent bg limited to this element */
  background:transparent;
}
.ntab{
  height:48px;padding:0 20px;
  border:none;border-radius:8px;
  background:rgba(255,255,255,.06);
  color:rgba(255,255,255,.42);
  font-size:18px;font-weight:700;cursor:pointer;outline:none;
  white-space:nowrap;flex-shrink:0;
  transition:background 80ms,color 80ms,transform 70ms;
  transform:translateZ(0);letter-spacing:-.2px;
  contain:layout style;
}
.ntab.on{
  background:rgba(255,255,255,.14);color:#fff;font-weight:800;
  box-shadow:inset 0 -3px 0 0 #fff;
}
.ntab.focused,.ntab:focus-visible{
  background:rgba(255,255,255,.20);color:#fff;
  outline:2px solid rgba(255,255,255,.8);outline-offset:2px;
  transform:scale(1.05) translateZ(0);
}
.tab-count{
  display:inline-block;font-size:11px;font-weight:700;
  margin-left:6px;opacity:.45;
  background:rgba(255,255,255,.12);padding:2px 7px;border-radius:8px;
  vertical-align:middle;letter-spacing:0;
}
.ntab.on .tab-count{opacity:.72;background:rgba(255,255,255,.20)}

/* Top-right — fixed */
.top-right{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:0;}
#topClock{
  font-size:16px;font-weight:700;color:var(--w2);
  font-variant-numeric:tabular-nums;letter-spacing:.5px;margin-right:4px;
}
.tip-btn{
  width:44px;height:44px;border-radius:50%;
  background:var(--b1);border:1.5px solid var(--b1);
  cursor:pointer;outline:none;
  display:flex;align-items:center;justify-content:center;
  color:var(--w2);flex-shrink:0;
  transition:background var(--fast),transform var(--fast),color var(--fast);
  transform:translateZ(0);
}
.tip-btn svg{width:20px;height:20px;fill:currentColor}
.tip-btn.focused,.tip-btn:focus{
  background:var(--w0);color:#111;border-color:rgba(255,255,255,.9);
  transform:scale(1.15) translateZ(0);
  outline:3px solid rgba(255,255,255,.5);outline-offset:2px;
}
.tip-btn.active{background:var(--w0);color:#111;border-color:transparent}

/* ── NOW PLAYING ── */
#nowInfo{
  position:absolute;left:40px;bottom:calc(var(--botH) + 18px);
  z-index:20;max-width:660px;pointer-events:none;
  opacity:0;transform:translateY(10px);
  transition:opacity var(--mid) var(--ease),transform var(--mid) var(--spring);
}
#nowInfo.vis{opacity:1;transform:translateY(0)}
#nowTag{
  font-size:10px;font-weight:700;letter-spacing:2.8px;text-transform:uppercase;
  color:var(--w3);margin-bottom:9px;display:flex;align-items:center;gap:8px;
}
.live-dot{
  width:7px;height:7px;border-radius:50%;background:var(--live);flex-shrink:0;
  box-shadow:0 0 8px var(--live);animation:livePulse 2s ease-in-out infinite;
}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
#nowName{
  font-size:40px;font-weight:900;color:var(--w0);line-height:1.02;
  letter-spacing:-.03em;
  text-shadow:0 4px 28px rgba(0,0,0,.95),0 2px 8px rgba(0,0,0,.8);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#nowMeta{display:flex;align-items:center;gap:6px;margin-top:10px;flex-wrap:wrap}
.np{
  background:rgba(255,255,255,.11);border:1px solid rgba(255,255,255,.16);
  border-radius:4px;padding:3px 9px;font-size:10px;font-weight:700;
  color:var(--w0);letter-spacing:.5px;
}
.np-live{background:rgba(255,59,48,.18);border-color:rgba(255,59,48,.4);color:#ff6b63}
.np-engine{background:rgba(10,132,255,.15);border-color:rgba(10,132,255,.35);color:#5eb5ff}
#epgRow{
  margin-top:9px;font-size:12px;color:var(--w3);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:600px;
}
.epg-time{color:var(--w3);margin-right:6px}
.epg-prog{color:var(--w2);font-weight:600}

/* ── BOTTOM PANEL ── */
#bottomPanel{
  position:absolute;bottom:0;left:0;right:0;
  height:var(--botH);z-index:30;padding-bottom:14px;
  will-change:transform,opacity;
  transition:transform var(--slow) var(--spring),opacity var(--mid);
}
#bottomPanel.hide{transform:translateY(calc(100% + 20px));opacity:0;pointer-events:none}
.row-wrap{padding:0 40px}
.row-label{
  font-size:20px;font-weight:700;color:var(--w1);
  margin-bottom:9px;display:flex;align-items:center;gap:9px;
}
.row-count{
  font-size:14px;font-weight:600;color:var(--w3);
  background:var(--b1);border-radius:9px;padding:2px 10px;border:1px solid var(--b1);
}

/* GPU-composited strip — NO overflow:hidden so focus scale isn't clipped */
.tile-strip{
  display:flex;gap:var(--gap);overflow:visible;padding-bottom:4px;
  transform:translateZ(0);will-change:transform;
  transition:transform 90ms linear;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
}

/* ── CHANNEL CARD ── */
.card{
  width:var(--cw);height:var(--ch);
  border-radius:12px;position:relative;flex-shrink:0;
  cursor:pointer;outline:none;
  background:var(--s2);border:1.5px solid var(--b1);
  overflow:visible;
  transition:transform 70ms var(--spring),border-color 55ms linear,box-shadow 70ms linear;
  transform:scale(1) translateZ(0);will-change:transform;
  contain:layout style;
}
.card-inner{
  position:absolute;inset:0;border-radius:10.5px;overflow:hidden;
  background:var(--s2);
}
.card-bg{
  position:absolute;inset:-8px;
  background-size:cover;background-position:center;
  filter:blur(16px) brightness(.18) saturate(2.2);
  opacity:0;transition:opacity 350ms;transform:translateZ(0);
}
.card-bg.on{opacity:1}
.card-img{
  width:100%;height:100%;object-fit:contain;padding:12px;display:block;
  image-rendering:-webkit-optimize-contrast;
  position:relative;z-index:2;
}
.card-fb{
  position:absolute;inset:0;display:flex;
  align-items:center;justify-content:center;
  font-size:24px;color:rgba(255,255,255,.22);z-index:2;
}
.card-grad{
  position:absolute;bottom:0;left:0;right:0;
  padding:26px 8px 7px;
  background:linear-gradient(transparent,rgba(0,0,0,.92));
  border-radius:0 0 10.5px 10.5px;z-index:3;
}
.card-name{
  font-size:15px;font-weight:700;color:var(--w0);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center;
}
.card-badges{position:absolute;top:6px;right:6px;display:flex;gap:3px;z-index:5}
.badge{font-size:9px;font-weight:800;letter-spacing:.3px;padding:2px 5px;border-radius:3px;line-height:14px}
.b-hd{background:rgba(48,209,88,.18);color:#5ce07e;border:1px solid rgba(48,209,88,.35)}
.card-num{position:absolute;top:6px;left:7px;font-size:9px;color:rgba(255,255,255,.18);font-variant-numeric:tabular-nums;z-index:5;font-weight:700}
.card-fav{position:absolute;top:5px;right:6px;font-size:11px;color:var(--warn);display:none;z-index:5}
.card.playing .card-inner::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:var(--w0);border-radius:0;z-index:10;
}
.card.playing{
  border-color:rgba(0,200,255,.55);
  box-shadow:0 0 0 2px rgba(0,200,255,.14),0 0 16px rgba(0,200,255,.10);
}
.card.sel{
  border:3px solid rgba(255,255,255,.98);
  transform:scale(1.14) translateZ(0);z-index:10;
  box-shadow:
    0 0 0 5px rgba(255,255,255,.20),
    0 0 0 9px rgba(255,255,255,.07),
    0 0 0 14px rgba(255,255,255,.02),
    0 26px 60px rgba(0,0,0,.99),
    0 0 60px rgba(255,255,255,.09);
  transition:transform 110ms var(--spring),border-color 55ms;
}

/* ── STATUS BAR ── */
#statusBar{
  position:absolute;bottom:0;left:0;right:0;
  height:32px;z-index:35;
  display:flex;align-items:center;gap:9px;padding:0 40px;
  background:rgba(0,0,0,.88);
  font-size:13px;color:var(--w3);
  will-change:opacity;transition:opacity var(--mid);
}
#statusBar.hide{opacity:0}
.sdot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.18);flex-shrink:0}
.sdot.ok{background:var(--ok)}.sdot.err{background:var(--live)}
.sdot.buf{background:var(--warn);animation:livePulse 1s ease-in-out infinite}
#sTxt{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#sBw{color:var(--w3);flex-shrink:0;font-variant-numeric:tabular-nums}
#sClock{color:rgba(255,255,255,.20);flex-shrink:0;font-variant-numeric:tabular-nums}

/* ── SEARCH OVERLAY ── */
#searchOv{
  position:absolute;top:0;left:0;right:0;z-index:50;
  display:flex;align-items:center;gap:12px;padding:14px 40px;
  background:rgba(0,0,0,.97);border-bottom:1px solid var(--b1);
  opacity:0;transform:translateY(-8px);pointer-events:none;
  transition:opacity var(--mid) var(--spring),transform var(--mid) var(--spring);
}
#searchOv.open{opacity:1;transform:translateY(0);pointer-events:auto}
.srch-ico{width:18px;height:18px;fill:var(--w3);flex-shrink:0}
#searchInp{
  flex:1;background:var(--s2);border:1.5px solid var(--b2);
  border-radius:9px;padding:10px 14px;color:var(--w0);
  font-size:15px;outline:none;
  -webkit-user-select:text!important;user-select:text!important;
  transition:border-color var(--fast);
}
#searchInp:focus{border-color:rgba(255,255,255,.5)}
#searchInp::placeholder{color:var(--w3)}
#searchCount{color:var(--w3);font-size:11px;font-weight:600;white-space:nowrap;min-width:80px;text-align:right}
.srch-close{
  background:var(--s2);border:1px solid var(--b2);
  color:var(--w1);border-radius:8px;padding:8px 14px;
  font-size:12px;font-weight:700;cursor:pointer;outline:none;
  transition:background var(--fast),transform var(--fast);transform:translateZ(0);
}
.srch-close.focused,.srch-close:focus{
  background:var(--s3);outline:2px solid rgba(255,255,255,.4);outline-offset:1px;
  transform:scale(1.05) translateZ(0);
}

/* ── QUICK ACTIONS ── */
#yellowPopup{
  position:absolute;inset:0;z-index:60;
  background:rgba(0,0,0,.86);
  opacity:0;pointer-events:none;
  display:flex;align-items:center;justify-content:center;
  transition:opacity var(--mid) var(--ease);
}
#yellowPopup.on{opacity:1;pointer-events:auto}
.yp-card{
  background:var(--s1);border:1px solid var(--b2);
  border-radius:20px;padding:28px;width:460px;max-width:90vw;
  animation:popIn 110ms var(--spring);
}
@keyframes popIn{from{transform:scale(.91) translateY(6px);opacity:0}to{transform:none;opacity:1}}
.yp-hdr{display:flex;align-items:center;gap:10px;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--b1);}
.yp-title{font-size:18px;font-weight:800;color:var(--w0);flex:1;letter-spacing:-.3px}
.yp-x{
  background:var(--b1);border:1px solid var(--b1);
  color:var(--w2);font-size:13px;cursor:pointer;outline:none;
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:background var(--fast),transform var(--fast);
}
.yp-x.focused,.yp-x:focus{background:rgba(255,255,255,.18);color:var(--w0);transform:scale(1.1);outline:none}
.yp-acts{display:flex;flex-direction:column;gap:4px}
.yp-act{
  display:flex;align-items:center;gap:12px;padding:12px 13px;
  border-radius:10px;background:var(--s2);border:1px solid var(--b1);
  cursor:pointer;outline:none;width:100%;text-align:left;
  transition:background var(--fast),border-color var(--fast),transform var(--fast);
  font-size:13px;font-weight:600;color:var(--w0);transform:translateZ(0);
}
.yp-act.focused,.yp-act:focus{
  background:var(--s3);border-color:var(--b3);
  transform:translateX(3px) translateZ(0);outline:none;
}
.yp-act-ico{width:36px;height:36px;border-radius:9px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.yp-act-txt{flex:1}
.yp-act-t{font-size:13px;font-weight:700;color:var(--w0)}
.yp-act-d{font-size:10px;color:var(--w3);margin-top:2px}
.yp-act-arr{color:var(--w3);font-size:16px;font-weight:300}
#ypForm{display:none;flex-direction:column;gap:9px;margin-top:12px;padding-top:12px;border-top:1px solid var(--b1)}
#ypForm.on{display:flex}
.yp-inp{
  width:100%;padding:11px 13px;border-radius:9px;
  background:var(--s2);border:1.5px solid var(--b2);
  color:var(--w0);font-size:13px;outline:none;
  -webkit-user-select:text!important;user-select:text!important;
  transition:border-color var(--fast);
}
.yp-inp:focus{border-color:rgba(255,255,255,.5)}
.yp-inp::placeholder{color:var(--w3)}
.yp-brow{display:flex;gap:7px}
.yp-btn{
  flex:1;padding:11px;border-radius:9px;
  border:1px solid var(--b2);background:var(--s2);color:var(--w0);
  font-size:13px;font-weight:700;cursor:pointer;outline:none;
  transition:background var(--fast),transform var(--fast);
}
.yp-btn.focused,.yp-btn:focus{background:var(--s3);outline:2px solid rgba(255,255,255,.4);outline-offset:1px;transform:scale(1.02)}
.yp-btn-ok{background:rgba(255,255,255,.13);border-color:rgba(255,255,255,.28)}

/* ── SETTINGS ── */
#settingsOv{
  position:absolute;inset:0;z-index:55;
  background:rgba(8,8,8,.98);
  opacity:0;pointer-events:none;
  display:flex;flex-direction:column;
  transition:opacity var(--mid) var(--ease);
}
#settingsOv.on{opacity:1;pointer-events:auto}
.so-hdr{display:flex;align-items:center;padding:24px 46px 16px;border-bottom:1px solid var(--b1);flex-shrink:0;gap:14px;}
.so-title{font-size:24px;font-weight:900;color:var(--w0);flex:1;letter-spacing:-.4px}
.so-close{
  background:var(--b1);border:1px solid var(--b2);
  color:var(--w1);font-size:15px;font-weight:700;cursor:pointer;outline:none;
  padding:11px 26px;border-radius:10px;
  transition:background var(--fast),transform var(--fast);
}
.so-close.focused,.so-close:focus{
  background:rgba(255,255,255,.18);color:var(--w0);
  outline:2.5px solid rgba(255,255,255,.55);outline-offset:2px;transform:scale(1.04);
}
.so-body{display:flex;flex:1;overflow:hidden}
.so-side{width:260px;flex-shrink:0;border-right:1px solid var(--b1);padding:12px 0;overflow-y:auto;scrollbar-width:none}
.so-side::-webkit-scrollbar{display:none}
.so-main{flex:1;overflow-y:auto;padding:26px 50px;scrollbar-width:none}
.so-main::-webkit-scrollbar{display:none}
.so-slbl{font-size:10px;font-weight:700;color:var(--w3);letter-spacing:1.6px;text-transform:uppercase;padding:11px 26px 5px}
.so-nav{
  display:flex;align-items:center;gap:12px;padding:16px 26px;
  cursor:pointer;outline:none;font-size:16px;font-weight:600;color:var(--w3);
  border-left:3px solid transparent;
  transition:background var(--fast),color var(--fast),border-left-color var(--fast);
}
.so-nav.on{color:var(--w0);background:rgba(255,255,255,.05);border-left-color:var(--w0)}
.so-nav.focused,.so-nav:focus{background:rgba(255,255,255,.09);color:var(--w0);outline:none;border-left-color:rgba(255,255,255,.6)}
.so-nav svg{width:18px;height:18px;fill:currentColor;flex-shrink:0}
.srow{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 12px;border-bottom:1px solid var(--b1);
  cursor:pointer;outline:none;border-radius:9px;
  transition:background var(--fast);
}
.srow:last-child{border-bottom:none}
.srow.focused,.srow:focus{background:rgba(255,255,255,.07);outline:2.5px solid rgba(255,255,255,.5);outline-offset:2px}
.srow-l{flex:1;margin-right:18px}
.srow-t{font-size:18px;font-weight:600;color:var(--w0)}
.srow-d{font-size:12px;color:var(--w3);margin-top:3px;line-height:1.5}
.opt-row{
  display:flex;align-items:center;gap:14px;
  padding:16px 14px;border-radius:10px;
  background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.08);
  cursor:pointer;outline:none;margin-bottom:7px;
  transition:background 75ms,border-color 75ms,transform 55ms;transform:translateZ(0);
}
.opt-row.focused,.opt-row:focus{
  background:rgba(255,255,255,.11);border-color:rgba(255,255,255,.55);
  outline:2.5px solid rgba(255,255,255,.6);outline-offset:2px;transform:translateX(4px) translateZ(0);
}
.opt-row-on{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.38)}

.opt-info{flex:1}
.opt-label{font-size:18px;font-weight:700;color:var(--w0)}

.tog{position:relative;width:60px;height:32px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tog-t{
  position:absolute;inset:0;cursor:pointer;
  background:rgba(255,255,255,.16);border-radius:16px;transition:background 180ms;
}
.tog-t::before{
  content:'';position:absolute;width:24px;height:24px;top:4px;left:4px;
  background:#fff;border-radius:50%;box-shadow:0 1px 5px rgba(0,0,0,.5);
  transition:transform 180ms var(--spring);will-change:transform;
}
.tog input:checked+.tog-t{background:rgba(255,255,255,.80)}
.tog input:checked+.tog-t::before{transform:translateX(28px);background:#111}
.so-btn{
  display:flex;align-items:center;gap:9px;width:100%;padding:16px 18px;
  border:1.5px solid var(--b2);background:var(--s2);color:var(--w0);
  font-size:16px;font-weight:700;cursor:pointer;outline:none;
  border-radius:10px;margin-top:9px;
  transition:background var(--fast),transform var(--fast);
}
.so-btn.focused,.so-btn:focus{background:var(--s3);outline:2.5px solid rgba(255,255,255,.5);outline-offset:2px;transform:scale(1.01)}
.src-card{
  display:flex;align-items:center;gap:10px;padding:12px 0;
  border-bottom:1px solid var(--b1);cursor:pointer;outline:none;
  transition:background var(--fast);border-radius:5px;
}
.src-card.focused,.src-card:focus{background:rgba(255,255,255,.03);outline:2px solid rgba(255,255,255,.35);outline-offset:2px}

.src-n{font-size:16px;font-weight:700;color:var(--w0)}

/* ── DIALER ── */
#mDial{
  position:absolute;inset:0;z-index:65;
  background:rgba(0,0,0,.88);
  opacity:0;pointer-events:none;
  display:flex;align-items:center;justify-content:center;
  transition:opacity var(--mid) var(--ease);
}
#mDial.on{opacity:1;pointer-events:auto}
.dial-box{background:var(--s1);border:1px solid var(--b2);padding:28px;width:300px;border-radius:20px;animation:popIn 110ms var(--spring)}
.dial-scr{background:var(--s2);border:1px solid var(--b1);border-radius:12px;padding:16px;text-align:center;margin-bottom:14px}

.vol-fill{height:100%;background:var(--w0);border-radius:2px;transition:width 65ms linear}
#volPct{font-size:18px;font-weight:700;min-width:36px;text-align:right;color:var(--w0)}

#engBadge{

#exitOv{

/* ════════════════════════════════════════════
   DOMINANT COLOUR
════════════════════════════════════════════ */
function extractColour(img,cb){
  try{
    ccx.clearRect(0,0,8,8);ccx.drawImage(img,0,0,8,8);
    var d=ccx.getImageData(0,0,8,8).data,r=0,g=0,b=0,n=0;
    for(var i=0;i<d.length;i+=4){
      if(d[i+3]<40)continue;
      var mx=Math.max(d[i],d[i+1],d[i+2]),mn=Math.min(d[i],d[i+1],d[i+2]);
      var w=.15+(mx>0?(mx-mn)/mx*.85:0);
      r+=d[i]*w;g+=d[i+1]*w;b+=d[i+2]*w;n+=w;
    }
    if(n<1){cb(null);return}
    cb('rgb('+Math.round(r/n*.28)+','+Math.round(g/n*.28)+','+Math.round(b/n*.28)+')');
  }catch(e){cb(null)}
}

function parseJsonChannels(txt,srcTag){
  var data=JSON.parse(txt);if(!Array.isArray(data))data=[data];
  var out=[];
  for(var i=0;i<data.length;i++){
    var it=data[i];if(!it)continue;
    var url=it.m3u8||it.url||it.stream_url||it.stream||it.link;if(!url)continue;
    out.push({name:String(it.name||it.title||it.channel_name||'Channel').trim(),url:url,
      logo:it.logo||it.logo_url||it.image||'',group:it.group||it.category||it.genre||'General',
      _src:srcTag,_col:null,_tab:undefined});
  }
  return out;
}
function parseHtmlChannels(html,srcTag,group){
  var tmp=document.createElement('div');tmp.innerHTML=html;
  var out=[],anchors=tmp.querySelectorAll('a[href]');
  for(var i=0;i<anchors.length;i++){
    var a=anchors[i],href=a.getAttribute('href')||'';
    if(href.indexOf('dtv=')<0||href.indexOf('http')<0)continue;
    var img=a.querySelector('img'),logo=img?img.getAttribute('src'):'';
    var name='',h=a.querySelector('h3,h2,h1,strong,span');
    if(h)name=h.textContent.trim();
    if(!name&&img)name=img.getAttribute('alt')||'';
    if(!name)name=a.textContent.trim().replace(/\s+/g,' ').slice(0,60);
    name=name.replace(/\s*(PROMO|Premium|HD|SD|Free|Paid|Live)$/i,'').trim()||'Channel';
    out.push({name:name,url:href,logo:logo||'',group:group||'Sports',_src:srcTag,_col:null,_tab:undefined});
  }
  return out;
}
function parseM3UChunked(txt,onDone){
  var lines=txt.split(/\r?\n/),out=[],cur=null,i=0;
  function chunk(){
    var end=Math.min(i+800,lines.length);
    for(;i<end;i++){
      var l=lines[i].trim();
      if(l.indexOf('#EXTINF')===0){
        var ci=l.lastIndexOf(','),name=ci>=0?l.slice(ci+1).trim():'Channel';
        name=name.replace(/\s*\([^)]*\)|\s*\[[^\]]*\]/g,'').trim()||'Channel';
        var logoM=l.match(/tvg-logo="([^"]*)"/i),grpM=l.match(/group-title="([^"]*)"/i);
        cur={name:name,_col:null,_tab:undefined,logo:logoM?logoM[1]:'',group:grpM?grpM[1]:'General',url:''};
      }else if(l&&l.charAt(0)!=='#'&&cur){
        if(l.indexOf('http')===0){cur.url=l;out.push(cur);cur=null}
      }
    }
    if(i<lines.length)requestIdleCallback(chunk,{timeout:32});
    else onDone(out);
  }
  chunk();
}

/* ════════════════════════════════════════════
   CATEGORY
════════════════════════════════════════════ */
function canonicalTab(ch){
  if(ch._tab!==undefined)return ch._tab;
  var t=null,s=ch._src||'';
  if(s==='telugu')t='Telugu';
  else if(s==='jio')t='Jio';
  else if(s==='yupp')t='YuppTV';
  else if(s==='crichd')t='CricHD';
  else{
    var g=(ch.group||'').toLowerCase().trim();
    if(GROUP_MAP[g])t=GROUP_MAP[g];
    else if(g.indexOf('news')>=0)t='News';
    else if(g.indexOf('sport')>=0||g.indexOf('cricket')>=0)t='Sports';
    else if(g.indexOf('entertain')>=0||g.indexOf('movie')>=0||g.indexOf('music')>=0||g.indexOf('kids')>=0)t='Entertainment';
    else if(s&&!['telugu','jio','yupp','crichd'].includes(s))t=s;
  }
  ch._tab=t;return t;
}
function getViewChs(){
  var arr=[],q=searchQ?searchQ.toLowerCase():'';
  for(var i=0;i<allChs.length;i++){
    var ch=allChs[i];
    if(showFavs){if(favs.has(ch.url)&&(!q||ch.name.toLowerCase().indexOf(q)>=0))arr.push(ch);continue}
    var ct=canonicalTab(ch);
    if(ct===activeTab&&(!q||ch.name.toLowerCase().indexOf(q)>=0))arr.push(ch);
  }
  return arr;
}

/* ════════════════════════════════════════════
   PLAYLIST LOADER — with 3.5-day cache
════════════════════════════════════════════ */
function loadPl(url,name,force,srcTag){
  if(!srcTag)srcTag='';
  setSt('Loading '+name+'…','buf');
  return new Promise(function(resolve){
    function doFetch(){
      setSt('Fetching '+name+'…','buf');
      var ctrl=new AbortController(),tid=setTimeout(function(){try{ctrl.abort()}catch(ex){}},25000);
      fetch(url,{signal:ctrl.signal}).then(function(resp){
        clearTimeout(tid);
        if(!resp.ok)throw new Error('HTTP '+resp.status);
        return resp.text();
      }).then(function(txt){
        AppCache.setM3U(url,txt);
        process(txt);
      }).catch(function(e){
        clearTimeout(tid);
        setSt('Error: '+name+' — '+String(e.message||e).slice(0,35),'err');
        resolve([]);
      });
    }
    function process(txt){
      var trimmed=txt.trim();
      var isHtml=(trimmed.charAt(0)==='<');
      var isJson=(!isHtml&&(trimmed.charAt(0)==='['||trimmed.charAt(0)==='{'));
      if(isHtml){
        var grp=(srcTag==='crichd')?'Sports':(srcTag==='yupp')?'Entertainment':'General';
        var parsed=parseHtmlChannels(txt,srcTag||name.toLowerCase(),grp);
        if(!parsed.length){setSt('No channels in '+name,'err');resolve([]);return}
        merge(parsed);resolve(parsed);
      }else if(isJson){
        try{var parsed2=parseJsonChannels(txt,srcTag||name.toLowerCase())}
        catch(je){setSt('JSON error '+name,'err');resolve([]);return}
        merge(parsed2);resolve(parsed2);
      }else{
        parseM3UChunked(txt,function(parsed3){
          if(!parsed3.length){setSt('No channels in '+name,'err');resolve([]);return}
          for(var i=0;i<parsed3.length;i++)parsed3[i]._src=srcTag||parsed3[i]._src||name.toLowerCase();
          merge(parsed3);resolve(parsed3);
        });
      }
    }
    function merge(parsed){
      var seen=new Set(allChs.map(function(c){return c.url}));
      var fresh=parsed.filter(function(c){return!seen.has(c.url)});
      allChs=allChs.concat(fresh);
      rebuildNavTabs();viewChs=getViewChs();renderAll();
      setSt(allChs.length+' channels','ok');
      saveChCache();
      /* Preload logos for visible cards only */
      var logos=[];
      for(var k=0;k<Math.min(VPORT*2,parsed.length);k++){if(parsed[k].logo)logos.push(parsed[k].logo)}
      AppCache.preloadImages(logos,[]);
    }
    if(!force){
      AppCache.getM3U(url).then(function(cached){if(cached)process(cached);else doFetch()}).catch(doFetch);
    }else doFetch();
  });
}

/* ════════════════════════════════════════════
   NAV TABS — CENTRED, transparent bg
════════════════════════════════════════════ */
function rebuildNavTabs(){
  var builtInNames=['Telugu','Jio','YuppTV','CricHD','Favourites'];
  var extraCats=['News','Sports','Entertainment'];
  var customNames=pls.filter(function(p){return!p.builtIn}).map(function(p){return p.name});
  var seen=new Set(),order=['Telugu','Jio','YuppTV','CricHD'];
  allChs.forEach(function(ch){
    var t=canonicalTab(ch);
    if(t&&!builtInNames.includes(t)&&!extraCats.includes(t)&&!order.includes(t))order.push(t);
  });
  extraCats.forEach(function(c){
    if(!order.includes(c)&&allChs.some(function(ch){return canonicalTab(ch)===c}))order.push(c);
  });
  order.push('Favourites');
  customNames.forEach(function(n){if(!order.includes(n))order.push(n)});
  var tabs=[];order.forEach(function(t){if(!seen.has(t)){seen.add(t);tabs.push(t)}});

  var tabCounts={};
  allChs.forEach(function(ch){var t=canonicalTab(ch);if(t)tabCounts[t]=(tabCounts[t]||0)+1});
  tabCounts['Favourites']=favs.size;

  /* Render tabs — transparent bg on #navTabs, tabs are centred via flex justify-content:center */
  navTabs.innerHTML='';
  var frag=document.createDocumentFragment();
  tabs.forEach(function(t){
    var btn=document.createElement('button');
    btn.className='ntab'+(t===activeTab?' on':'');
    btn.dataset.g=t;btn.tabIndex=0;btn.textContent=t;
    var cnt=tabCounts[t]||0;
    if(cnt>0){var sp=document.createElement('span');sp.className='tab-count';sp.textContent=String(cnt);btn.appendChild(sp)}
    btn.addEventListener('click',function(){
      if(t==='Favourites'){showFavs=true;activeTab='Favourites'}else{showFavs=false;activeTab=t}
      viewChs=getViewChs();col=0;renderFrom=0;renderAll();rebuildNavTabs();
    });
    frag.appendChild(btn);
  });
  navTabs.appendChild(frag);
}
function setTab(t){
  showFavs=(t==='Favourites');activeTab=t;
  viewChs=getViewChs();col=0;renderFrom=0;renderAll();rebuildNavTabs();
}

/* ════════════════════════════════════════════
   VIRTUAL STRIP RENDERER
   Zero innerHTML re-creation — diff-patch DOM nodes
   Scroll is CSS transform only (no layout)
════════════════════════════════════════════ */
var _stripNodes=[]; /* cached card DOM nodes */
var _stripFrom=-1;  /* last renderFrom */

function renderAll(){
  rowLabel.textContent=showFavs?'Favourites':activeTab;
  rowCount.textContent=viewChs.length;
  var strip=$('strip');if(!strip)return;

  /* Compute scroll offset */
  var localIdx=col-1-renderFrom;
  var off=Math.max(0,(localIdx-2)*(CW+CGAP));

  /* Compute new window */
  var newFrom=Math.max(0,Math.min(viewChs.length-VPORT,col>0?col-3:0));
  if(newFrom!==_stripFrom||_stripNodes.length!==Math.min(VPORT,viewChs.length)){
    _stripFrom=renderFrom=newFrom;
    _rebuildStrip(strip);
  }else{
    /* In-place update: just sync classes, don't rebuild */
    _syncStripClasses();
  }
  strip.style.transform='translateX(-'+off+'px) translateZ(0)';
  _focusSelectedCard();
}
function _rebuildStrip(strip){
  strip.innerHTML='';
  _stripNodes=[];
  var frag=document.createDocumentFragment();
  for(var i=_stripFrom;i<Math.min(_stripFrom+VPORT,viewChs.length);i++){
    var node=_makeCard(i);frag.appendChild(node);_stripNodes.push({i:i,node:node});
  }
  strip.appendChild(frag);
}
function _syncStripClasses(){
  for(var k=0;k<_stripNodes.length;k++){
    var entry=_stripNodes[k],node=entry.node,i=entry.i;
    var isSel=(i===col-1);
    node.classList.toggle('sel',isSel);
    node.classList.toggle('playing',!!(viewChs[i]&&curUrl===viewChs[i].url));
    node.tabIndex=isSel?0:-1;
  }
}
function _focusSelectedCard(){
  requestAnimationFrame(function(){
    for(var k=0;k<_stripNodes.length;k++){
      if(_stripNodes[k].i===col-1){
        _stripNodes[k].node.focus({preventScroll:true});break;
      }
    }
  });
}
function _makeCard(idx){
  var ch=viewChs[idx];
  var div=document.createElement('div');
  div.className='card'+(curUrl&&curUrl===ch.url?' playing':'')+(idx===col-1?' sel':'');
  div.tabIndex=idx===col-1?0:-1;
  div.dataset.i=idx;

  var inner=document.createElement('div');inner.className='card-inner';
  var bg=document.createElement('div');bg.className='card-bg';
  var num=document.createElement('div');num.className='card-num';num.textContent=idx+1;
  var badges=document.createElement('div');badges.className='card-badges';
  if(ch.name.match(/HD|4K/i)){var bHD=document.createElement('span');bHD.className='badge b-hd';bHD.textContent='HD';badges.appendChild(bHD)}
  var fav=document.createElement('div');fav.className='card-fav';fav.textContent='★';
  if(favs.has(ch.url))fav.style.display='block';
  var grad=document.createElement('div');grad.className='card-grad';
  var nm=document.createElement('div');nm.className='card-name';nm.textContent=ch.name;
  grad.appendChild(nm);

  if(ch.logo){
    var img=new Image();img.className='card-img';img.alt=ch.name;img.crossOrigin='anonymous';
    img.loading='lazy';
    img.onload=function(){
      bg.style.backgroundImage='url('+this.src+')';bg.classList.add('on');
      if(!ch._col)extractColour(img,function(c){if(c){ch._col=c;inner.style.background=c}});
    };
    img.onerror=function(){
      if(!inner.querySelector('.card-fb')){var fb=document.createElement('div');fb.className='card-fb';fb.textContent='📺';inner.insertBefore(fb,inner.firstChild)}
    };
    img.src=ch.logo;inner.appendChild(img);
  }else{
    var fb2=document.createElement('div');fb2.className='card-fb';fb2.textContent='📺';inner.appendChild(fb2);
  }
  if(ch._col)inner.style.background=ch._col;
  inner.appendChild(bg);inner.appendChild(grad);
  div.appendChild(num);div.appendChild(badges);div.appendChild(fav);div.appendChild(inner);

  div.addEventListener('click',function(){col=idx+1;renderAll();immediatePlay()});
  return div;
}
function getFocusedCh(){return col>0&&viewChs[col-1]?viewChs[col-1]:null}

/* ════════════════════════════════════════════
   ╔══════════════════════════════════════╗
   ║   NATIVE AVPLAY ENGINE              ║
   ║   prepareAsync — non-blocking!       ║
   ╚══════════════════════════════════════╝
════════════════════════════════════════════ */
function initAVPlay(){
  try{if(window.webapis&&webapis.avplay){avplay=webapis.avplay;avReady=true;setSt('AVPlay ready','ok');return true}}catch(e){}
  avReady=false;return false;
}
function avplayStop(){
  _avplayRetried=false;if(!avplay)return;
  try{var st=avplay.getState();if(st==='PLAYING'||st==='PAUSED'||st==='READY')avplay.stop();avplay.close()}catch(e){}
  avCont.style.display='none';video.style.display='';
}
var _avplayRetried=false;
var _avplayPreparePending=false;

function playWithAVPlay(ch){
  var url=ch.url;_avplayRetried=false;_avplayPreparePending=false;
  avplayStop();
  try{
    /* ── Official Samsung prepareAsync sequence ──
       1. open(url)
       2. setDisplayRect — use actual avCont bounds
       3. setDisplayMethod + streaming properties
       4. setListener (BEFORE prepareAsync)
       5. prepareAsync(successCb, errorCb) — NON-BLOCKING
       6. play() is called from inside successCb
       This is the ONLY correct way to use AVPlay without freezing the UI.
       Reference: Samsung Developer Docs — AVPlay.prepareAsync()             */
    video.style.display='none';
    avCont.style.display='block';

    avplay.open(url);
    /* setDisplayRect after open, before prepareAsync */
    avplay.setDisplayRect(0,0,1920,1080);
    avplay.setDisplayMethod(
      aspectMode===0?'PLAYER_DISPLAY_MODE_LETTER_BOX':
      aspectMode===2?'PLAYER_DISPLAY_MODE_AUTO_ASPECT_RATIO':
      'PLAYER_DISPLAY_MODE_FULL_SCREEN'
    );

    /* ── Aggressive adaptive streaming properties ── */
    try{avplay.setStreamingProperty('PREBUFFER_MODE','FALSE')}catch(e){}
    /* START_BITRATE=0 + SET_MODE=MAX forces immediate quality upgrade */
    try{avplay.setStreamingProperty('ADAPTIVE_INFO','BITRATE_LIMIT=0|START_BITRATE=0|SET_MODE=MAX')}catch(e){}
    /* Minimal initial buffer — live IPTV should start fast */
    try{avplay.setStreamingProperty('INITIAL_BUFFERING_TIME','2000')}catch(e){}
    try{avplay.setStreamingProperty('REBUFFERING_TIME','1000')}catch(e){}

    /* Source-specific UA + headers */
    if(url.indexOf('sanwalyaarpya')>=0||url.indexOf('calm-sun')>=0||url.indexOf('crichd')>=0){
      try{avplay.setStreamingProperty('CUSTOM_MESSAGE','Referer:https://profamouslife.com/')}catch(e){}
      try{avplay.setStreamingProperty('USERAGENT','Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36')}catch(e){}
    }

    /* ── Listener — must be set BEFORE prepareAsync ── */
    avplay.setListener({
      onbufferingstart:function(){
        setSt('Buffering…','buf');
        bufSpinner.classList.add('on');
      },
      onbufferingprogress:function(pct){
        /* Non-blocking — safe to update status */
        if(pct>0&&pct<100)setSt('Buffering '+pct+'%','buf');
      },
      onbufferingcomplete:function(){
        setSt('Streaming · '+ch.name+' [AVPlay]','ok');
        setPlaying(true);bufSpinner.classList.remove('on');
        showEngine('avplay');_syncStripClasses();scheduleOsdHide();
      },
      onerror:function(errCode){
        bufSpinner.classList.remove('on');setSt('AVPlay error '+errCode,'buf');
        setPlaying(false);_avplayHandleError(ch,errCode);
      },
      onstreamcompleted:function(){setSt('Stream ended','');setPlaying(false);bufSpinner.classList.remove('on')},
      oncurrentplaytime:function(ms){
        /* Poll bandwidth from stream info every ~3s */
        if(isPlaying&&ENGINE==='avplay'&&ms%3000<500){
          try{
            var info=avplay.getCurrentStreamInfo();
            if(info){for(var si=0;si<info.length;si++){if(info[si].property==='bandwidth'){var bw=parseInt(info[si].value)||0;if(bw>0)sBw.textContent=(bw/1000000).toFixed(1)+'M';break}}}
          }catch(e){}
        }
      }
    });

    ENGINE='avplay';
    setSt('Connecting [AVPlay]…','buf');
    bufSpinner.classList.add('on');
    updateNowInfo(ch);

    /* ── prepareAsync — KEY FIX: non-blocking, UI stays responsive ── */
    _avplayPreparePending=true;
    avplay.prepareAsync(
      function successCb(){
        /* Called on worker thread — UI never froze */
        _avplayPreparePending=false;
        try{avplay.play()}catch(e2){
          /* Rarely fails: already started or state changed */
          setSt('AVPlay play() failed: '+String(e2).slice(0,35),'err');
          avplayStop();playWithShaka(ch,false);
        }
      },
      function errorCb(err){
        _avplayPreparePending=false;
        setSt('AVPlay prepareAsync failed: '+String(err).slice(0,35),'buf');
        bufSpinner.classList.remove('on');setPlaying(false);
        avplayStop();playWithShaka(ch,false);
      }
    );

  }catch(ex){
    setSt('AVPlay failed: '+String(ex.message||ex).slice(0,40),'buf');
    avplayStop();playWithShaka(ch,false);
  }
}

/* AVPlay error handler — one retry with desktop UA, then Shaka */
function _avplayHandleError(ch,errCode){
  if(_avplayRetried){
    _avplayRetried=false;avplayStop();
    setSt('AVPlay error '+errCode+' — trying Shaka…','buf');
    playWithShaka(ch,false);return;
  }
  _avplayRetried=true;setSt('Retrying [AVPlay + desktop UA]…','buf');
  avplayStop();
  try{
    video.style.display='none';avCont.style.display='block';
    avplay.open(ch.url);avplay.setDisplayRect(0,0,1920,1080);
    avplay.setDisplayMethod('PLAYER_DISPLAY_MODE_FULL_SCREEN');
    try{avplay.setStreamingProperty('PREBUFFER_MODE','FALSE')}catch(e){}
    try{avplay.setStreamingProperty('ADAPTIVE_INFO','BITRATE_LIMIT=0|START_BITRATE=0|SET_MODE=MAX')}catch(e){}
    try{avplay.setStreamingProperty('USERAGENT','Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36')}catch(e){}
    if(ch.url.indexOf('sanwalyaarpya')>=0||ch.url.indexOf('calm-sun')>=0){
      try{avplay.setStreamingProperty('CUSTOM_MESSAGE','Referer:https://profamouslife.com/')}catch(e){}
    }
    avplay.setListener({
      onbufferingstart:function(){setSt('Buffering (retry)…','buf');bufSpinner.classList.add('on')},
      onbufferingprogress:function(){},
      onbufferingcomplete:function(){
        setSt('Streaming · '+ch.name+' [AVPlay]','ok');
        setPlaying(true);bufSpinner.classList.remove('on');
        showEngine('avplay');_syncStripClasses();scheduleOsdHide();_avplayRetried=false;
      },
      onerror:function(ec){bufSpinner.classList.remove('on');_avplayRetried=true;_avplayHandleError(ch,ec)},
      onstreamcompleted:function(){setSt('Stream ended','');setPlaying(false);bufSpinner.classList.remove('on')},
      oncurrentplaytime:function(){}
    });
    avplay.prepareAsync(
      function(){try{avplay.play()}catch(e2){avplayStop();playWithShaka(ch,false)}},
      function(e){_avplayRetried=false;avplayStop();setSt('Retry failed — trying Shaka…','buf');playWithShaka(ch,false)}
    );
    ENGINE='avplay';bufSpinner.classList.add('on');
  }catch(ex){_avplayRetried=false;avplayStop();setSt('AVPlay retry failed — trying Shaka…','buf');playWithShaka(ch,false)}
}

/* ════════════════════════════════════════════
   SHAKA PLAYER ENGINE
════════════════════════════════════════════ */
function initShaka(){
  return new Promise(function(resolve){
    try{shaka.polyfill.installAll()}catch(ex){}
    if(typeof shaka==='undefined'||!shaka.Player.isBrowserSupported()){setSt('Shaka not supported','err');resolve(false);return}
    shakaPlayer=new shaka.Player(video);

    /* Request filter — inject headers for known CDNs */
    shakaPlayer.getNetworkingEngine().registerRequestFilter(function(type,req){
      var u=req.uris&&req.uris[0]?req.uris[0]:'';
      if(u.indexOf('crichd')>=0||u.indexOf('sanwalyaarpya')>=0||u.indexOf('calm-sun')>=0||
         u.indexOf('rojoni')>=0||u.indexOf('abusaeeidx')>=0||u.indexOf('streamglobal')>=0){
        req.headers['Referer']='https://crichd.vip/';
        req.headers['Origin']='https://crichd.vip';
        req.headers['User-Agent']='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36';
      }
      if(u.indexOf('yuppparoriglin.akamaized.net')>=0||u.indexOf('yuppcdn.net')>=0||u.indexOf('yupptv')>=0){
        req.headers['Referer']='https://www.yupptv.com/';
        req.headers['Origin']='https://www.yupptv.com';
      }
    });

    shakaPlayer.configure({
      abr:{
        enabled:true,
        defaultBandwidthEstimate:10000000, /* start high — promotes instant HD */
        switchInterval:3,                   /* check every 3s — aggressive upgrade */
        bandwidthUpgradeTarget:0.70,        /* upgrade at 70% utilisation = fast quality climb */
        bandwidthDowngradeTarget:0.95,      /* only downgrade near capacity */
        restrictToElementCapabilities:true
      },
      streaming:{
        bufferingGoal:cfg.buf,              /* user-configurable, default 10s */
        rebufferingGoal:1,                  /* live: 1s rebuffer threshold */
        stallEnabled:true,
        stallThreshold:0.4,
        stallSkip:0.25,
        jumpLargeGaps:true,
        retryParameters:{maxAttempts:3,baseDelay:250,backoffFactor:1.4,fuzzFactor:0.2,timeout:18000},
        safeSeekOffset:1,
        lowLatencyMode:false,
        inaccurateManifestTolerance:10
      },
      /* Tizen OS9: VP9/AVC supported, AV1 NOT */
      preferredVideoCodecs:['vp09','vp9','avc1','hvc1','hev1'],
      preferredDecodingAttributes:['smooth','powerEfficient'],
    });

    shakaPlayer.addEventListener('adaptation',updateQ);
    shakaPlayer.addEventListener('variantchanged',updateQ);
    shakaPlayer.addEventListener('buffering',function(e){
      if(e.buffering){setSt('Buffering…','buf');bufSpinner.classList.add('on')}
      else{bufSpinner.classList.remove('on');var ch=getFocusedCh();if(ch)setSt('Streaming · '+ch.name,'ok')}
    });
    shakaPlayer.addEventListener('error',function(e){
      var msg=(e.detail&&e.detail.message)||'Stream error';
      setSt(msg.slice(0,55),'err');setPlaying(false);bufSpinner.classList.remove('on');
    });
    video.addEventListener('playing',function(){
      setPlaying(true);bufSpinner.classList.remove('on');
      var ch=getFocusedCh();
      if(ch)setSt('Streaming · '+ch.name+' [Shaka]','ok');
      showEngine('shaka');_syncStripClasses();
      if(cfg.hq)setTimeout(lockHQ,3000);
      updateQ();scheduleOsdHide();
    });
    video.addEventListener('error',function(){setSt('Video error','err');setPlaying(false);bufSpinner.classList.remove('on')});
    setSt('Shaka ready','');resolve(true);
  });
}
function playWithShaka(ch,tryAVFirst){
  if(tryAVFirst===undefined)tryAVFirst=true;
  if(tryAVFirst&&avReady&&cfg.engine!=='shaka'){playWithAVPlay(ch);return}
  avplayStop();video.style.display='';ENGINE='shaka';
  if(!shakaPlayer){setSt('Shaka not initialised','err');return}
  updateNowInfo(ch);setSt('Connecting [Shaka]…','buf');bufSpinner.classList.add('on');
  var loadUrl=ch.url;
  if(ch._src==='yupp'&&ch.url.indexOf('dtv=')>=0){
    var m=ch.url.match(/[?&]dtv=([^&\s]+)/);
    if(m){try{loadUrl=decodeURIComponent(m[1])}catch(e){loadUrl=m[1]}}
  }
  shakaPlayer.load(loadUrl).then(function(){return video.play()}).then(function(){
    setPlaying(true);bufSpinner.classList.remove('on');
    setSt('Streaming · '+ch.name+' [Shaka]','ok');showEngine('shaka');
    if(cfg.hq)setTimeout(lockHQ,3000);updateQ();_syncStripClasses();
    fetchEPGForChannel(ch.name);scheduleOsdHide();
    if(cfg.muteSwitch)setTimeout(function(){video.muted=isMuted},600);
  }).catch(function(err){
    setSt('Shaka failed: '+String(err.message||err).slice(0,40),'err');
    setPlaying(false);bufSpinner.classList.remove('on');tryHlsPlay(ch);
  });
}
function updateQ(){
  if(!shakaPlayer)return;
  try{
    var tracks=shakaPlayer.getVariantTracks(),a=null;
    for(var i=0;i<tracks.length;i++){if(tracks[i].active){a=tracks[i];break}}
    if(a){nowQ.textContent=(a.height?a.height+'p':'Auto')+' · '+(a.bandwidth/1000000).toFixed(1)+'M';nowQ.style.display=''}
  }catch(e){}
}
function lockHQ(){
  if(!shakaPlayer||!isPlaying)return;
  try{
    var t=shakaPlayer.getVariantTracks();if(!t.length)return;
    var best=t[0];for(var i=1;i<t.length;i++){if(t[i].bandwidth>best.bandwidth)best=t[i]}
    shakaPlayer.selectVariantTrack(best,false);
  }catch(e){}
}
function recfg(){
  if(!shakaPlayer)return;
  shakaPlayer.configure({
    abr:{enabled:!cfg.hq},
    streaming:{bufferingGoal:cfg.buf}
  });
}

/* ════════════════════════════════════════════
   HLS.JS FALLBACK ENGINE
════════════════════════════════════════════ */
function tryHlsPlay(ch){
  setSt('Trying HLS.js…','buf');bufSpinner.classList.add('on');
  function doPlay(){
    if(typeof Hls==='undefined'||!Hls.isSupported()){tryDirectPlay(ch);return}
    if(window._hlsInstance){try{window._hlsInstance.destroy()}catch(e){}}
    var h=new Hls({
      maxBufferLength:cfg.buf,maxMaxBufferLength:cfg.buf*2,enableWorker:false,
      xhrSetup:function(xhr,url){
        if(url.indexOf('sanwalyaarpya')>=0||url.indexOf('calm-sun')>=0)xhr.setRequestHeader('Referer','https://profamouslife.com/');
        if(url.indexOf('yuppparoriglin')>=0||url.indexOf('yuppcdn')>=0)xhr.setRequestHeader('Referer','https://www.yupptv.com/');
      }
    });
    window._hlsInstance=h;video.style.display='';
    h.loadSource(ch.url);h.attachMedia(video);
    h.on(Hls.Events.MANIFEST_PARSED,function(){
      video.play().then(function(){
        setPlaying(true);ENGINE='hlsjs';setSt('Streaming · '+ch.name+' [HLS.js]','ok');
        bufSpinner.classList.remove('on');showEngine('hlsjs');_syncStripClasses();scheduleOsdHide();
      }).catch(function(e){setSt('HLS.js play failed','err');bufSpinner.classList.remove('on');tryDirectPlay(ch)});
    });
    h.on(Hls.Events.ERROR,function(ev,data){
      if(data.fatal){bufSpinner.classList.remove('on');setSt('HLS.js error — direct…','err');h.destroy();tryDirectPlay(ch)}
    });
  }
  if(typeof loadHlsJs==='function')loadHlsJs().then(function(H){if(H)doPlay();else tryDirectPlay(ch)});
  else doPlay();
}
function tryDirectPlay(ch){
  setSt('Direct play…','buf');
  try{
    video.style.display='';avplayStop();
    video.src=ch.url;video.load();
    video.play().then(function(){
      setPlaying(true);ENGINE='native';setSt('Streaming · '+ch.name+' [Direct]','ok');showEngine('native');_syncStripClasses();
    }).catch(function(){setSt('All engines failed: '+ch.name,'err')});
  }catch(e){setSt('All engines failed','err')}
}

/* ════════════════════════════════════════════
   PLAY DEBOUNCE + MAIN ENTRY
════════════════════════════════════════════ */
function immediatePlay(){clearTimeout(playTimer);playTimer=setTimeout(_doPlay,PLAY_DEB)}
function _doPlay(){
  var ch=getFocusedCh();if(!ch||!ch.url)return;
  if(ch.url===curUrl&&isPlaying)return;
  curUrl=ch.url;
  if(cfg.muteSwitch&&isPlaying)video.muted=true;
  setPlaying(false);nowQ.style.display='none';updateNowInfo(ch);
  if(cfg.engine==='shaka'){playWithShaka(ch,false);return}
  if(cfg.engine==='avplay'&&avReady){playWithAVPlay(ch);return}
  /* auto: CricHD always via Shaka (needs header injection); others via AVPlay */
  if(ch._src==='crichd'){playWithShaka(ch,false);return}
  if(avReady)playWithAVPlay(ch);else playWithShaka(ch,false);
}

      {val:'shaka', label:'Shaka', desc:'Web player — best header injection, CricHD'}
    ];
    var bufOpts=[
      {val:6, label:'6 s', desc:'Ultra Low Latency'},
      {val:8, label:'8 s', desc:'Low Latency'},

    soMain.innerHTML=html;

      el.addEventListener('click',function(){cfg.engine=el.dataset.engine;saveCfg();renderSettingsSect('playback')});
    });
    QA('[data-buf]',soMain).forEach(function(el){
      el.addEventListener('click',function(){cfg.buf=parseInt(el.dataset.buf);saveCfg();recfg();renderSettingsSect('playback')});
    });
    wireSettings();
  }else if(s==='display'){
    soMain.innerHTML=
      '<div class="srow" tabindex="0">'+
      '<div class="srow-l"><div class="srow-t">OSD Auto-hide</div><div class="srow-d">Channel info fades after 5.5s during playback</div></div>'+
      '<label class="tog"><input type="checkbox" id="cfgOsd"'+(cfg.osd?' checked':'')+'>'+
      '<span class="tog-t"></span></label></div>'+
      '<div style="margin-top:18px;font-size:17px;font-weight:700;color:var(--w0);margin-bottom:7px">Aspect Ratio</div>'+
      '<button class="so-btn" id="soAspect" tabindex="0">⬜ Cycle: '+ASPECTS[aspectMode]+'</button>';
    wireSettings();
    var ab=$('soAspect');if(ab)ab.addEventListener('click',function(){cycleAspect();ab.textContent='⬜ Cycle: '+ASPECTS[aspectMode]});
  }else if(s==='sources'){
    var allSrc=BUILTINS.concat(pls.filter(function(p){return!p.builtIn}));
    var html='';
    allSrc.forEach(function(p,i){
      html+='<div class="src-card" tabindex="0" data-i="'+i+'">'+
        '<div class="src-dot" style="'+(p.builtIn?'background:rgba(255,255,255,.32)':'')+'\"></div>'+

        '</div><div class="src-u">'+esc(p.url)+'</div></div>'+
        (p.builtIn?'':'<button class="src-del" data-del="'+i+'" title="Remove">✕</button>')+

      '<button class="so-btn" id="soAddSrc" tabindex="0">➕ Add Custom Playlist</button>'+

    soMain.querySelectorAll('.src-card').forEach(function(el){
      el.addEventListener('click',function(e){
        if(e.target.closest('[data-del]'))return;
        var src=allSrc[parseInt(el.dataset.i)];
        if(src){loadPl(src.url,src.name,false,src._src||src.name.toLowerCase()).then(function(){setSt('Loaded: '+src.name,'ok')});closeSettings()}

    soMain.querySelectorAll('[data-del]').forEach(function(btn){
      btn.addEventListener('click',function(e){

        var customPls=pls.filter(function(p){return!p.builtIn});

        if(idx>=0&&idx<customPls.length){
          var rm=customPls[idx];
          pls=pls.filter(function(p){return p.builtIn||p.url!==rm.url});savePls();
          allChs=allChs.filter(function(c){return c._src!==rm.name.toLowerCase()});
          rebuildNavTabs();if(activeTab===rm.name)setTab('Telugu');renderSettingsSect('sources');
        }
      });
    });
    var rb=$('soRefresh');if(rb)rb.addEventListener('click',function(){
      AppCache.clearAllM3U();allChs=[];lsSet(PL_REFRESH_KEY,String(Date.now()));
      setSt('Force refreshing…','buf');loadAll(true);closeSettings();
    });
    var ab2=$('soAddSrc');if(ab2)ab2.addEventListener('click',function(){closeSettings();openYP();setTimeout(function(){var a=$('ypa-add');if(a)a.click()},90)});
  }else if(s==='about'){
    soMain.innerHTML=
      '<div style="padding:6px 0">'+
      '<div style="font-size:32px;font-weight:900;color:#fff;margin-bottom:5px">TV+</div>'+
      '<div style="font-size:14px;color:rgba(255,255,255,.35);margin-bottom:22px;letter-spacing:.3px">Native Edition v15 · Samsung Tizen OS9 · AVPlay prepareAsync + Shaka</div>'+
      '<div style="font-size:15px;color:rgba(255,255,255,.58);line-height:2.0">'+
        '<b style="color:rgba(255,255,255,.82)">Remote Keys</b><br>'+
        '↑↓←→ Navigate &nbsp;·&nbsp; OK Play<br>CH▲▼ Prev / Next channel<br>'+
        'RED Next tab &nbsp;·&nbsp; GREEN Aspect &nbsp;·&nbsp; YELLOW Quick actions<br>'+
        'BLUE Search &nbsp;·&nbsp; MENU Settings<br>'+
        '0–9 Quick channel jump &nbsp;·&nbsp; BACK Close / exit'+
      '</div>'+
      '<div style="margin-top:26px;font-size:12px;color:rgba(255,255,255,.20)">'+
        'Built-in: Telugu · Jio · YuppTV · CricHD<br>'+
        'Engines: AVPlay (prepareAsync) · Shaka · HLS.js · Direct<br>'+
        'Playlist cache: 3.5 days (refreshes ~twice a week)'+
      '</div></div>';
  }
}
function wireSettings(){
  var hq=$('cfgHQ'),mu=$('cfgMute'),os=$('cfgOsd');
  if(hq)hq.onchange=function(){cfg.hq=this.checked;saveCfg();recfg()};
  if(mu)mu.onchange=function(){cfg.muteSwitch=this.checked;saveCfg()};
  if(os)os.onchange=function(){cfg.osd=this.checked;saveCfg()};
}

════════════════════════════════════════════ */
function openDial(){mDial.classList.add('on');zone='dialer';dialStr='';dnum.textContent='—';wakeUI();clearTimeout(hideTimer)}
function closeDial(){mDial.classList.remove('on');zone='rows';resetHideTimer();syncFocus()}
QA('.dk',$('mDial')).forEach(function(b){b.addEventListener('click',function(){dialPush(b.dataset.d)})});
function dialPush(d){
  if(d==='clr')dialStr=dialStr.slice(0,-1);
  else if(d==='go'){dialGo();return}
  else if(dialStr.length<4)dialStr+=d;
  dnum.textContent=dialStr||'—';
  clearTimeout(dialTimer);if(dialStr.length>=3)dialTimer=setTimeout(dialGo,1300);
}
function dialGo(){
  var n=parseInt(dialStr,10);dialStr='';dnum.textContent='—';closeDial();
  if(!isNaN(n)&&n>=1&&n<=viewChs.length){col=n;renderAll();immediatePlay()}
  else setSt('Channel '+n+' not found','err');
}

/* Channel HUD */
var chHudEl=$('chHud'),chHudNum=$('chHudNum'),chHudName=$('chHudName'),chHudTimer=null;
function showChHud(str){
  clearTimeout(chHudTimer);
  chHudNum.textContent=str||'—';
  var n=parseInt(str,10);
  chHudName.textContent=(n>=1&&n<=viewChs.length&&viewChs[n-1])?viewChs[n-1].name:'';
  chHudEl.classList.add('on');
  chHudTimer=setTimeout(function(){chHudEl.classList.remove('on');chHudTimer=null},1100);
}
function hideChHud(){clearTimeout(chHudTimer);chHudTimer=null;chHudEl.classList.remove('on')}
function remoteDigit(d){
  rDialStr+=d;clearTimeout(rDialTimer);showChHud(rDialStr);setSt('CH: '+rDialStr+'…','');
  rDialTimer=setTimeout(function(){
    var n=parseInt(rDialStr,10);rDialStr='';hideChHud();
    if(!isNaN(n)&&n>=1&&n<=viewChs.length){col=n;renderAll();immediatePlay()}
    else setSt('Channel not found','err');
  },1300);
}

/* ════════════════════════════════════════════
   KEYMAP — Tizen OS9 full remote
════════════════════════════════════════════ */
var KC={
  UP:38,DN:40,LT:37,RT:39,TUP:48888,TDN:48889,TLT:48886,TRT:48887,
  ENTER:13,BACK:10009,
  PLAY:415,PAUSE:19,PP:10252,STOP:413,FF:417,REW:412,
  RED:403,GREEN:404,YELLOW:405,BLUE:406,
  CHUP:427,CHDN:428,VOL_UP:447,VOL_DN:448,MUTE:449,
  MENU:457,INFO:10134,TOOLS:10135,EXTRA:10253,INFO2:10133
};
function isUp(kc,k){return kc===KC.UP||kc===KC.TUP||k==='ArrowUp'||k==='Up'}
function isDn(kc,k){return kc===KC.DN||kc===KC.TDN||k==='ArrowDown'||k==='Down'}
function isLt(kc,k){return kc===KC.LT||kc===KC.TLT||k==='ArrowLeft'||k==='Left'}
function isRt(kc,k){return kc===KC.RT||kc===KC.TRT||k==='ArrowRight'||k==='Right'}
function isOK(kc,k){return kc===KC.ENTER||k==='Enter'}
function isBack(kc,k){return kc===KC.BACK||k==='Escape'||k==='BrowserBack'||kc===10009}
function isSettings(kc,k){return kc===KC.MENU||kc===KC.INFO2||kc===KC.TOOLS||kc===KC.EXTRA||k==='Menu'||k==='Info'||k==='Tools'}
function isDig(e){var kc=e.keyCode;return(kc>=48&&kc<=57)||(kc>=96&&kc<=105)||(e.key&&e.key.length===1&&e.key>='0'&&e.key<='9')}
function getDig(e){if(e.key&&e.key.length===1&&e.key>='0'&&e.key<='9')return e.key;if(e.keyCode>=96&&e.keyCode<=105)return String(e.keyCode-96);return String(e.keyCode-48)}

window.addEventListener('keydown',function(e){
  var kc=e.keyCode,k=e.key;
  /* Volume — global priority */
  if(kc===KC.VOL_UP||k==='VolumeUp'){e.preventDefault();volUp();wakeUI();return}
  if(kc===KC.VOL_DN||k==='VolumeDown'){e.preventDefault();volDown();wakeUI();return}
  if(kc===KC.MUTE||k==='VolumeMute'){
    e.preventDefault();wakeUI();
    try{if(window.tizen&&tizen.tvaudiocontrol){tizen.tvaudiocontrol.setMute(!tizen.tvaudiocontrol.isMute());showVol();return}}catch(ex){}
    isMuted=!isMuted;video.muted=isMuted;return;
  }
  if(isSettings(kc,k)){e.preventDefault();wakeUI();if(zone==='settings')closeSettings();else openSettings();return}
  wakeUI();

  /* Input fields pass-through */
  var yn=$('ypName'),yu=$('ypUrl');
  if(document.activeElement===yn||document.activeElement===yu){if(isBack(kc,k)){e.preventDefault();$('ypCancel').click()}return}
  var si=$('searchInp');
  if(document.activeElement===si){
    if(isBack(kc,k)){e.preventDefault();if(si.value){si.value='';searchQ='';viewChs=getViewChs();renderAll();_updateSearchCount()}else closeSearch()}
    return;
  }

  /* ── EXIT ── */
  if(zone==='exit'){
    if(isBack(kc,k)||kc===KC.BLUE){e.preventDefault();closeExit();return}
    if(isLt(kc,k)||isRt(kc,k)){e.preventDefault();exitFocusYes=!exitFocusYes;_updateExitFocus();return}
    if(isOK(kc,k)){e.preventDefault();if(exitFocusYes)doExit();else closeExit();return}
    return;
  }
  /* ── DIALER ── */
  if(zone==='dialer'){
    if(isDig(e)){e.preventDefault();dialPush(getDig(e));return}
    if(isOK(kc,k)){e.preventDefault();dialGo();return}
    if(isBack(kc,k)){e.preventDefault();closeDial();return}
    return;
  }
  /* ── SEARCH ── */
  if(zone==='search'){
    if(isBack(kc,k)){e.preventDefault();closeSearch();return}
    if(isOK(kc,k)){e.preventDefault();if(si)si.focus();return}
    if(isLt(kc,k)&&col>1){e.preventDefault();col--;renderAll();return}
    if(isRt(kc,k)&&col<viewChs.length){e.preventDefault();col++;renderAll();return}
    return;
  }
  /* ── QUICK ACTIONS ── */
  if(zone==='yp'){
    if(isBack(kc,k)){e.preventDefault();closeYP();return}
    var showingForm=ypForm.classList.contains('on');
    if(!showingForm){
      var items=QA('.yp-act',$('ypActs'));
      if(isUp(kc,k)){e.preventDefault();if(ypIdx===0){$('ypClose').focus({preventScroll:true})}else{ypIdx--;if(items[ypIdx])items[ypIdx].focus({preventScroll:true})}return}
      if(isDn(kc,k)){e.preventDefault();ypIdx=Math.min(items.length-1,ypIdx+1);if(items[ypIdx])items[ypIdx].focus({preventScroll:true});return}
      if(isOK(kc,k)){e.preventDefault();if(document.activeElement===$('ypClose'))closeYP();else if(items[ypIdx])items[ypIdx].click();return}
    }else{
      if(isUp(kc,k)||isDn(kc,k)){
        e.preventDefault();
        var inp2=QA('.yp-inp,#ypSave,#ypCancel',ypForm),fi=-1;
        for(var qi=0;qi<inp2.length;qi++){if(inp2[qi]===document.activeElement){fi=qi;break}}
        if(isUp(kc,k)&&fi>0)inp2[fi-1].focus({preventScroll:true});
        else if(isDn(kc,k)&&fi<inp2.length-1)inp2[fi+1].focus({preventScroll:true});
        return;
      }
    }
    return;
  }
  /* ── SETTINGS ── */
  if(zone==='settings'){
    if(isBack(kc,k)){e.preventDefault();closeSettings();return}
    var sideItems=QA('.so-nav',soSide),mainItems=QA('[tabindex="0"]',soMain);
    if(isUp(kc,k)){e.preventDefault();
      if(soSideZone){if(soSideIdx===0){$('soClose').focus({preventScroll:true})}else{soSideIdx--;if(sideItems[soSideIdx])sideItems[soSideIdx].focus({preventScroll:true})}}
      else{soMainIdx=Math.max(0,soMainIdx-1);if(mainItems[soMainIdx]){mainItems[soMainIdx].focus({preventScroll:true});mainItems[soMainIdx].scrollIntoView({block:'nearest'})}}
      return}
    if(isDn(kc,k)){e.preventDefault();
      if(soSideZone){soSideIdx=Math.min(sideItems.length-1,soSideIdx+1);if(sideItems[soSideIdx])sideItems[soSideIdx].focus({preventScroll:true})}
      else{soMainIdx=Math.min(mainItems.length-1,soMainIdx+1);if(mainItems[soMainIdx]){mainItems[soMainIdx].focus({preventScroll:true});mainItems[soMainIdx].scrollIntoView({block:'nearest'})}}
      return}
    if(isRt(kc,k)&&soSideZone){e.preventDefault();soSideZone=false;soMainIdx=0;if(mainItems[0])mainItems[0].focus({preventScroll:true});return}
    if(isLt(kc,k)&&!soSideZone){e.preventDefault();soSideZone=true;if(sideItems[soSideIdx])sideItems[soSideIdx].focus({preventScroll:true});return}
    if(isOK(kc,k)){e.preventDefault();
      var f=document.activeElement;
      if(f&&f.classList.contains('srow')){var cb2=f.querySelector('input[type=checkbox]');if(cb2){cb2.checked=!cb2.checked;cb2.dispatchEvent(new Event('change',{bubbles:true}))}}
      else if(f&&(f.dataset.engine||f.dataset.buf||f.classList.contains('opt-row')))f.click();
      else if(f&&f.classList.contains('so-nav'))f.click();
      else if(f)f.click();
      return}
    return;
  }
  /* ── TABS ── */
  if(zone==='tabs'){
    var tabs2=QA('.ntab',navTabs);
    if(isLt(kc,k)){e.preventDefault();tabIdx=Math.max(0,tabIdx-1);if(tabs2[tabIdx])tabs2[tabIdx].focus({preventScroll:true});return}
    if(isRt(kc,k)){e.preventDefault();tabIdx=Math.min(tabs2.length-1,tabIdx+1);if(tabs2[tabIdx])tabs2[tabIdx].focus({preventScroll:true});return}
    if(isOK(kc,k)){e.preventDefault();if(tabs2[tabIdx])tabs2[tabIdx].click();zone='rows';syncFocus();return}
    if(isDn(kc,k)){e.preventDefault();zone='rows';syncFocus();return}
    if(isBack(kc,k)){e.preventDefault();zone='rows';syncFocus();return}
    return;
  }
  /* ── ROWS ── */
  if(zone==='rows'){
    if(isUp(kc,k)){
      e.preventDefault();zone='tabs';
      var tabBtns=QA('.ntab',navTabs);
      for(var ti=0;ti<tabBtns.length;ti++){if(tabBtns[ti].dataset.g===activeTab){tabIdx=ti;break}}
      if(tabBtns[tabIdx])tabBtns[tabIdx].focus({preventScroll:true});return;
    }
    if(isDn(kc,k)){e.preventDefault();return}
    if(isLt(kc,k)){e.preventDefault();if(col>0){col--;renderAll();}return}
    if(isRt(kc,k)){e.preventDefault();if(col<viewChs.length){col++;renderAll();}return}
    if(isOK(kc,k)){e.preventDefault();immediatePlay();return}
    if(isBack(kc,k)){e.preventDefault();openExit();return}
  }
  /* ── UNIVERSAL ── */
  switch(true){
    case kc===KC.RED:
      e.preventDefault();
      var tabs3=QA('.ntab',navTabs),ci3=0;
      for(var ti3=0;ti3<tabs3.length;ti3++){if(tabs3[ti3].dataset.g===activeTab){ci3=ti3;break}}
      if(tabs3[(ci3+1)%tabs3.length])tabs3[(ci3+1)%tabs3.length].click();
      break;
    case kc===KC.GREEN:e.preventDefault();cycleAspect();break;
    case kc===KC.YELLOW:e.preventDefault();openYP();break;
    case kc===KC.BLUE:e.preventDefault();openSearch();break;
    case kc===KC.PLAY||k==='MediaPlay':e.preventDefault();
      if(ENGINE==='avplay'&&avplay){try{avplay.play()}catch(e2){}}else video.play().catch(function(){});break;
    case kc===KC.PAUSE||k==='MediaPause':e.preventDefault();
      if(ENGINE==='avplay'&&avplay){try{avplay.pause()}catch(e2){}}else video.pause();break;
    case kc===KC.PP||k==='MediaPlayPause':e.preventDefault();
      if(ENGINE==='avplay'&&avplay){try{var st2=avplay.getState();if(st2==='PLAYING')avplay.pause();else avplay.play()}catch(e2){}}
      else{if(video.paused)video.play().catch(function(){});else video.pause()}break;
    case kc===KC.STOP||k==='MediaStop':e.preventDefault();
      if(ENGINE==='avplay')avplayStop();
      else if(shakaPlayer){shakaPlayer.unload();setPlaying(false);curUrl=''}
      setSt('Stopped','');break;
    case kc===KC.FF||k==='MediaFastForward':e.preventDefault();
      if(ENGINE==='avplay'&&avplay){try{avplay.seekTo(Math.min(avplay.getDuration(),(avplay.getCurrentTime()||0)+30000))}catch(e2){}}
      else if(video&&isFinite(video.duration))video.currentTime=Math.min(video.duration,video.currentTime+30);break;
    case kc===KC.REW||k==='MediaRewind':e.preventDefault();
      if(ENGINE==='avplay'&&avplay){try{avplay.seekTo(Math.max(0,(avplay.getCurrentTime()||0)-30000))}catch(e2){}}
      else if(video)video.currentTime=Math.max(0,(video.currentTime||0)-30);break;
    case kc===KC.CHUP||k==='ChannelUp'||k==='PageUp':e.preventDefault();
      if(col>1){col--;renderAll();immediatePlay()}break;
    case kc===KC.CHDN||k==='ChannelDown'||k==='PageDown':e.preventDefault();
      if(col<viewChs.length){col++;renderAll();immediatePlay()}break;
    case k==='f'||k==='F':e.preventDefault();toggleFav();break;
    case k==='d'||k==='D':e.preventDefault();openDial();break;
    case k==='s'||k==='S':e.preventDefault();openSearch();break;
    case isDig(e)&&(zone==='rows'||zone==='tabs'):e.preventDefault();remoteDigit(getDig(e));break;
  }
});

/* ════════════════════════════════════════════
   TWICE-A-WEEK REFRESH CHECK
   Only fires after 3.5 days — not every boot.
   Fires 60s after startup so UI is fully settled.
════════════════════════════════════════════ */
function checkPeriodicRefresh(){
  var last=parseInt(lsGet(PL_REFRESH_KEY)||'0',10);
  if(Date.now()-last >= PL_REFRESH_INTERVAL){
    setTimeout(function(){
      if(typeof AppCache!=='undefined')AppCache.clearAllM3U();
      lsSet(PL_REFRESH_KEY,String(Date.now()));
      allChs=[];setSt('Periodic refresh (twice-a-week)…','buf');
      loadAll(true).then(function(){setSt('Refresh complete — '+allChs.length+' channels','ok')});
    },60000); /* wait 60s after boot before background refresh */
  }
}

/* ════════════════════════════════════════════
   LOAD ALL — sequential, cached by default
════════════════════════════════════════════ */
function loadAll(force){
  if(force===undefined)force=false;
  allChs=[];
  var chain=Promise.resolve();
  BUILTINS.forEach(function(pl){
    chain=chain.then(function(){return loadPl(pl.url,pl.name,force,pl._src)});
  });
  return chain.then(function(){
    var customs=pls.filter(function(p){return!p.builtIn});
    var c2=Promise.resolve();
    customs.forEach(function(pl){c2=c2.then(function(){return loadPl(pl.url,pl.name,force,pl.name.toLowerCase())})});
    return c2;
  }).then(function(){
    rebuildNavTabs();setTab(activeTab);
    var lastUrl=lsGet(LS.LCHU);
    if(lastUrl){
      for(var li=0;li<viewChs.length;li++){
        if(viewChs[li].url===lastUrl){col=li+1;renderAll();break}
      }
    }
    hideSplash();resetHideTimer();
    currentVol=getSysVol();
    setSt('Ready — '+allChs.length+' channels','ok');
    checkPeriodicRefresh();
  });
}

/* ════════════════════════════════════════════
   CLEANUP
════════════════════════════════════════════ */
window.addEventListener('beforeunload',function(){
  clearTimeout(hideTimer);clearTimeout(playTimer);clearTimeout(volTimer);
  clearTimeout(osdTimer);clearTimeout(engBadgeTimer);clearTimeout(dialTimer);
  clearTimeout(rDialTimer);clearTimeout(chHudTimer);
});

/* ════════════════════════════════════════════
   BOOT
════════════════════════════════════════════ */
(function boot(){
  loadStore();
  pls=pls.filter(function(p){
    return!p.builtIn&&!BUILTINS.some(function(b){return b.url===p.url});
  });
  $('splMsg').textContent='Initialising player…';

  initAVPlay();
  if(typeof SagaEPG!=='undefined')SagaEPG.prefetch();

  initShaka().then(function(){
    $('splMsg').textContent='Loading channels…';
    rebuildNavTabs();

    /* ── INSTANT STARTUP: try channel cache first ── */
    return loadChCache().then(function(cached){
      if(cached&&cached.chs&&cached.chs.length>0){
        /* Restore from cache — zero network calls, instant display */
        allChs=cached.chs;
        var savedTab=cached.tab||'Telugu';
        rebuildNavTabs();setTab(savedTab);
        var lastUrl=lsGet(LS.LCHU);
        if(lastUrl){
          for(var li=0;li<viewChs.length;li++){
            if(viewChs[li].url===lastUrl){col=li+1;renderAll();break}
          }
        }
        hideSplash();
        currentVol=getSysVol();
        setSt('Ready — '+allChs.length+' channels (cached)','ok');
        /* Only trigger periodic refresh — NOT immediate background refresh.
           This is the key fix: no more forced fetch on every launch. */
        checkPeriodicRefresh();
        return Promise.resolve();
      }
      /* No cache (first launch or expired) — do full network load */
      return loadAll(false);
    });
  }).catch(function(err){
    setSt('Boot error: '+String(err),'err');
    hideSplash();
  });
})();

})(); /* IIFE end */
</script>
