<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Ultra IPTV – Jio Playlist</title>
  <!-- Shaka Player CDN -->
  <script src="https://cdn.jsdelivr.net/npm/shaka-player@4.12.6/dist/shaka-player.compiled.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      background: #0a0a0f;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    .app {
      display: flex;
      height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 380px;
      background: #0f0f16;
      border-right: 1px solid #2a2a3a;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 20px;
      border-bottom: 1px solid #2a2a3a;
    }

    .brand-logo {
      font-size: 28px;
      background: #1e3a8a;
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-title {
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .brand-title span {
      color: #3b82f6;
    }

    .search-wrap {
      padding: 16px;
    }

    #searchInput {
      width: 100%;
      padding: 12px 16px;
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
    }

    #searchInput:focus {
      outline: none;
      border-color: #3b82f6;
    }

    .list-header {
      display: flex;
      justify-content: space-between;
      padding: 12px 16px;
      color: #8b8b9e;
      font-size: 12px;
      letter-spacing: 1px;
    }

    .icon-btn {
      background: #1a1a24;
      border: none;
      color: #fff;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 20px;
    }

    .icon-btn:hover {
      background: #3b82f6;
    }

    .channel-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px;
    }

    .channel-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      margin: 4px 0;
      border-radius: 12px;
      background: #13131c;
      cursor: pointer;
      transition: all 0.1s ease;
    }

    .channel-item.active {
      background: #3b82f6;
    }

    .channel-item:hover {
      background: #1e2a3a;
    }

    .channel-logo {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: #1a1a24;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      overflow: hidden;
    }

    .channel-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .channel-name {
      flex: 1;
      font-size: 16px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .channel-fav {
      color: #fbbf24;
      font-size: 18px;
    }

    .hint-bar {
      display: flex;
      justify-content: space-around;
      padding: 12px;
      border-top: 1px solid #2a2a3a;
      font-size: 12px;
      color: #6b6b80;
    }

    /* Player Area */
    .player-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #000;
    }

    .now-playing {
      padding: 16px 24px;
      font-size: 20px;
      font-weight: bold;
      background: #0a0a0f;
      border-bottom: 1px solid #1a1a24;
    }

    .video-container {
      flex: 1;
      position: relative;
      background: #000;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .overlay {
      position: absolute;
      bottom: 20px;
      right: 20px;
      pointer-events: none;
    }

    .quality-badge {
      background: rgba(0,0,0,0.7);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-family: monospace;
      color: #3b82f6;
    }

    .status {
      padding: 8px 16px;
      font-size: 12px;
      color: #6b6b80;
      background: #0a0a0f;
      border-top: 1px solid #1a1a24;
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal-content {
      background: #13131c;
      padding: 24px;
      border-radius: 24px;
      width: 400px;
      border: 1px solid #2a2a3a;
    }

    .modal-content h3 {
      margin-bottom: 20px;
    }

    .modal-content input {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 12px;
      color: #fff;
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
    }

    .btn-primary, .btn-secondary {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-primary {
      background: #3b82f6;
      color: #fff;
    }

    .btn-secondary {
      background: #2a2a3a;
      color: #fff;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #1a1a24;
    }
    ::-webkit-scrollbar-thumb {
      background: #3b82f6;
      border-radius: 3px;
    }
  </style>
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="brand">
      <div class="brand-logo">📺</div>
      <div class="brand-title">ULTRA<span>IPTV</span></div>
    </div>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search channels...">
    </div>
    <div class="list-header">
      <span>CHANNELS</span>
      <button id="addPlaylistBtn" class="icon-btn">+</button>
    </div>
    <div id="channelList" class="channel-list"></div>
    <div class="hint-bar">
      <span>▲▼ Select</span>
      <span>▶ Play</span>
      <span>★ Fav</span>
      <span>🔍 Search</span>
    </div>
  </div>

  <!-- Player Area -->
  <div class="player-area">
    <div class="now-playing" id="nowPlaying">Select a channel</div>
    <div class="video-container">
      <video id="video" playsinline autoplay></video>
      <div class="overlay">
        <div class="quality-badge" id="qualityBadge">--</div>
      </div>
    </div>
    <div class="status" id="status">Ready</div>
  </div>
</div>

<!-- Add Playlist Modal -->
<div id="playlistModal" class="modal">
  <div class="modal-content">
    <h3>Add M3U Playlist</h3>
    <input type="text" id="playlistName" placeholder="Name (e.g., My Channels)">
    <input type="url" id="playlistUrl" placeholder="M3U URL">
    <div class="modal-buttons">
      <button id="savePlaylistBtn" class="btn-primary">Add</button>
      <button id="cancelPlaylistBtn" class="btn-secondary">Cancel</button>
    </div>
  </div>
</div>

<script>
  (function() {
    'use strict';

    // ---------- DOM Elements ----------
    const video = document.getElementById('video');
    const channelListDiv = document.getElementById('channelList');
    const searchInput = document.getElementById('searchInput');
    const nowPlayingSpan = document.getElementById('nowPlaying');
    const statusSpan = document.getElementById('status');
    const qualityBadge = document.getElementById('qualityBadge');
    const addPlaylistBtn = document.getElementById('addPlaylistBtn');
    const playlistModal = document.getElementById('playlistModal');
    const playlistName = document.getElementById('playlistName');
    const playlistUrl = document.getElementById('playlistUrl');
    const savePlaylistBtn = document.getElementById('savePlaylistBtn');
    const cancelPlaylistBtn = document.getElementById('cancelPlaylistBtn');

    // ---------- State ----------
    let player = null;
    let channels = [];
    let filteredChannels = [];
    let selectedIndex = 0;
    let currentUrl = '';
    let favSet = new Set();
    let customPlaylists = [];
    let isPlaying = false;
    let networkQuality = 'online';

    // Default Jio Playlist
    const DEFAULT_JIO_PLAYLIST = 'https://jioplaylist.joinus-apiworker.workers.dev/playlist.m3u';

    // Storage keys
    const STORAGE_FAV = 'ultra:favs';
    const STORAGE_PLAYLISTS = 'ultra:playlists';
    const STORAGE_LAST_URL = 'ultra:lastUrl';

    // ---------- ABR Configuration (Aggressive Upscaling) ----------
    const ABR_CONFIG = {
      streaming: {
        bufferingGoal: 15,
        rebufferingGoal: 2,
        stallEnabled: true,
        stallThreshold: 1.5,
        stallSkip: 0.2,
        retryParameters: {
          maxAttempts: 5,
          baseDelay: 500,
          backoffFactor: 1.5,
          timeout: 20000
        }
      },
      abr: {
        enabled: true,
        defaultBandwidthEstimate: 3000000,  // 3 Mbps start
        switchInterval: 2,
        bandwidthUpgradeTarget: 0.70,
        bandwidthDowngradeTarget: 0.90,
        advanced: {
          minTotalBytes: 32768,
          minBytesPerEstimate: 16384
        }
      },
      manifest: {
        retryParameters: { maxAttempts: 4, baseDelay: 500, backoffFactor: 2 }
      }
    };

    // ---------- Storage Helpers ----------
    function loadStorage() {
      try {
        const favs = localStorage.getItem(STORAGE_FAV);
        if (favs) favSet = new Set(JSON.parse(favs));
        const playlists = localStorage.getItem(STORAGE_PLAYLISTS);
        if (playlists) customPlaylists = JSON.parse(playlists);
      } catch(e) {}
    }

    function saveFavs() {
      localStorage.setItem(STORAGE_FAV, JSON.stringify([...favSet]));
    }

    function savePlaylists() {
      localStorage.setItem(STORAGE_PLAYLISTS, JSON.stringify(customPlaylists));
    }

    function saveLastUrl(url) {
      try { localStorage.setItem(STORAGE_LAST_URL, url); } catch(e) {}
    }

    function getLastUrl() {
      try { return localStorage.getItem(STORAGE_LAST_URL); } catch(e) { return null; }
    }

    // ---------- M3U Parser ----------
    function parseM3U(text) {
      const lines = text.split(/\r?\n/);
      const channels = [];
      let current = null;
      
      for (let line of lines) {
        line = line.trim();
        if (line.startsWith('#EXTINF')) {
          const commaIdx = line.lastIndexOf(',');
          let name = commaIdx >= 0 ? line.slice(commaIdx + 1).trim() : 'Unknown';
          name = name.replace(/\s*\([^)]*\)|\s*\[[^\]]*\]/g, '').trim();
          if (!name) name = 'Channel';
          const logoMatch = line.match(/tvg-logo="([^"]*)"/i);
          const logo = logoMatch ? logoMatch[1] : '';
          const groupMatch = line.match(/group-title="([^"]*)"/i);
          const group = groupMatch ? groupMatch[1] : 'Other';
          const idMatch = line.match(/tvg-id="([^"]*)"/i);
          const tvgId = idMatch ? idMatch[1] : '';
          current = { name, logo, group, url: '', tvgId };
        } else if (line && !line.startsWith('#') && current) {
          if (line.startsWith('http://') || line.startsWith('https://')) {
            current.url = line;
            channels.push(current);
            current = null;
          }
        }
      }
      console.log(`Parsed ${channels.length} channels`);
      return channels;
    }

    // ---------- Load Playlist from URL ----------
    async function loadPlaylist(url) {
      statusSpan.textContent = 'Loading Jio playlist...';
      console.log('Loading:', url);
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 20000);
        const response = await fetch(url, { signal: controller.signal });
        clearTimeout(timeoutId);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const text = await response.text();
        channels = parseM3U(text);
        
        if (channels.length === 0) throw new Error('No channels found');
        
        filteredChannels = [...channels];
        selectedIndex = 0;
        renderChannelList();
        saveLastUrl(url);
        statusSpan.textContent = `Ready · ${channels.length} channels`;
        
        if (channels.length > 0 && !isPlaying) {
          playChannel(0);
        }
      } catch (err) {
        console.error(err);
        statusSpan.textContent = `Failed: ${err.message}`;
        const lastUrl = getLastUrl();
        if (lastUrl && lastUrl !== url) {
          statusSpan.textContent = 'Retrying last working playlist...';
          setTimeout(() => loadPlaylist(lastUrl), 1000);
        }
      }
    }

    // ---------- Render Channel List ----------
    function renderChannelList() {
      if (!channelListDiv) return;
      const html = filteredChannels.map((ch, idx) => `
        <div class="channel-item ${idx === selectedIndex ? 'active' : ''}" data-index="${idx}">
          <div class="channel-logo">
            ${ch.logo ? `<img src="${ch.logo}" onerror="this.src='📡'">` : '📡'}
          </div>
          <div class="channel-name">${escapeHtml(ch.name)}</div>
          <div class="channel-fav">${favSet.has(ch.url) ? '★' : ''}</div>
        </div>
      `).join('');
      channelListDiv.innerHTML = html;
      
      document.querySelectorAll('.channel-item').forEach(el => {
        el.addEventListener('click', () => {
          const idx = parseInt(el.dataset.index, 10);
          if (!isNaN(idx)) {
            selectedIndex = idx;
            renderChannelList();
            playChannel(selectedIndex);
          }
        });
      });
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    // ---------- Shaka Player Initialisation ----------
    async function initPlayer() {
      await shaka.polyfill.installAll();
      if (!shaka.Player.isBrowserSupported()) {
        statusSpan.textContent = 'Browser not supported';
        return;
      }
      player = new shaka.Player(video);
      player.configure(ABR_CONFIG);
      
      player.addEventListener('adaptation', () => updateQualityBadge());
      player.addEventListener('variantchanged', () => updateQualityBadge());
      player.addEventListener('error', (e) => {
        console.error(e.detail);
        statusSpan.textContent = `Error: ${e.detail.message.slice(0, 80)}`;
      });
      player.addEventListener('buffering', (e) => {
        statusSpan.textContent = e.buffering ? 'Buffering...' : 'Playing';
      });
      
      if (navigator.connection) {
        navigator.connection.addEventListener('change', updateNetworkQuality);
      }
      updateNetworkQuality();
      statusSpan.textContent = 'Player ready';
    }

    function updateNetworkQuality() {
      if (!navigator.onLine) networkQuality = 'offline';
      else if (navigator.connection && navigator.connection.downlink < 2) networkQuality = 'slow';
      else networkQuality = 'online';
      
      if (player) {
        if (networkQuality === 'slow') {
          player.configure({ abr: { bandwidthUpgradeTarget: 0.85, switchInterval: 3 }, streaming: { bufferingGoal: 8 } });
        } else {
          player.configure({ abr: { bandwidthUpgradeTarget: 0.70, switchInterval: 2 }, streaming: { bufferingGoal: 15 } });
        }
      }
    }

    function updateQualityBadge() {
      if (!player) return;
      try {
        const tracks = player.getVariantTracks();
        const active = tracks.find(t => t.active);
        if (active && active.height) {
          qualityBadge.textContent = `${active.height}p ${(active.bandwidth/1e6).toFixed(1)} Mbps`;
        } else if (active && active.bandwidth) {
          qualityBadge.textContent = `${(active.bandwidth/1e6).toFixed(1)} Mbps`;
        } else {
          qualityBadge.textContent = '--';
        }
      } catch(e) {}
    }

    async function playChannel(index) {
      if (!player) return;
      const ch = filteredChannels[index];
      if (!ch || !ch.url) return;
      
      currentUrl = ch.url;
      nowPlayingSpan.textContent = ch.name;
      selectedIndex = index;
      renderChannelList();
      isPlaying = true;
      
      statusSpan.textContent = 'Loading stream...';
      try {
        await player.load(ch.url);
        await video.play();
        statusSpan.textContent = 'Playing';
        setTimeout(() => forceUpscale(), 3000);
        setTimeout(() => forceUpscale(), 8000);
      } catch (err) {
        console.error(err);
        statusSpan.textContent = `Play error: ${err.message.slice(0, 80)}`;
        isPlaying = false;
      }
    }

    function forceUpscale() {
      if (!player || !isPlaying) return;
      try {
        const tracks = player.getVariantTracks();
        if (!tracks.length) return;
        const active = tracks.find(t => t.active);
        let highest = tracks.reduce((max, t) => t.bandwidth > max.bandwidth ? t : max, tracks[0]);
        if (active && highest.bandwidth > active.bandwidth) {
          console.log(`Force upscaling to ${highest.height || 'HD'}p`);
          player.selectVariantTrack(highest, false, 0.5);
          statusSpan.textContent = `Upscaling to ${highest.height || 'HD'}...`;
        }
      } catch(e) {}
    }

    // ---------- Search ----------
    function applySearch() {
      const query = searchInput.value.trim().toLowerCase();
      filteredChannels = query ? channels.filter(ch => ch.name.toLowerCase().includes(query)) : [...channels];
      selectedIndex = 0;
      renderChannelList();
      if (filteredChannels.length && !isPlaying) playChannel(0);
    }
    searchInput.addEventListener('input', applySearch);

    // ---------- Playlist Management ----------
    function openAddPlaylistModal() {
      playlistName.value = '';
      playlistUrl.value = '';
      playlistModal.style.display = 'flex';
    }

    function addCustomPlaylist() {
      const name = playlistName.value.trim();
      const url = playlistUrl.value.trim();
      if (!name || !url) { alert('Enter both name and URL'); return; }
      customPlaylists.push({ name, url });
      savePlaylists();
      playlistModal.style.display = 'none';
      loadPlaylist(url);
    }

    addPlaylistBtn.addEventListener('click', openAddPlaylistModal);
    savePlaylistBtn.addEventListener('click', addCustomPlaylist);
    cancelPlaylistBtn.addEventListener('click', () => playlistModal.style.display = 'none');

    // ---------- Keyboard Navigation ----------
    window.addEventListener('keydown', (e) => {
      const key = e.key, code = e.keyCode;
      if (key === 'ArrowUp' || code === 38) {
        e.preventDefault();
        if (filteredChannels.length) {
          selectedIndex = (selectedIndex - 1 + filteredChannels.length) % filteredChannels.length;
          renderChannelList();
          if (isPlaying) playChannel(selectedIndex);
        }
      } else if (key === 'ArrowDown' || code === 40) {
        e.preventDefault();
        if (filteredChannels.length) {
          selectedIndex = (selectedIndex + 1) % filteredChannels.length;
          renderChannelList();
          if (isPlaying) playChannel(selectedIndex);
        }
      } else if (key === 'Enter' || code === 13) {
        e.preventDefault();
        if (filteredChannels.length) playChannel(selectedIndex);
      } else if (key === 'f' || key === 'F' || code === 70) {
        const ch = filteredChannels[selectedIndex];
        if (ch) {
          if (favSet.has(ch.url)) favSet.delete(ch.url);
          else favSet.add(ch.url);
          saveFavs();
          renderChannelList();
        }
      } else if (key === 'Escape' || key === 'Back' || code === 27) {
        if (playlistModal.style.display === 'flex') playlistModal.style.display = 'none';
      }
    });

    // Fullscreen on double-click
    video.addEventListener('dblclick', () => {
      if (document.fullscreenElement) document.exitFullscreen();
      else video.requestFullscreen();
    });

    // ---------- Bootstrap ----------
    async function init() {
      loadStorage();
      await initPlayer();
      loadPlaylist(DEFAULT_JIO_PLAYLIST);
    }
    init();
  })();
</script>
</body>
</html>
